<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tactical Sailing Replay</title>
  <style>
    :root {
      --bg: #0a1322;
      --panel: #101d31;
      --panel-2: #172740;
      --text: #e9f2ff;
      --muted: #9cb4d3;
      --accent: #4ec7ff;
      --ok: #2dd4bf;
      --warn: #f59e0b;
      --error: #ef4444;
      --radius: 14px;
      --space: 12px;
      --touch: 44px;
      --font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: linear-gradient(160deg, #070d18, #0f1f37 45%, #0c1b2f);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(16, 29, 49, 0.7);
      border: 1px solid #1f3352;
      border-radius: 999px;
      padding: 4px;
      position: sticky;
      top: 8px;
      backdrop-filter: blur(4px);
      z-index: 50;
    }

    .tab-btn {
      height: var(--touch);
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      color: var(--text);
      background: #23446e;
    }

    .panel {
      background: rgba(16, 29, 49, 0.88);
      border: 1px solid #1f3352;
      border-radius: var(--radius);
      padding: 14px;
    }

    .mode { display: none; }
    .mode.active { display: block; }

    h1, h2, h3, p { margin: 0; }
    h2 { font-size: 1.1rem; margin-bottom: 10px; }

    .stack { display: grid; gap: 10px; }
    .field {
      display: grid;
      gap: 6px;
    }
    label { font-size: 0.85rem; color: var(--muted); }

    input, textarea, select {
      width: 100%;
      background: #0d1a2e;
      color: var(--text);
      border: 1px solid #2a466e;
      border-radius: 10px;
      padding: 10px;
      font-size: 1rem;
      min-height: var(--touch);
    }

    textarea { min-height: 96px; resize: vertical; }
    .helper { font-size: 0.78rem; color: var(--muted); }
    .error { color: var(--error); font-size: 0.82rem; }

    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, rgba(10, 19, 34, 0.95), rgba(10, 19, 34, 0.6));
      padding-top: 10px;
      margin-top: 10px;
    }

    .btn {
      min-height: var(--touch);
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      color: #041423;
      font-weight: 700;
      background: var(--accent);
      cursor: pointer;
    }
    .btn.secondary {
      background: #1e3a5f;
      color: var(--text);
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row .btn { flex: 1; min-width: 70px; }

    .status {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .replay-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }
    canvas {
      width: 100%;
      height: min(58vh, 520px);
      display: block;
      border-radius: 12px;
      border: 1px solid #2b456d;
      background: radial-gradient(circle at center, #14345a, #0b1b31 75%);
      touch-action: none;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .metric-card {
      background: var(--panel-2);
      border: 1px solid #2a466f;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 5px;
    }
    .metric-value { font-size: 1.5rem; font-weight: 800; }
    .metric-label { color: #c9dcf6; font-weight: 600; }
    .metric-sub { color: var(--muted); font-size: 0.85rem; }

    .chip {
      display: inline-block;
      width: fit-content;
      border-radius: 999px;
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid #355b8f;
      color: #bdd6fa;
      background: #102641;
    }

    @media (min-width: 900px) {
      .replay-grid { grid-template-columns: 2fr 1fr; }
      .analysis-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="topbar" id="topbar"></nav>

    <section id="setupMode" class="mode active">
      <form id="setupForm" class="panel stack" novalidate>
        <h2>Setup</h2>
        <div class="field">
          <label for="eventId">Event ID</label>
          <input id="eventId" name="eventId" placeholder="e.g. tuesday-series-2026" required />
        </div>
        <div class="field">
          <label for="tzOffset">Event timezone offset</label>
          <input id="tzOffset" name="tzOffset" placeholder="UTC-5 / -5 / UTC+1" required />
          <div class="helper">All times in Replay and Analysis are shown in this event timezone.</div>
        </div>
        <div class="field"><label for="rcSerials">RC serial(s)</label><input id="rcSerials" name="rcSerials" placeholder="comma separated" /></div>
        <div class="field"><label for="pinSerials">Pin serial(s)</label><input id="pinSerials" name="pinSerials" placeholder="comma separated" /></div>
        <div class="field"><label for="wwSerials">WW gate serial(s)</label><input id="wwSerials" name="wwSerials" placeholder="comma separated" /></div>
        <div class="field"><label for="wlSerials">WL gate serial(s)</label><input id="wlSerials" name="wlSerials" placeholder="comma separated" /></div>
        <div class="field">
          <label for="gunTimes">Gun times</label>
          <textarea id="gunTimes" name="gunTimes" placeholder="1,1763571840000&#10;2,1763573640000" required></textarea>
          <div class="helper">One line per race in format <code>raceNumber,unixTimestamp</code>.</div>
        </div>
        <div class="panel" style="padding:10px;">
          <div class="helper">Mode: replay-only (live mode can be added later).</div>
          <div class="helper" id="detectedMarks">Detected marks: none loaded yet.</div>
        </div>
        <div id="setupErrors" class="error"></div>
        <div class="sticky-actions">
          <button class="btn" type="submit">Save setup and continue</button>
        </div>
      </form>
    </section>

    <section id="replayMode" class="mode">
      <div class="replay-grid">
        <div class="panel">
          <canvas id="courseCanvas"></canvas>
        </div>
        <div class="panel stack">
          <h2>Replay</h2>
          <div class="field">
            <label for="raceSelect">Race</label>
            <select id="raceSelect"></select>
          </div>
          <div class="field">
            <label for="scrubber">Replay scrubber</label>
            <input type="range" id="scrubber" min="0" max="100" step="1" />
          </div>
          <div id="cursorTime" class="status"></div>
          <div class="row">
            <button class="btn secondary" id="back5m">-5m</button>
            <button class="btn secondary" id="back30s">-30s</button>
            <button class="btn secondary" id="fwd30s">+30s</button>
            <button class="btn secondary" id="fwd5m">+5m</button>
          </div>
          <button class="btn secondary" id="playPause">Play</button>
          <div id="replayStatus" class="status">No replay data loaded.</div>
          <div class="helper">Tap/click map to manually move reach mark.</div>
        </div>
      </div>
    </section>

    <section id="analysisMode" class="mode">
      <div class="panel stack">
        <h2>Analysis</h2>
        <div id="analysisCards" class="analysis-grid"></div>
      </div>
    </section>
  </div>

  <script>
    const App = (() => {
      const REPLAY_WINDOW = { beforeMs: 120000, afterMs: 30000 };
      const MODE_ORDER = ["setup", "replay", "analysis"];

      const state = {
        ui: { mode: "setup", isPlaying: false, errors: [] },
        config: {
          eventId: "",
          timezoneOffsetMinutes: 0,
          timezoneRaw: "UTC",
          serials: { rc: [], pin: [], ww: [], wl: [] },
          gunTimes: []
        },
        telemetry: { points: [], detectedMarks: [] },
        replay: {
          selectedRace: null,
          cursorTimeMs: null,
          window: { ...REPLAY_WINDOW },
          activePoints: [],
          raceWindow: { startMs: null, endMs: null }
        },
        geometry: {
          rc: null, pin: null, wwA: null, wwB: null, wlA: null, wlB: null,
          reach: null, midpoint: null, courseAxisDeg: null, gateAxisDeg: null
        },
        analysis: { metrics: [] }
      };

      const els = {};

      function init() {
        cacheEls();
        bindUI();
        renderTabs();
        ensureDemoTelemetry();
        renderAll();
      }

      function cacheEls() {
        ["topbar","setupMode","replayMode","analysisMode","setupForm","setupErrors","detectedMarks",
         "raceSelect","scrubber","cursorTime","replayStatus","courseCanvas","analysisCards","playPause"].forEach(id => {
          els[id] = document.getElementById(id);
        });
      }

      function bindUI() {
        els.setupForm.addEventListener("submit", onSetupSubmit);
        els.raceSelect.addEventListener("change", onRaceChange);
        els.scrubber.addEventListener("input", onScrubInput);
        document.getElementById("back5m").addEventListener("click", () => stepCursor(-300000));
        document.getElementById("back30s").addEventListener("click", () => stepCursor(-30000));
        document.getElementById("fwd30s").addEventListener("click", () => stepCursor(30000));
        document.getElementById("fwd5m").addEventListener("click", () => stepCursor(300000));
        els.playPause.addEventListener("click", togglePlay);

        const canvas = els.courseCanvas;
        ["click", "touchstart"].forEach(type => {
          canvas.addEventListener(type, ev => {
            ev.preventDefault();
            const p = eventToCanvasPoint(ev, canvas);
            moveReachMarkFromCanvasPoint(p.x, p.y);
          }, { passive: false });
        });
      }

      function renderTabs() {
        els.topbar.innerHTML = MODE_ORDER.map(mode =>
          `<button class="tab-btn ${state.ui.mode === mode ? "active" : ""}" data-mode="${mode}">${capitalize(mode)}</button>`
        ).join("");
        els.topbar.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => setMode(btn.dataset.mode));
        });
      }

      function setMode(mode) {
        state.ui.mode = mode;
        renderAll();
      }

      function onSetupSubmit(e) {
        e.preventDefault();
        const form = new FormData(els.setupForm);
        const parsed = parseSetup(form);
        state.ui.errors = parsed.errors;
        if (parsed.errors.length) return renderSetup();

        state.config = { ...state.config, ...parsed.config };
        buildRaceOptions();
        selectRace(state.config.gunTimes[0]?.raceNumber || null);
        setMode("replay");
      }

      function parseSetup(form) {
        const errors = [];
        const tzRaw = (form.get("tzOffset") || "").toString().trim();
        const tz = parseTimezoneOffset(tzRaw);
        const gunParse = parseGunTimes((form.get("gunTimes") || "").toString());
        if (!form.get("eventId").toString().trim()) errors.push("Event ID is required.");
        if (tz == null) errors.push("Timezone must look like UTC-5, -5, UTC+1, +5.5.");
        if (!gunParse.ok) errors.push(gunParse.error);

        return {
          errors,
          config: {
            eventId: form.get("eventId").toString().trim(),
            timezoneRaw: tzRaw,
            timezoneOffsetMinutes: tz ?? 0,
            serials: {
              rc: parseSerialList(form.get("rcSerials")),
              pin: parseSerialList(form.get("pinSerials")),
              ww: parseSerialList(form.get("wwSerials")),
              wl: parseSerialList(form.get("wlSerials"))
            },
            gunTimes: gunParse.gunTimes || []
          }
        };
      }

      function parseSerialList(raw) {
        return (raw || "").toString().split(",").map(s => s.trim()).filter(Boolean);
      }

      function parseTimezoneOffset(raw) {
        const normalized = raw.toUpperCase().replace("UTC", "").trim();
        if (!normalized) return 0;
        const num = Number(normalized);
        if (Number.isNaN(num)) return null;
        return Math.round(num * 60);
      }

      function parseGunTimes(text) {
        const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);
        if (!lines.length) return { ok: false, error: "Enter at least one gun time line." };
        const gunTimes = [];
        for (const line of lines) {
          const [raceStr, msStr] = line.split(",").map(s => s?.trim());
          const raceNumber = Number(raceStr);
          const gunTimeMs = Number(msStr);
          if (!Number.isInteger(raceNumber) || !Number.isFinite(gunTimeMs)) {
            return { ok: false, error: `Invalid gun time line: ${line}` };
          }
          gunTimes.push({ raceNumber, gunTimeMs });
        }
        gunTimes.sort((a,b) => a.raceNumber - b.raceNumber);
        return { ok: true, gunTimes };
      }

      function buildRaceOptions() {
        els.raceSelect.innerHTML = state.config.gunTimes.map(g => `<option value="${g.raceNumber}">Race ${g.raceNumber}</option>`).join("");
      }

      function onRaceChange() { selectRace(Number(els.raceSelect.value)); }

      function selectRace(raceNumber) {
        if (!raceNumber) return;
        state.replay.selectedRace = raceNumber;
        const i = state.config.gunTimes.findIndex(g => g.raceNumber === raceNumber);
        const startMs = state.config.gunTimes[i].gunTimeMs - 5 * 60000;
        const next = state.config.gunTimes[i+1]?.gunTimeMs;
        const endMs = (next ? next - 60000 : state.config.gunTimes[i].gunTimeMs + 35 * 60000);
        state.replay.raceWindow = { startMs, endMs };
        state.replay.cursorTimeMs = Math.max(startMs, state.config.gunTimes[i].gunTimeMs - 2 * 60000);
        syncScrubberFromCursor();
        refreshReplayWindow();
        renderAll();
      }

      function onScrubInput() {
        const p = Number(els.scrubber.value) / 100;
        const { startMs, endMs } = state.replay.raceWindow;
        if (!startMs || !endMs) return;
        state.replay.cursorTimeMs = Math.round(startMs + (endMs - startMs) * p);
        refreshReplayWindow();
        renderReplay();
        renderAnalysis();
      }

      function syncScrubberFromCursor() {
        const { startMs, endMs } = state.replay.raceWindow;
        if (!startMs || !endMs || !state.replay.cursorTimeMs) return;
        const p = (state.replay.cursorTimeMs - startMs) / (endMs - startMs);
        els.scrubber.value = String(Math.max(0, Math.min(100, Math.round(p * 100))));
      }

      function stepCursor(deltaMs) {
        if (!state.replay.cursorTimeMs) return;
        const { startMs, endMs } = state.replay.raceWindow;
        state.replay.cursorTimeMs = Math.max(startMs, Math.min(endMs, state.replay.cursorTimeMs + deltaMs));
        syncScrubberFromCursor();
        refreshReplayWindow();
        renderReplay();
        renderAnalysis();
      }

      let playTimer = null;
      function togglePlay() {
        state.ui.isPlaying = !state.ui.isPlaying;
        if (state.ui.isPlaying) {
          playTimer = setInterval(() => {
            const before = state.replay.cursorTimeMs;
            stepCursor(1000);
            if (state.replay.cursorTimeMs === before) togglePlay();
          }, 250);
        } else {
          clearInterval(playTimer);
          playTimer = null;
        }
        els.playPause.textContent = state.ui.isPlaying ? "Pause" : "Play";
      }

      function refreshReplayWindow() {
        const c = state.replay.cursorTimeMs;
        const points = state.telemetry.points.filter(p => p.ts >= c - state.replay.window.beforeMs && p.ts <= c + state.replay.window.afterMs);
        state.replay.activePoints = points;
        deriveGeometry(points);
        computeAnalysis();
      }

      function ensureDemoTelemetry() {
        if (state.telemetry.points.length) return;
        const baseTs = Date.now() - 86400000;
        const rc = { lat: 41.0005, lon: -71.0012 };
        const pin = { lat: 41.0005, lon: -71.0004 };
        const wwA = { lat: 41.0092, lon: -71.0011 };
        const wwB = { lat: 41.0092, lon: -71.0005 };
        const wlA = { lat: 40.9955, lon: -71.0011 };
        const wlB = { lat: 40.9955, lon: -71.0005 };
        const reach = { lat: 41.0047, lon: -70.9986 };

        const marks = [
          mkMark("rc", "RC1", rc, baseTs), mkMark("pin", "PIN1", pin, baseTs),
          mkMark("ww", "WW1", wwA, baseTs), mkMark("ww", "WW2", wwB, baseTs),
          mkMark("wl", "WL1", wlA, baseTs), mkMark("wl", "WL2", wlB, baseTs),
          mkMark("reach", "RCH1", reach, baseTs)
        ];
        const tracks = mkBoatTrack(baseTs, wlA, wwA);
        state.telemetry.points = marks.concat(tracks);
        state.telemetry.detectedMarks = ["RC1", "PIN1", "WW1", "WW2", "WL1", "WL2", "RCH1"];

        const gun1 = baseTs + 20 * 60000;
        const gun2 = baseTs + 50 * 60000;
        state.config.gunTimes = [{ raceNumber: 1, gunTimeMs: gun1 }, { raceNumber: 2, gunTimeMs: gun2 }];
        buildRaceOptions();
        selectRace(1);
      }

      function mkMark(kind, serial, pos, ts) { return { type: "mark", kind, serial, lat: pos.lat, lon: pos.lon, ts }; }
      function mkBoatTrack(baseTs, start, end) {
        const out = [];
        for (let i = 0; i < 420; i++) {
          const t = i / 419;
          out.push({
            type: "boat", boatId: "demo", ts: baseTs + i * 15000,
            lat: start.lat + (end.lat - start.lat) * t + Math.sin(i / 10) * 0.00008,
            lon: start.lon + (end.lon - start.lon) * t + Math.cos(i / 12) * 0.00006
          });
        }
        return out;
      }

      function deriveGeometry(points) {
        const marksByKind = { rc: [], pin: [], ww: [], wl: [], reach: [] };
        points.filter(p => p.type === "mark").forEach(m => marksByKind[m.kind]?.push(m));
        const pick = arr => arr[0] ? { lat: arr[0].lat, lon: arr[0].lon, confidence: "Measured" } : null;

        state.geometry.rc = pick(marksByKind.rc);
        state.geometry.pin = pick(marksByKind.pin);
        state.geometry.wwA = pick(marksByKind.ww);
        state.geometry.wwB = marksByKind.ww[1] ? { lat: marksByKind.ww[1].lat, lon: marksByKind.ww[1].lon, confidence: "Measured" } : null;
        state.geometry.wlA = pick(marksByKind.wl);
        state.geometry.wlB = marksByKind.wl[1] ? { lat: marksByKind.wl[1].lat, lon: marksByKind.wl[1].lon, confidence: "Measured" } : null;
        if (!state.geometry.reach) state.geometry.reach = pick(marksByKind.reach);
        if (state.geometry.rc && state.geometry.pin) {
          state.geometry.midpoint = midpoint(state.geometry.rc, state.geometry.pin);
        }
        state.geometry.courseAxisDeg = computeCourseAxis();
        state.geometry.gateAxisDeg = computeGateAxis();
      }

      function computeCourseAxis() {
        const wlMid = gateMid(state.geometry.wlA, state.geometry.wlB);
        const wwMid = gateMid(state.geometry.wwA, state.geometry.wwB);
        if (!wlMid || !wwMid) return null;
        return bearingDeg(wlMid, wwMid);
      }

      function computeGateAxis() {
        if (state.geometry.rc && state.geometry.pin) return bearingDeg(state.geometry.rc, state.geometry.pin);
        const wlMid = gateMid(state.geometry.wlA, state.geometry.wlB);
        const wwMid = gateMid(state.geometry.wwA, state.geometry.wwB);
        if (wlMid && wwMid) return bearingDeg(wlMid, wwMid) + 90;
        return null;
      }

      function computeAnalysis() {
        const g = state.geometry;
        const metrics = [];
        const wlMid = gateMid(g.wlA, g.wlB);
        const wwMid = gateMid(g.wwA, g.wwB);
        const optimal = computeOptimalStartPoint(g.rc, g.pin, g.reach);
        metrics.push(card(
          "Optimal start line point",
          optimal?.label || "N/A",
          optimal?.detail || "Need RC, pin, and reach mark",
          optimal?.confidence || "Low confidence"
        ));

        metrics.push(card("WL gate bias in meters", fmtNum(computeGateBias(g.wlA, g.wlB, g.reach)), "Positive favors starboard side", confidenceFor(g.wlA && g.wlB && g.reach)));

        const pinToReach = g.pin && g.reach ? distanceMeters(g.pin, g.reach) : null;
        const rcToReach = g.rc && g.reach ? distanceMeters(g.rc, g.reach) : null;
        metrics.push(card(
          "Start line distances to reach",
          `${fmtNum(pinToReach)}m / ${fmtNum(rcToReach)}m`,
          `Difference: ${fmtNum(pinToReach != null && rcToReach != null ? pinToReach - rcToReach : null)}m (pin - RC)`,
          confidenceFor(g.pin && g.rc && g.reach)
        ));

        const twa = (g.midpoint && g.reach && g.courseAxisDeg != null) ? signedAngleDeg(g.courseAxisDeg, bearingDeg(g.midpoint, g.reach)) : null;
        metrics.push(card("TWA midpoint to reach", `${fmtNum(twa)}°`, "Angle between course axis and midpoint→reach vector", confidenceFor(g.midpoint && g.reach && g.courseAxisDeg != null)));

        metrics.push(card("WW gate bias in meters", fmtNum(computeGateBias(g.wwA, g.wwB, g.reach)), "Positive favors starboard side", confidenceFor(g.wwA && g.wwB && g.reach)));

        metrics.push(card(
          "Course axis and gate axis",
          `${fmtNum(g.courseAxisDeg)}° / ${fmtNum(g.gateAxisDeg)}°`,
          `Course from WL→WW and gate orientation`,
          confidenceFor(g.courseAxisDeg != null && g.gateAxisDeg != null)
        ));

        state.analysis.metrics = metrics;
      }

      function computeOptimalStartPoint(rc, pin, reach) {
        if (!rc || !pin || !reach) return null;
        const dPin = distanceMeters(pin, reach);
        const dRc = distanceMeters(rc, reach);
        if (Math.abs(dPin - dRc) < 3) return { label: "Middle", detail: "Line appears close to square", confidence: "Measured" };
        if (dPin < dRc) return { label: "Pin favored", detail: `Pin shorter by ${fmtNum(dRc - dPin)}m`, confidence: "Measured" };
        return { label: "Boat favored", detail: `RC shorter by ${fmtNum(dPin - dRc)}m`, confidence: "Measured" };
      }

      function computeGateBias(a, b, target) {
        if (!a || !b || !target) return null;
        return distanceMeters(a, target) - distanceMeters(b, target);
      }

      function card(label, value, sub, confidence) {
        return { label, value: String(value ?? "N/A"), sub, confidence };
      }

      function renderAll() {
        renderTabs();
        renderSetup();
        renderReplay();
        renderAnalysis();
      }

      function renderSetup() {
        els.setupMode.classList.toggle("active", state.ui.mode === "setup");
        els.replayMode.classList.toggle("active", state.ui.mode === "replay");
        els.analysisMode.classList.toggle("active", state.ui.mode === "analysis");
        els.setupErrors.innerHTML = state.ui.errors.map(e => `<div>${e}</div>`).join("");
        els.detectedMarks.textContent = `Detected marks: ${state.telemetry.detectedMarks.join(", ") || "none loaded yet."}`;
      }

      function renderReplay() {
        const c = state.replay.cursorTimeMs;
        const start = state.replay.raceWindow.startMs;
        const end = state.replay.raceWindow.endMs;
        els.cursorTime.textContent = c ? `Replay cursor (event time): ${formatEventTime(c)}` : "Pick race in setup.";
        els.replayStatus.textContent = c
          ? `Window: ${Math.round(state.replay.window.beforeMs/1000)}s before / ${Math.round(state.replay.window.afterMs/1000)}s after • ${state.replay.activePoints.length} points`
          : "No replay data loaded.";
        if (start && end) syncScrubberFromCursor();
        drawCourse();
      }

      function renderAnalysis() {
        const html = state.analysis.metrics.map(m => `
          <article class="metric-card">
            <div class="metric-label">${m.label}</div>
            <div class="metric-value">${m.value}</div>
            <div class="metric-sub">${m.sub}</div>
            <div class="chip">${m.confidence}</div>
          </article>
        `).join("");
        els.analysisCards.innerHTML = html || "<div class='status'>No analysis yet.</div>";
      }

      function drawCourse() {
        const canvas = els.courseCanvas;
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);

        ctx.clearRect(0, 0, rect.width, rect.height);

        const g = state.geometry;
        const pts = [g.rc,g.pin,g.wwA,g.wwB,g.wlA,g.wlB,g.reach].filter(Boolean);
        if (!pts.length) {
          ctx.fillStyle = "#9cb4d3";
          ctx.fillText("No geometry available in current telemetry window.", 12, 22);
          return;
        }

        const projector = makeCourseProjector(pts, rect.width, rect.height, g.wlA, g.wlB, g.wwA, g.wwB);
        const drawMark = (p, color, label) => {
          if (!p) return;
          const xy = projector(p);
          ctx.beginPath(); ctx.arc(xy.x, xy.y, 6, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
          ctx.fillStyle = "#eaf3ff"; ctx.font = "12px sans-serif"; ctx.fillText(label, xy.x + 8, xy.y - 8);
        };

        drawSegment(ctx, projector, g.rc, g.pin, "#77b2ff", 2);
        drawSegment(ctx, projector, g.wlA, g.wlB, "#38bdf8", 2);
        drawSegment(ctx, projector, g.wwA, g.wwB, "#38bdf8", 2);
        drawSegment(ctx, projector, gateMid(g.wlA,g.wlB), gateMid(g.wwA,g.wwB), "#8be9fd", 1);

        const trackPts = state.replay.activePoints.filter(p => p.type === "boat").slice(-100);
        if (trackPts.length > 1) {
          ctx.strokeStyle = "#fcd34d";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          trackPts.forEach((p,i) => {
            const xy = projector(p);
            if (i === 0) ctx.moveTo(xy.x, xy.y); else ctx.lineTo(xy.x, xy.y);
          });
          ctx.stroke();
        }

        drawMark(g.rc, "#7dd3fc", "RC");
        drawMark(g.pin, "#a7f3d0", "PIN");
        drawMark(g.wwA, "#f472b6", "WW A");
        drawMark(g.wwB, "#f472b6", "WW B");
        drawMark(g.wlA, "#f59e0b", "WL A");
        drawMark(g.wlB, "#f59e0b", "WL B");
        drawMark(g.reach, "#fb7185", "REACH");

        canvas._projector = projector;
      }

      function makeCourseProjector(points, width, height, wlA, wlB, wwA, wwB) {
        const wlMid = gateMid(wlA, wlB);
        const wwMid = gateMid(wwA, wwB);
        const anchor = wlMid || points[0];
        const courseBearing = (wlMid && wwMid) ? bearingDeg(wlMid, wwMid) : 0;
        const rotation = (0 - courseBearing) * Math.PI/180;

        const local = points.map(p => toLocalMeters(anchor, p));
        const rotated = local.map(pt => rotate(pt.x, pt.y, rotation));
        const xs = rotated.map(p => p.x), ys = rotated.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);

        const pad = 26;
        const spanX = Math.max(1, maxX - minX);
        const spanY = Math.max(1, maxY - minY);
        const scale = Math.min((width - pad * 2) / spanX, (height - pad * 2) / spanY);

        return function project(p) {
          const raw = toLocalMeters(anchor, p);
          const r = rotate(raw.x, raw.y, rotation);
          return {
            x: pad + (r.x - minX) * scale,
            y: height - (pad + (r.y - minY) * scale)
          };
        };
      }

      function moveReachMarkFromCanvasPoint(x, y) {
        const canvas = els.courseCanvas;
        const projector = canvas._projector;
        const g = state.geometry;
        if (!projector || !g.wlA) return;

        const anchor = gateMid(g.wlA, g.wlB) || g.wlA;
        const courseBearing = (gateMid(g.wlA,g.wlB) && gateMid(g.wwA,g.wwB)) ? bearingDeg(gateMid(g.wlA,g.wlB), gateMid(g.wwA,g.wwB)) : 0;
        const rotation = (0 - courseBearing) * Math.PI/180;

        const pts = [g.rc,g.pin,g.wwA,g.wwB,g.wlA,g.wlB,g.reach].filter(Boolean).map(p => rotate(toLocalMeters(anchor,p).x,toLocalMeters(anchor,p).y,rotation));
        const rect = canvas.getBoundingClientRect();
        const pad = 26;
        const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const scale = Math.min((rect.width - pad * 2) / Math.max(1, maxX - minX), (rect.height - pad * 2) / Math.max(1, maxY - minY));

        const rx = ((x - pad) / scale) + minX;
        const ry = (((rect.height - y) - pad) / scale) + minY;
        const unrot = rotate(rx, ry, -rotation);
        const moved = fromLocalMeters(anchor, unrot.x, unrot.y);

        state.geometry.reach = { ...moved, confidence: "Manual" };
        computeAnalysis();
        renderReplay();
        renderAnalysis();
      }

      function eventToCanvasPoint(ev, canvas) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (ev.touches && ev.touches[0]) {
          clientX = ev.touches[0].clientX;
          clientY = ev.touches[0].clientY;
        } else {
          clientX = ev.clientX;
          clientY = ev.clientY;
        }
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function drawSegment(ctx, proj, a, b, color, width) {
        if (!a || !b) return;
        const p1 = proj(a), p2 = proj(b);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      function midpoint(a, b) { return { lat: (a.lat + b.lat)/2, lon: (a.lon + b.lon)/2 }; }
      function gateMid(a, b) { return (a && b) ? midpoint(a,b) : null; }

      function toLocalMeters(origin, p) {
        const R = 6371000;
        const dLat = (p.lat - origin.lat) * Math.PI/180;
        const dLon = (p.lon - origin.lon) * Math.PI/180;
        const x = dLon * Math.cos((p.lat + origin.lat) * Math.PI/360) * R;
        const y = dLat * R;
        return { x, y };
      }

      function fromLocalMeters(origin, x, y) {
        const R = 6371000;
        const lat = origin.lat + (y / R) * 180/Math.PI;
        const lon = origin.lon + (x / (R * Math.cos((lat + origin.lat) * Math.PI/360))) * 180/Math.PI;
        return { lat, lon };
      }

      function distanceMeters(a, b) {
        const p = toLocalMeters(a, b);
        return Math.hypot(p.x, p.y);
      }

      function bearingDeg(a, b) {
        const p = toLocalMeters(a, b);
        return (Math.atan2(p.x, p.y) * 180 / Math.PI + 360) % 360;
      }

      function signedAngleDeg(a, b) {
        let d = ((b - a + 540) % 360) - 180;
        return d;
      }

      function rotate(x, y, rad) {
        return { x: x * Math.cos(rad) - y * Math.sin(rad), y: x * Math.sin(rad) + y * Math.cos(rad) };
      }

      function formatEventTime(ms) {
        const shifted = ms + state.config.timezoneOffsetMinutes * 60000;
        const d = new Date(shifted);
        const YYYY = d.getUTCFullYear();
        const MM = String(d.getUTCMonth()+1).padStart(2, "0");
        const DD = String(d.getUTCDate()).padStart(2, "0");
        const hh = String(d.getUTCHours()).padStart(2, "0");
        const mm = String(d.getUTCMinutes()).padStart(2, "0");
        const ss = String(d.getUTCSeconds()).padStart(2, "0");
        return `${YYYY}-${MM}-${DD} ${hh}:${mm}:${ss} (${state.config.timezoneRaw || "UTC"})`;
      }

      function fmtNum(v) { return (v == null || Number.isNaN(v)) ? "N/A" : Number(v).toFixed(Math.abs(v) >= 100 ? 0 : 1); }
      function confidenceFor(ok) { return ok ? "Measured" : "Low confidence"; }
      function capitalize(s) { return s[0].toUpperCase() + s.slice(1); }

      return { init };
    })();

    window.addEventListener("load", App.init);
  </script>
</body>
</html>
