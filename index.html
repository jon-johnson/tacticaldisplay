<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tactical Display</title>
  <style>
    :root {
      --bg0: #060b16;
      --bg1: #0b1426;
      --glass: rgba(18, 33, 56, 0.74);
      --glass-strong: rgba(16, 31, 52, 0.9);
      --line: rgba(129, 168, 221, 0.24);
      --text: #e8f2ff;
      --muted: #9fb5d6;
      --accent: #53ccff;
      --accent2: #58f2ce;
      --warn: #f59e0b;
      --err: #ef4444;
      --radius: 16px;
      --touch: 46px;
      --shadow: 0 14px 45px rgba(0, 0, 0, 0.45);
      --font: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: var(--font);
      background: radial-gradient(1200px 700px at 90% -10%, #18346255, transparent 65%),
                  radial-gradient(900px 500px at 0% 0%, #1d3d7450, transparent 60%),
                  linear-gradient(160deg, var(--bg0), var(--bg1));
    }
    .app {
      max-width: 1160px;
      margin: 0 auto;
      min-height: 100%;
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .segmented {
      position: sticky;
      top: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(10, 21, 39, 0.85);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    .seg-btn {
      height: var(--touch);
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: transparent;
    }
    .seg-btn.active {
      color: #071421;
      background: linear-gradient(135deg, var(--accent), #8cdeff);
    }
    .mode { display: none; }
    .mode.active { display: block; }
    .glass {
      background: linear-gradient(180deg, rgba(22, 39, 65, 0.88), var(--glass-strong));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    h1, h2, h3, p { margin: 0; }
    h2 { font-size: 1.1rem; margin-bottom: 10px; }
    .stack { display: grid; gap: 10px; }
    .field { display: grid; gap: 6px; }
    .grid-2 { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 780px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
    label { color: var(--muted); font-size: 0.86rem; }
    input, textarea, select {
      width: 100%;
      min-height: var(--touch);
      border-radius: 12px;
      border: 1px solid #345681;
      background: #0b182d;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.98rem;
    }
    textarea { min-height: 104px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #4fc6ff6a; border-color: #63d4ff; }
    .helper { color: var(--muted); font-size: 0.8rem; }
    .error { color: var(--err); font-size: 0.82rem; }
    .status { color: #bfd3ef; font-size: 0.84rem; }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      color: #d2e9ff;
      border: 1px solid #3d5f90;
      border-radius: 999px;
      padding: 3px 9px;
      background: rgba(14, 33, 57, 0.76);
    }
    .btn {
      min-height: var(--touch);
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      letter-spacing: 0.01em;
      background: linear-gradient(135deg, var(--accent), #7cdfff);
      color: #071522;
    }
    .btn.secondary {
      background: #1a3356;
      color: var(--text);
      border: 1px solid #35547f;
    }
    .btn:disabled { opacity: 0.65; }
    .sticky-actions {
      position: sticky;
      bottom: 0;
      margin-top: 8px;
      padding-top: 8px;
      background: linear-gradient(to top, #0a1425f5, #0a142500);
    }
    .panel-soft {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .replay-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 980px) { .replay-grid { grid-template-columns: 1.7fr 1fr; } }
    canvas {
      width: 100%;
      min-height: 390px;
      height: min(63vh, 600px);
      border-radius: 14px;
      border: 1px solid var(--line);
      background: radial-gradient(800px 400px at 50% 50%, #173a60, #0b1627 74%);
      display: block;
      touch-action: none;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row .btn { flex: 1 1 90px; }
    .metric-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 900px) { .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .metric {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #162845d4, #11203aee);
      display: grid;
      gap: 8px;
    }
    .metric h3 { font-size: 0.96rem; color: #d8e8ff; }
    .metric .value { font-size: clamp(1.55rem, 4.8vw, 2rem); font-weight: 800; letter-spacing: 0.01em; line-height: 1.12; }
    .metric .sub { font-size: 0.88rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="app">
    <nav id="nav" class="segmented"></nav>

    <section id="setup" class="mode active">
      <form id="setupForm" class="glass stack" novalidate>
        <h2>Setup · Tactical Display</h2>

        <div class="field">
          <label for="watchUrl">RaceSense Watch URL</label>
          <input id="watchUrl" name="watchUrl" type="url" required spellcheck="false" autocapitalize="none" enterkeyhint="next" placeholder="https://vakaros-racesense.web.app/watch/{event}/{division}?race-day=3" />
          <div class="helper">Paste full watch link to auto-detect event, division, and race-day.</div>
        </div>

        <div class="grid-2">
          <div class="field"><label for="eventId">Event ID</label><input id="eventId" name="eventId" required /></div>
          <div class="field"><label for="division">Division / Class</label><input id="division" name="division" placeholder="M32" /></div>
          <div class="field"><label for="raceDay">Race day</label><input id="raceDay" name="raceDay" type="number" inputmode="numeric" min="1" step="1" placeholder="3" /></div>
          <div class="field"><label for="tzOffset">Event timezone offset (hours)</label><input id="tzOffset" name="tzOffset" type="number" inputmode="decimal" step="0.5" value="0" required /></div>
        </div>

        <div class="grid-2">
          <div class="field"><label for="rcSerials">RC serial(s)</label><input id="rcSerials" name="rcSerials" placeholder="12345, 67890" /></div>
          <div class="field"><label for="pinSerials">Pin serial(s)</label><input id="pinSerials" name="pinSerials" placeholder="22345" /></div>
          <div class="field"><label for="wwSerials">WW gate serial(s)</label><input id="wwSerials" name="wwSerials" placeholder="32345, 32346" /></div>
          <div class="field"><label for="wlSerials">WL gate serial(s)</label><input id="wlSerials" name="wlSerials" placeholder="42345, 42346" /></div>
        </div>

        <div class="field">
          <label for="gunTimes">Gun times (raceNumber,unixTimestamp)</label>
          <textarea id="gunTimes" name="gunTimes" required placeholder="1,1763571840000&#10;2,1763573640000"></textarea>
        </div>

        <div class="panel-soft">
          <strong>Detected mark serials</strong>
          <div id="detectedSerials" class="helper" style="margin-top:6px;">None yet. Load telemetry to detect marks automatically.</div>
        </div>

        <div id="setupError" class="error"></div>
        <div id="setupStatus" class="status"></div>

        <div class="sticky-actions">
          <button id="continueBtn" type="submit" class="btn">Continue to Replay</button>
        </div>
      </form>
    </section>

    <section id="replay" class="mode">
      <div class="replay-grid">
        <div class="glass"><canvas id="courseCanvas"></canvas></div>
        <aside class="glass stack">
          <h2>Replay</h2>
          <div class="field"><label for="raceSelect">Race</label><select id="raceSelect"></select></div>
          <div class="field"><label for="scrubber">Scrubber</label><input id="scrubber" type="range" min="0" max="1000" value="0" /></div>
          <div id="cursorLabel" class="status">Cursor: --</div>
          <div class="row">
            <button class="btn secondary" type="button" data-step="-300000">-5m</button>
            <button class="btn secondary" type="button" data-step="-30000">-30s</button>
            <button class="btn secondary" type="button" data-step="30000">+30s</button>
            <button class="btn secondary" type="button" data-step="300000">+5m</button>
          </div>
          <button id="playPause" class="btn secondary" type="button">Play</button>
          <div id="replayStatus" class="status">Load setup data to begin replay.</div>
          <div class="helper">Tap/click inside map to reposition reach mark repeatedly.</div>
        </aside>
      </div>
    </section>

    <section id="analysis" class="mode">
      <div class="glass stack">
        <h2>Analysis</h2>
        <div id="analysisCards" class="metric-grid"></div>
      </div>
    </section>
  </main>

  <script>
    const FETCH_WINDOW_BEFORE_MS = 120000;
    const FETCH_WINDOW_AFTER_MS = 30000;
    const EARTH = 6371000;

    const appState = {
      config: {
        watchUrl: "",
        eventId: "",
        division: "",
        raceDay: "",
        timezoneOffsetHours: 0,
        rcSerials: [],
        pinSerials: [],
        wwSerials: [],
        wlSerials: [],
        gunTimes: []
      },
      replay: {
        raceNumber: null,
        cursorTimeMs: null,
        playTimer: null
      },
      telemetry: {
        rows: [],
        bySerial: new Map(),
        fetchedRange: null,
        sourceName: ""
      },
      geometry: {
        rc: null,
        pin: null,
        ww: [],
        wl: [],
        reach: null,
        midpoint: null,
        startLineLengthM: null,
        courseAxisDeg: null,
        gateAxisDeg: null
      },
      analysis: { cards: [] },
      ui: {
        mode: "setup",
        loading: false,
        error: "",
        detected: { rc: [], pin: [], ww: [], wl: [] },
        lastCanvasTransform: null
      }
    };

    const el = {
      nav: document.getElementById("nav"),
      setup: document.getElementById("setup"),
      replay: document.getElementById("replay"),
      analysis: document.getElementById("analysis"),
      setupForm: document.getElementById("setupForm"),
      setupError: document.getElementById("setupError"),
      setupStatus: document.getElementById("setupStatus"),
      detectedSerials: document.getElementById("detectedSerials"),
      raceSelect: document.getElementById("raceSelect"),
      scrubber: document.getElementById("scrubber"),
      cursorLabel: document.getElementById("cursorLabel"),
      replayStatus: document.getElementById("replayStatus"),
      playPause: document.getElementById("playPause"),
      canvas: document.getElementById("courseCanvas"),
      analysisCards: document.getElementById("analysisCards")
    };

    function parseRaceSenseUrl(url) {
      try {
        const u = new URL(url.trim());
        const hostOk = /vakaros-racesense\.web\.app$/i.test(u.hostname);
        const parts = u.pathname.split("/").filter(Boolean);
        const watchIdx = parts.findIndex(p => p.toLowerCase() === "watch");
        const eventId = watchIdx >= 0 ? (parts[watchIdx + 1] || "") : "";
        const division = watchIdx >= 0 ? (parts[watchIdx + 2] || "") : "";
        const raceDay = u.searchParams.get("race-day") || u.searchParams.get("raceDay") || "";
        return { eventId, division, raceDay, raw: url.trim(), hostOk, watchPathOk: watchIdx >= 0 };
      } catch {
        return { eventId: "", division: "", raceDay: "", raw: url.trim(), hostOk: false, watchPathOk: false };
      }
    }

    function buildTelemetryRequest(config, afterMs, beforeMs) {
      const params = new URLSearchParams();
      params.set("eventId", config.eventId);
      if (config.division) params.set("division", config.division);
      if (config.raceDay) params.set("raceDay", String(config.raceDay));
      params.set("after", String(afterMs));
      params.set("before", String(beforeMs));

      const firestoreBase = "https://firestore.googleapis.com/v1/projects/vakaros-racesense/databases/(default)/documents";
      const encodedEvent = encodeURIComponent(config.eventId);

      const candidates = [
        {
          name: "web-app-api",
          url: `https://vakaros-racesense.web.app/api/telemetry?${params.toString()}`,
          parser: "json"
        },
        {
          name: "cloud-function-telemetry",
          url: `https://us-central1-vakaros-racesense.cloudfunctions.net/telemetry?${params.toString()}`,
          parser: "json"
        },
        {
          name: "cloud-function-event-data",
          url: `https://us-central1-vakaros-racesense.cloudfunctions.net/getEventTelemetry?${params.toString()}`,
          parser: "json"
        },
        {
          name: "firestore-event-subcollection",
          url: `${firestoreBase}/events/${encodedEvent}/telemetry?pageSize=500`,
          parser: "firestore"
        },
        {
          name: "firestore-telemetry-root",
          url: `${firestoreBase}/telemetry?pageSize=500&mask.fieldPaths=eventId&mask.fieldPaths=timestamp&mask.fieldPaths=lat&mask.fieldPaths=lon&mask.fieldPaths=serial`,
          parser: "firestore"
        }
      ];
      return candidates;
    }

    async function fetchJsonWithTimeout(url, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, {
          headers: { Accept: "application/json" },
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchTelemetryWindow(config, afterMs, beforeMs) {
      const candidates = buildTelemetryRequest(config, afterMs, beforeMs);
      const errors = [];

      for (const candidate of candidates) {
        try {
          const json = await fetchJsonWithTimeout(candidate.url);
          const normalized = normalizeTelemetryRows(json, candidate.parser, config, afterMs, beforeMs);
          if (!normalized.length) {
            errors.push(`${candidate.name}: no usable rows`);
            continue;
          }
          return { rows: normalized, sourceName: candidate.name };
        } catch (err) {
          errors.push(`${candidate.name}: ${err.message}`);
        }
      }

      throw new Error(`Telemetry fetch failed. Tried: ${errors.join(" | ")}`);
    }

    function normalizeTelemetryRows(raw, parserType, config, afterMs, beforeMs) {
      let rows = [];
      if (parserType === "firestore") rows = Array.isArray(raw?.documents) ? raw.documents : [];
      else if (Array.isArray(raw)) rows = raw;
      else if (Array.isArray(raw?.rows)) rows = raw.rows;
      else if (Array.isArray(raw?.data)) rows = raw.data;
      else if (Array.isArray(raw?.documents)) rows = raw.documents;

      const out = [];
      for (const r of rows) {
        const fields = r.fields || r;
        const eventId = readAny(fields, ["eventId", "event_id", "event"]);
        const ts = toNumber(readAny(fields, ["timestamp", "time", "ts", "timestampMs"])) || parseFirestoreTimestamp(readAny(fields, ["timeStamp"]));
        const lat = toNumber(readAny(fields, ["lat", "latitude", "positionLat", "position.lat"]));
        const lon = toNumber(readAny(fields, ["lon", "lng", "longitude", "positionLon", "position.lon"]));
        const serial = String(readAny(fields, ["serial", "deviceSerial", "markSerial", "sourceSerial", "trackerSerial"]) || "").trim();
        const heading = toNumber(readAny(fields, ["heading", "hdg", "courseOverGround", "cog"]));
        const speed = toNumber(readAny(fields, ["speed", "sog", "velocity"]));
        const type = String(readAny(fields, ["type", "deviceType", "assetType", "role"]) || "").toLowerCase();

        if (!ts || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
        if (eventId && config.eventId && String(eventId) !== String(config.eventId)) continue;
        if (ts < afterMs || ts > beforeMs) continue;

        out.push({ timestampMs: ts, lat, lon, serial, heading, speed, type, raw: r });
      }

      out.sort((a, b) => a.timestampMs - b.timestampMs);
      return out;
    }

    function readAny(obj, keys) {
      for (const key of keys) {
        const direct = obj?.[key];
        if (direct !== undefined && direct !== null) return unwrapFirestoreValue(direct);
        if (key.includes(".")) {
          const parts = key.split(".");
          let ref = obj;
          for (const p of parts) ref = ref?.[p];
          if (ref !== undefined && ref !== null) return unwrapFirestoreValue(ref);
        }
      }
      return undefined;
    }

    function unwrapFirestoreValue(v) {
      if (v && typeof v === "object") {
        if ("integerValue" in v) return Number(v.integerValue);
        if ("doubleValue" in v) return Number(v.doubleValue);
        if ("stringValue" in v) return v.stringValue;
        if ("timestampValue" in v) return v.timestampValue;
        if ("mapValue" in v) return v.mapValue.fields || {};
        if ("arrayValue" in v) return (v.arrayValue.values || []).map(unwrapFirestoreValue);
      }
      return v;
    }

    const toNumber = (x) => {
      if (x == null || x === "") return null;
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    };

    const parseFirestoreTimestamp = (v) => {
      if (!v) return null;
      const t = Date.parse(v);
      return Number.isFinite(t) ? t : null;
    };

    function deriveGeometryFromTelemetry(rows, config) {
      const bySerial = new Map();
      rows.forEach(r => {
        if (!r.serial) return;
        if (!bySerial.has(r.serial)) bySerial.set(r.serial, []);
        bySerial.get(r.serial).push(r);
      });

      const classify = (serials, fallbackTypes) => {
        const explicit = serials.filter(Boolean).map(String);
        if (explicit.length) return explicit;
        const inferred = [];
        bySerial.forEach((series, serial) => {
          const t = (series[series.length - 1]?.type || "");
          if (fallbackTypes.some(ft => t.includes(ft))) inferred.push(serial);
        });
        return inferred;
      };

      const rcS = classify(config.rcSerials, ["rc", "committee"]);
      const pinS = classify(config.pinSerials, ["pin"]);
      const wwS = classify(config.wwSerials, ["ww", "weather"]);
      const wlS = classify(config.wlSerials, ["wl", "leeward"]);

      const latestPos = (serial) => {
        const series = bySerial.get(serial) || [];
        return series.length ? series[series.length - 1] : null;
      };
      const meanPos = (serials) => {
        const pts = serials.map(latestPos).filter(Boolean);
        if (!pts.length) return null;
        return {
          lat: pts.reduce((a, p) => a + p.lat, 0) / pts.length,
          lon: pts.reduce((a, p) => a + p.lon, 0) / pts.length,
          confidence: serials.length ? "Measured" : "Inferred"
        };
      };

      const rc = meanPos(rcS);
      const pin = meanPos(pinS);
      const ww = wwS.map(latestPos).filter(Boolean).map(p => ({ lat: p.lat, lon: p.lon }));
      const wl = wlS.map(latestPos).filter(Boolean).map(p => ({ lat: p.lat, lon: p.lon }));

      const midpoint = (rc && pin) ? { lat: (rc.lat + pin.lat) / 2, lon: (rc.lon + pin.lon) / 2 } : null;
      const startLineLengthM = (rc && pin) ? distanceMeters(rc, pin) : null;

      const wwCenter = ww.length ? centroid(ww) : null;
      const wlCenter = wl.length ? centroid(wl) : null;
      const courseAxisDeg = (wlCenter && wwCenter) ? bearingDeg(wlCenter, wwCenter) : null;
      const gateAxisDeg = (rc && pin) ? bearingDeg(pin, rc) : null;

      let reach = appState.geometry.reach;
      if (!reach && midpoint && wwCenter) {
        reach = {
          lat: midpoint.lat + (wwCenter.lat - midpoint.lat) * 0.45,
          lon: midpoint.lon + (wwCenter.lon - midpoint.lon) * 0.45,
          confidence: "Inferred"
        };
      }

      appState.ui.detected = { rc: rcS, pin: pinS, ww: wwS, wl: wlS };
      return { rc, pin, ww, wl, reach, midpoint, startLineLengthM, courseAxisDeg, gateAxisDeg, bySerial };
    }

    function computeAnalysis(geometry, config) {
      const cards = [];
      const add = (title, value, sub, confidence) => cards.push({ title, value, sub, confidence });

      const { rc, pin, ww, wl, reach, midpoint, courseAxisDeg, gateAxisDeg } = geometry;
      const wwCenter = ww.length ? centroid(ww) : null;
      const wlCenter = wl.length ? centroid(wl) : null;

      let optimal = "N/A";
      let optimalSub = "Need RC, pin, and windward reference";
      if (rc && pin && wwCenter) {
        const bias = signedDistanceToLine(wwCenter, pin, rc);
        optimal = bias > 0 ? "Boat End (RC)" : (bias < 0 ? "Pin End" : "Neutral");
        optimalSub = `Projection to windward axis: ${Math.abs(bias).toFixed(1)} m`;
      }
      add("Optimal start line point", optimal, optimalSub, rc && pin && wwCenter ? "Measured" : "Low confidence");

      let wlBias = "N/A";
      let wlSub = "Need WL gate and start line";
      if (wl.length >= 2 && rc && pin) {
        const wlBiasM = signedDistanceToLine(centroid(wl), pin, rc);
        wlBias = `${wlBiasM.toFixed(1)} m`;
        wlSub = wlBiasM > 0 ? "Favoring RC side" : "Favoring pin side";
      }
      add("WL gate bias", wlBias, wlSub, wl.length >= 2 ? "Measured" : "Low confidence");

      let distVal = "N/A";
      let distSub = "Need reach mark plus RC & pin";
      if (reach && rc && pin) {
        const p = distanceMeters(pin, reach);
        const r = distanceMeters(rc, reach);
        distVal = `Pin ${p.toFixed(1)} m · RC ${r.toFixed(1)} m`;
        distSub = `Difference: ${(r - p).toFixed(1)} m`;
      }
      add("Start line to reach distances", distVal, distSub, reach?.confidence || "Manual");

      let twa = "N/A";
      let twaSub = "Need midpoint, reach, and course axis";
      if (midpoint && reach && Number.isFinite(courseAxisDeg)) {
        const br = bearingDeg(midpoint, reach);
        const delta = normalize180(br - courseAxisDeg);
        twa = `${delta.toFixed(1)}°`;
        twaSub = `Bearing midpoint→reach ${br.toFixed(1)}° vs axis ${courseAxisDeg.toFixed(1)}°`;
      }
      add("TWA midpoint to reach", twa, twaSub, reach ? "Measured" : "Low confidence");

      let wwBias = "N/A";
      let wwSub = "Need WW gate and start line";
      if (ww.length >= 2 && rc && pin) {
        const wwBiasM = signedDistanceToLine(centroid(ww), pin, rc);
        wwBias = `${wwBiasM.toFixed(1)} m`;
        wwSub = wwBiasM > 0 ? "Favoring RC side" : "Favoring pin side";
      }
      add("WW gate bias", wwBias, wwSub, ww.length >= 2 ? "Measured" : "Low confidence");

      const courseTxt = Number.isFinite(courseAxisDeg) ? `${courseAxisDeg.toFixed(1)}°` : "N/A";
      const gateTxt = Number.isFinite(gateAxisDeg) ? `${gateAxisDeg.toFixed(1)}°` : "N/A";
      add("Course axis and gate axis", `${courseTxt} / ${gateTxt}`, "Course axis (WL→WW) / Gate axis (Pin→RC)", Number.isFinite(courseAxisDeg) ? "Measured" : "Low confidence");

      return cards;
    }

    function distanceMeters(a, b) {
      const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
      const dLat = lat2 - lat1;
      const dLon = toRad(b.lon - a.lon);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * EARTH * Math.asin(Math.sqrt(h));
    }

    function bearingDeg(a, b) {
      const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
      const dLon = toRad(b.lon - a.lon);
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function signedDistanceToLine(point, a, b) {
      const ref = a;
      const p = project(ref, point), pa = project(ref, a), pb = project(ref, b);
      const vx = pb.x - pa.x, vy = pb.y - pa.y;
      const wx = p.x - pa.x, wy = p.y - pa.y;
      const cross = vx * wy - vy * wx;
      const mag = Math.hypot(vx, vy) || 1;
      return cross / mag;
    }

    function centroid(points) {
      return {
        lat: points.reduce((s, p) => s + p.lat, 0) / points.length,
        lon: points.reduce((s, p) => s + p.lon, 0) / points.length
      };
    }

    function project(origin, point) {
      const x = toRad(point.lon - origin.lon) * EARTH * Math.cos(toRad((origin.lat + point.lat) / 2));
      const y = toRad(point.lat - origin.lat) * EARTH;
      return { x, y };
    }

    const toRad = (d) => d * Math.PI / 180;
    const toDeg = (r) => r * 180 / Math.PI;
    const normalize180 = (a) => ((a + 540) % 360) - 180;

    function formatEventTime(ms) {
      const shiftMs = Number(appState.config.timezoneOffsetHours || 0) * 3600000;
      const d = new Date(ms + shiftMs);
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
    }

    function parseGunTimes(text) {
      const lines = text.split(/\n+/).map(x => x.trim()).filter(Boolean);
      const out = [];
      for (const line of lines) {
        const [raceRaw, tsRaw] = line.split(",").map(s => s.trim());
        const race = Number(raceRaw);
        const ts = Number(tsRaw);
        if (!Number.isFinite(race) || !Number.isFinite(ts)) throw new Error(`Invalid gun time line: ${line}`);
        out.push({ raceNumber: race, gunTimeMs: ts });
      }
      out.sort((a, b) => a.raceNumber - b.raceNumber);
      return out;
    }

    function parseSerialList(v) {
      return v.split(/[\s,]+/).map(x => x.trim()).filter(Boolean);
    }

    function updateDetectedPanel() {
      const d = appState.ui.detected;
      el.detectedSerials.textContent = `RC: ${d.rc.join(", ") || "-"} | Pin: ${d.pin.join(", ") || "-"} | WW: ${d.ww.join(", ") || "-"} | WL: ${d.wl.join(", ") || "-"}`;
    }

    function renderNav() {
      const tabs = ["setup", "replay", "analysis"];
      el.nav.innerHTML = tabs.map(t => `<button class="seg-btn ${appState.ui.mode === t ? "active" : ""}" data-mode="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join("");
      [...el.nav.querySelectorAll("button")].forEach(btn => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });
    }

    function setMode(mode) {
      appState.ui.mode = mode;
      ["setup", "replay", "analysis"].forEach(m => {
        document.getElementById(m).classList.toggle("active", m === mode);
      });
      renderNav();
    }

    async function handleSetupSubmit(evt) {
      evt.preventDefault();
      el.setupError.textContent = "";
      el.setupStatus.textContent = "Validating and fetching telemetry...";

      try {
        const fd = new FormData(el.setupForm);
        const parsedLink = parseRaceSenseUrl(String(fd.get("watchUrl") || ""));
        const cfg = {
          watchUrl: String(fd.get("watchUrl") || "").trim(),
          eventId: String(fd.get("eventId") || "").trim() || parsedLink.eventId,
          division: String(fd.get("division") || "").trim() || parsedLink.division,
          raceDay: String(fd.get("raceDay") || "").trim() || parsedLink.raceDay,
          timezoneOffsetHours: Number(fd.get("tzOffset") || 0),
          rcSerials: parseSerialList(String(fd.get("rcSerials") || "")),
          pinSerials: parseSerialList(String(fd.get("pinSerials") || "")),
          wwSerials: parseSerialList(String(fd.get("wwSerials") || "")),
          wlSerials: parseSerialList(String(fd.get("wlSerials") || "")),
          gunTimes: parseGunTimes(String(fd.get("gunTimes") || ""))
        };
        if (!cfg.eventId) throw new Error("Event ID is required.");
        if (!cfg.gunTimes.length) throw new Error("At least one gun time is required.");
        if (!Number.isFinite(cfg.timezoneOffsetHours)) throw new Error("Timezone offset must be numeric.");

        appState.config = cfg;
        const firstRace = cfg.gunTimes[0];
        appState.replay.raceNumber = firstRace.raceNumber;
        appState.replay.cursorTimeMs = firstRace.gunTimeMs;

        const afterMs = appState.replay.cursorTimeMs - FETCH_WINDOW_BEFORE_MS;
        const beforeMs = appState.replay.cursorTimeMs + FETCH_WINDOW_AFTER_MS;

        const telemetry = await fetchTelemetryWindow(cfg, afterMs, beforeMs);
        applyTelemetryResult(telemetry, afterMs, beforeMs, cfg);

        populateRaceSelector();
        renderReplay();

        el.setupStatus.textContent = `Loaded ${telemetry.rows.length} telemetry rows via ${telemetry.sourceName}.`;
        setMode("replay");
      } catch (err) {
        el.setupError.textContent = err.message;
        el.setupStatus.textContent = "";
      }
    }

    function populateRaceSelector() {
      const list = appState.config.gunTimes;
      el.raceSelect.innerHTML = list.map(g => `<option value="${g.raceNumber}">Race ${g.raceNumber} · Gun ${formatEventTime(g.gunTimeMs)}</option>`).join("");
      el.raceSelect.value = String(appState.replay.raceNumber || list[0]?.raceNumber || "");
    }

    function applyTelemetryResult(telemetry, afterMs, beforeMs, config) {
      appState.telemetry.rows = telemetry.rows;
      appState.telemetry.sourceName = telemetry.sourceName;
      appState.telemetry.fetchedRange = { afterMs, beforeMs };
      appState.geometry = deriveGeometryFromTelemetry(telemetry.rows, config);
      appState.analysis.cards = computeAnalysis(appState.geometry, config);
      updateDetectedPanel();
      renderAnalysis();
    }

    async function refreshTelemetryForCursor() {
      const cfg = appState.config;
      const c = appState.replay.cursorTimeMs;
      const afterMs = c - FETCH_WINDOW_BEFORE_MS;
      const beforeMs = c + FETCH_WINDOW_AFTER_MS;
      const existing = appState.telemetry.fetchedRange;
      if (existing && afterMs >= existing.afterMs && beforeMs <= existing.beforeMs) return;

      el.replayStatus.textContent = "Fetching new telemetry window...";
      try {
        const telemetry = await fetchTelemetryWindow(cfg, afterMs, beforeMs);
        applyTelemetryResult(telemetry, afterMs, beforeMs, cfg);
        el.replayStatus.textContent = `Telemetry updated (${telemetry.rows.length} rows / ${telemetry.sourceName}).`;
      } catch (err) {
        el.replayStatus.textContent = err.message;
      }
    }

    function renderReplay() {
      if (!appState.replay.cursorTimeMs) return;
      el.cursorLabel.textContent = `Cursor: ${formatEventTime(appState.replay.cursorTimeMs)} (event time)`;

      const race = appState.config.gunTimes.find(g => g.raceNumber === appState.replay.raceNumber);
      if (race) {
        const t = (appState.replay.cursorTimeMs - race.gunTimeMs + 45 * 60000) / (90 * 60000);
        el.scrubber.value = String(Math.max(0, Math.min(1000, Math.round(t * 1000))));
      }

      drawCourse();
    }

    function renderAnalysis() {
      el.analysisCards.innerHTML = appState.analysis.cards.map(c => `
        <article class="metric">
          <h3>${c.title}</h3>
          <div class="value">${c.value}</div>
          <div class="sub">${c.sub}</div>
          <span class="tag">${c.confidence}</span>
        </article>
      `).join("");
    }

    function buildCourseTransform(points, geometry, width, height) {
      const anchor = points[0];
      const toLocal = (p) => {
        const rel = project(anchor, p);
        return { x: rel.x, y: rel.y };
      };

      const courseAxis = Number.isFinite(geometry.courseAxisDeg) ? geometry.courseAxisDeg : 0;
      const rotationRad = -toRad(90 - courseAxis);
      const cosR = Math.cos(rotationRad);
      const sinR = Math.sin(rotationRad);
      const rotate = (xy) => ({
        x: xy.x * cosR - xy.y * sinR,
        y: xy.x * sinR + xy.y * cosR
      });

      const rotated = points.map(p => rotate(toLocal(p)));
      const minX = Math.min(...rotated.map(p => p.x));
      const maxX = Math.max(...rotated.map(p => p.x));
      const minY = Math.min(...rotated.map(p => p.y));
      const maxY = Math.max(...rotated.map(p => p.y));
      const pad = Math.max(26, Math.min(42, width * 0.08));
      const spanX = Math.max(1, maxX - minX);
      const spanY = Math.max(1, maxY - minY);
      const scale = Math.min((width - pad * 2) / spanX, (height - pad * 2) / spanY);

      const toCanvas = (p) => {
        const rot = rotate(toLocal(p));
        return {
          x: pad + (rot.x - minX) * scale,
          y: height - (pad + (rot.y - minY) * scale)
        };
      };

      const fromCanvas = (x, y) => {
        const rx = minX + (x - pad) / scale;
        const ry = minY + (height - y - pad) / scale;
        const invX = rx * cosR + ry * sinR;
        const invY = -rx * sinR + ry * cosR;
        const lat = anchor.lat + toDeg(invY / EARTH);
        const lon = anchor.lon + toDeg(invX / (EARTH * Math.cos(toRad(anchor.lat))));
        return { lat, lon };
      };

      return { toCanvas, fromCanvas };
    }

    function drawCourse() {
      const canvas = el.canvas;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const g = appState.geometry;
      const markSet = new Set([...(appState.ui.detected.rc || []), ...(appState.ui.detected.pin || []), ...(appState.ui.detected.ww || []), ...(appState.ui.detected.wl || [])]);
      const boats = appState.telemetry.rows.filter(r => r.timestampMs <= appState.replay.cursorTimeMs && r.serial && !markSet.has(r.serial));
      const pts = [g.rc, g.pin, ...g.ww, ...g.wl, g.reach, ...boats].filter(Boolean);

      ctx.clearRect(0, 0, rect.width, rect.height);
      if (!pts.length) {
        ctx.fillStyle = "#c6dcff";
        ctx.font = "600 14px Inter";
        ctx.fillText("No geometry available.", 20, 28);
        return;
      }

      const transform = buildCourseTransform(pts, g, rect.width, rect.height);
      appState.ui.lastCanvasTransform = transform;

      const line = (a, b, color, width = 2, dash = []) => {
        const pa = transform.toCanvas(a), pb = transform.toCanvas(b);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.setLineDash(dash);
        ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
        ctx.restore();
      };

      if (g.wl.length >= 2) line(g.wl[0], g.wl[1], "#7ab8ff", 3);
      if (g.ww.length >= 2) line(g.ww[0], g.ww[1], "#7af0d0", 3);
      if (g.pin && g.rc) line(g.pin, g.rc, "#ffc978", 3);
      if (g.midpoint && g.reach) line(g.midpoint, g.reach, "#f5c6ff", 2, [5, 4]);
      if (g.wl.length && g.ww.length) line(centroid(g.wl), centroid(g.ww), "#8da7ff", 2, [8, 4]);

      const drawPoint = (p, label, color, r = 6) => {
        if (!p) return;
        const m = transform.toCanvas(p);
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(m.x, m.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#eaf4ff";
        ctx.font = "600 12px Inter";
        ctx.fillText(label, m.x + 9, m.y - 7);
      };

      drawPoint(g.rc, "RC", "#ffb86f");
      drawPoint(g.pin, "Pin", "#ffd77d");
      g.ww.forEach((p, i) => drawPoint(p, `WW${i+1}`, "#56f2cb"));
      g.wl.forEach((p, i) => drawPoint(p, `WL${i+1}`, "#60a9ff"));
      drawPoint(g.reach, "Reach", "#ff95db", 7);

      const byBoat = new Map();
      boats.forEach(b => {
        if (!byBoat.has(b.serial)) byBoat.set(b.serial, []);
        byBoat.get(b.serial).push(b);
      });
      ctx.strokeStyle = "#ffffff70";
      ctx.lineWidth = 1.2;
      byBoat.forEach(track => {
        if (track.length < 2) return;
        ctx.beginPath();
        track.forEach((p, i) => {
          const m = transform.toCanvas(p);
          if (i === 0) ctx.moveTo(m.x, m.y);
          else ctx.lineTo(m.x, m.y);
        });
        ctx.stroke();
      });

      ctx.fillStyle = "#cfe2ff";
      ctx.font = "600 12px Inter";
      ctx.fillText("Course rendered on vertical axis (WW top / WL bottom)", 14, rect.height - 12);
    }

    function handleWatchUrlInput() {
      const input = document.getElementById("watchUrl");
      const parsed = parseRaceSenseUrl(input.value);
      if (parsed.eventId) document.getElementById("eventId").value = parsed.eventId;
      if (parsed.division) document.getElementById("division").value = parsed.division;
      if (parsed.raceDay) document.getElementById("raceDay").value = parsed.raceDay;
      if (input.value.trim() && (!parsed.hostOk || !parsed.watchPathOk)) {
        el.setupError.textContent = "URL parsed, but host/path does not look like a standard RaceSense watch link.";
      } else if (el.setupError.textContent.includes("does not look like")) {
        el.setupError.textContent = "";
      }
    }

    function setCursor(ms) {
      appState.replay.cursorTimeMs = ms;
      renderReplay();
      refreshTelemetryForCursor();
    }

    function hookEvents() {
      renderNav();
      document.getElementById("watchUrl").addEventListener("input", handleWatchUrlInput);
      document.getElementById("watchUrl").addEventListener("change", handleWatchUrlInput);
      document.getElementById("watchUrl").addEventListener("paste", () => setTimeout(handleWatchUrlInput, 0));
      el.setupForm.addEventListener("submit", handleSetupSubmit);

      el.raceSelect.addEventListener("change", () => {
        const race = Number(el.raceSelect.value);
        appState.replay.raceNumber = race;
        const gun = appState.config.gunTimes.find(g => g.raceNumber === race);
        if (gun) setCursor(gun.gunTimeMs);
      });

      el.scrubber.addEventListener("input", () => {
        const race = appState.config.gunTimes.find(g => g.raceNumber === appState.replay.raceNumber);
        if (!race) return;
        const frac = Number(el.scrubber.value) / 1000;
        const ms = race.gunTimeMs - 45 * 60000 + frac * (90 * 60000);
        setCursor(ms);
      });

      document.querySelectorAll("button[data-step]").forEach(btn => {
        btn.addEventListener("click", () => setCursor((appState.replay.cursorTimeMs || Date.now()) + Number(btn.dataset.step)));
      });

      el.playPause.addEventListener("click", () => {
        if (appState.replay.playTimer) {
          clearInterval(appState.replay.playTimer);
          appState.replay.playTimer = null;
          el.playPause.textContent = "Play";
          return;
        }
        appState.replay.playTimer = setInterval(() => setCursor((appState.replay.cursorTimeMs || Date.now()) + 1000), 250);
        el.playPause.textContent = "Pause";
      });

      const moveReach = (evt) => {
        const transform = appState.ui.lastCanvasTransform;
        if (!transform) return;

        const rect = el.canvas.getBoundingClientRect();
        const x = (evt.touches?.[0]?.clientX ?? evt.clientX) - rect.left;
        const y = (evt.touches?.[0]?.clientY ?? evt.clientY) - rect.top;

        const moved = transform.fromCanvas(x, y);
        appState.geometry.reach = { lat: moved.lat, lon: moved.lon, confidence: "Manual" };
        appState.analysis.cards = computeAnalysis(appState.geometry, appState.config);
        renderReplay();
        renderAnalysis();
      };
      el.canvas.addEventListener("click", moveReach);
      el.canvas.addEventListener("touchstart", moveReach, { passive: true });

      window.addEventListener("resize", renderReplay);
    }

    hookEvents();
  </script>
</body>
</html>
