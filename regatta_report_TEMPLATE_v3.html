<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M32 Regatta Report Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
:root{
  --bg:#0a0e14;--bg2:#0f1520;--bg3:#141c28;--bg4:#1a2235;
  --text:#e0e8f0;--muted:#7a9ab0;--muted2:#3a5060;
  --cyan:#00ccff;--green:#00ff99;--orange:#ff8c00;--red:#ff4466;--yellow:#ffcc00;
  --purple:#a78bfa;--pink:#f472b6;
  --good:#00ff99;--warn:#ffcc00;--bad:#ff4466;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--muted2);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.hdr-title{font-family:Orbitron,monospace;font-size:15px;font-weight:900;color:var(--cyan);letter-spacing:2px}
.hdr-sub{color:var(--muted);font-size:11px}
.hdr-r{margin-left:auto;display:flex;gap:12px;align-items:center;font-size:11px;color:var(--muted)}
.hi{color:var(--cyan)}

/* ── DAY TABS ── */
.day-tabs{display:flex;gap:2px;background:var(--bg);padding:8px 20px 0;border-bottom:1px solid var(--muted2)}
.day-tab{font-family:Orbitron,monospace;font-size:11px;font-weight:700;padding:8px 18px;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:1px}
.day-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.day-tab:hover:not(.active){color:var(--text)}
.day-tab.loading::after{content:' ⋯';color:var(--yellow)}
.day-tab.done::after{content:' ✓';color:var(--green);font-size:9px}

/* ── RACE TABS ── */
.race-tabs{display:flex;gap:2px;background:var(--bg2);padding:6px 20px 0;border-bottom:1px solid var(--muted2);flex-wrap:wrap}
.race-tab{font-family:Orbitron,monospace;font-size:10px;font-weight:700;padding:6px 14px;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.race-tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.race-tab:hover:not(.active){color:var(--text)}
.race-tab.loaded{color:var(--muted)}
.race-tab.loaded.active{color:var(--yellow)}
.race-tab.avg-tab{color:var(--purple)}
.race-tab.avg-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.race-print-header{display:none}

/* ── CONTENT PANELS ── */
.day-panel{display:none}.day-panel.active{display:block}
.race-panel{display:none;padding:16px 20px}.race-panel.active{display:block}

/* ── LOADING / STATUS ── */
.load-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.load-spinner{width:40px;height:40px;border:3px solid var(--muted2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-family:Orbitron,monospace;font-size:12px;color:var(--cyan);letter-spacing:2px}
.load-sub{color:var(--muted);font-size:11px}
.err{color:var(--red);font-family:Orbitron,monospace;font-size:11px;padding:20px;text-align:center}

/* ── STRIP (summary bar) ── */
.strip{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0;margin-bottom:12px;border-bottom:1px solid var(--muted2)}
.sc{background:var(--bg2);border:1px solid var(--muted2);border-radius:4px;padding:6px 12px;min-width:100px}
.sv{font-family:Orbitron,monospace;font-size:13px;font-weight:700;color:var(--cyan)}
.sl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.5px}

/* ── GEOMETRY BAR ── */
.gb-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.gb{background:var(--bg2);border:1px solid var(--muted2);border-radius:4px;padding:8px 12px;flex:1;min-width:160px}
.gb-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px}
.gb-val{font-family:Orbitron,monospace;font-size:13px;font-weight:700;color:var(--cyan)}
.gb-sub{font-size:9px;color:var(--muted2);margin-top:2px}

/* ── SECTION HEADERS ── */
.sh{font-family:Orbitron,monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;
  padding:6px 0;margin:14px 0 8px;border-bottom:1px solid var(--muted2);text-transform:uppercase}

/* ── MAPS ── */
.map2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:stretch}
.mc{background:var(--bg2);border:1px solid var(--muted2);border-radius:6px;overflow:hidden}

.map2>.mc{align-self:stretch}

.replayStartGrid{display:grid;grid-template-columns:minmax(360px,460px) minmax(0,1fr);gap:12px;align-items:start;margin-bottom:8px}
.replayStartGrid>.mc{min-width:0}
.replayPortraitCard{max-width:460px;width:100%;justify-self:start}
.replayCanvasPortrait{display:block;width:100%;max-width:460px;aspect-ratio:3/5;margin:0 auto}
.replayControls{display:flex;align-items:center;gap:8px;font-size:8px;flex-wrap:wrap;justify-content:flex-end}
.replaySpeedGroup{display:flex;align-items:center;gap:4px}
.replaySpeedBtn{background:#0d1624;border:1px solid #2e4965;color:#9cc5ff;border-radius:6px;padding:3px 7px;font:700 9px Orbitron,sans-serif;cursor:pointer}
.replaySpeedBtn.active{background:#123763;color:#fff;border-color:#5aa8ff}
@media (max-width: 980px){.replayStartGrid{grid-template-columns:1fr}.replayPortraitCard{max-width:520px;justify-self:center}}
.mh{font-family:Orbitron,monospace;font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;
  padding:6px 10px;border-bottom:1px solid var(--muted2);background:var(--bg3)}
canvas{display:block;width:100%}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
th{font-family:Orbitron,monospace;font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;
  padding:6px 8px;border-bottom:1px solid var(--muted2);text-align:left;background:var(--bg3)}
td{padding:5px 8px;border-bottom:1px solid var(--bg3)}
tr:hover td{background:var(--bg3)}
.td{display:flex;align-items:center;gap:6px}
.rk{font-family:Orbitron,monospace;font-size:10px;font-weight:700;width:24px;text-align:center}
.rk.g{color:var(--yellow)}
.rk.s{color:#aaa}
.rk.b{color:#c87c3e}
.sn{font-family:Orbitron,monospace;font-size:11px;font-weight:700}
.mn{font-family:Orbitron,monospace;font-size:11px}
.ms{color:var(--muted);font-size:11px}
.br{display:flex;align-items:center;gap:6px}
.bb{background:var(--bg3);border-radius:2px;height:8px;width:80px;overflow:hidden;flex-shrink:0}
.bf{height:100%;border-radius:2px;transition:width .3s}
.bv{font-size:11px;white-space:nowrap}

/* ── BADGE / RANK ── */
.badge{display:inline-block;font-family:Orbitron,monospace;font-size:8px;font-weight:700;
  padding:2px 5px;border-radius:2px;letter-spacing:.5px}
.badge.pos{background:rgba(0,255,153,.15);color:var(--green);border:1px solid rgba(0,255,153,.3)}
.badge.neg{background:rgba(255,68,102,.15);color:var(--red);border:1px solid rgba(255,68,102,.3)}
.badge.neu{background:rgba(122,154,176,.1);color:var(--muted);border:1px solid var(--muted2)}

/* ── NOTES / CAVEATS ── */
.notes{background:var(--bg2);border:1px solid var(--muted2);border-radius:6px;padding:12px 14px;
  font-size:11px;line-height:1.7;color:var(--muted);margin-bottom:12px}
.notes b{color:var(--text)}
.caveat{background:rgba(255,204,0,.06);border:1px solid rgba(255,204,0,.2);border-radius:4px;
  padding:6px 10px;font-size:10px;color:var(--yellow);margin-bottom:8px}
.nc{background:var(--bg3);border-left:3px solid var(--cyan);padding:8px 12px;margin-bottom:8px;font-size:11px;line-height:1.6}
.nt{font-family:Orbitron,monospace;font-size:9px;font-weight:700;color:var(--cyan);margin-bottom:4px;letter-spacing:1px}
.nb{color:var(--muted)}
.good{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}

/* ── DAY SUMMARY ── */
.day-summary{padding:16px 20px}
.ds-section{margin-bottom:24px}
.ds-title{font-family:Orbitron,monospace;font-size:11px;font-weight:700;color:var(--cyan);
  letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--muted2)}
.race-grid{display:grid;gap:4px;margin-bottom:16px}
.rg-head{display:flex;gap:0;font-family:Orbitron,monospace;font-size:9px;color:var(--muted);letter-spacing:.5px}
.rg-boat{width:48px;flex-shrink:0;padding:4px 6px}
.rg-cell{flex:1;min-width:32px;text-align:center;padding:4px 2px;font-size:10px}
.rg-row{display:flex;gap:0;border-bottom:1px solid var(--bg3)}
.rg-row:hover{background:var(--bg2)}
.pos1{background:rgba(255,204,0,.2);color:var(--yellow);font-weight:700;border-radius:2px}
.pos2{background:rgba(200,200,200,.12);color:#ccc}
.pos3{background:rgba(200,124,62,.15);color:#c87c3e}

/* ── DAY HIGHLIGHTS STRIP ── */
.ds-highlights{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.ds-hl{background:var(--bg2);border:1px solid var(--muted2);border-radius:6px;padding:10px 16px;flex:1;min-width:130px}
.ds-hl-val{font-family:Orbitron,monospace;font-size:18px;font-weight:900;color:var(--cyan);line-height:1}
.ds-hl-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:4px}

/* ── SLOPE CHART ── */
.ds-slope-wrap{margin-bottom:20px;background:var(--bg2);border:1px solid var(--muted2);border-radius:6px;padding:12px 16px}
.ds-slope-title{font-family:Orbitron,monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:8px}

/* ── SORTABLE AVERAGES TABLE ── */
.ds-avg-table{width:100%;border-collapse:collapse;font-size:12px}
.ds-avg-table th{font-family:Orbitron,monospace;font-size:8px;color:var(--muted);letter-spacing:.5px;
  padding:6px 8px;border-bottom:2px solid var(--muted2);text-align:left;cursor:pointer;user-select:none;
  white-space:nowrap;background:var(--bg2)}
.ds-avg-table th:hover{color:var(--cyan)}
.ds-avg-table th.sort-asc::after{content:' ↑';color:var(--cyan)}
.ds-avg-table th.sort-desc::after{content:' ↓';color:var(--cyan)}
.ds-avg-table td{padding:6px 8px;border-bottom:1px solid var(--bg3);vertical-align:middle}
.ds-avg-table tr:hover td{background:var(--bg3)}
.ds-avg-table .cell-boat{display:flex;align-items:center;gap:8px}
.ds-avg-table .boat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ds-avg-table .boat-name{font-family:Orbitron,monospace;font-size:10px;font-weight:700}
.ds-avg-table .boat-team{font-size:9px;color:var(--muted);margin-top:1px}
.ds-fin-1{background:rgba(255,204,0,.12);color:var(--yellow);font-family:Orbitron,monospace;font-size:11px;
  font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,204,0,.25)}
.ds-fin-2{background:rgba(200,200,200,.08);color:#bbb;font-family:Orbitron,monospace;font-size:11px;
  font-weight:700;padding:2px 6px;border-radius:3px}
.ds-fin-3{background:rgba(200,124,62,.12);color:#c87c3e;font-family:Orbitron,monospace;font-size:11px;
  font-weight:700;padding:2px 6px;border-radius:3px}
.ds-fin-n{font-family:Orbitron,monospace;font-size:11px;color:var(--muted)}
.ds-delta-pos{color:var(--green);font-family:Orbitron,monospace;font-size:11px;font-weight:700}
.ds-delta-neg{color:var(--red);font-family:Orbitron,monospace;font-size:11px;font-weight:700}
.ds-delta-neu{color:var(--muted);font-family:Orbitron,monospace;font-size:11px}
.ds-ocs-warn{background:rgba(255,68,102,.15);color:var(--red);font-family:Orbitron,monospace;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,68,102,.3)}
.ds-ocs-none{color:var(--muted2);font-size:11px}
.ds-mono{font-family:'Share Tech Mono',monospace;font-size:11px}
.ds-rank-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;padding:0 5px;
  margin-left:6px;border-radius:999px;font-family:Orbitron,monospace;font-size:8px;font-weight:700;letter-spacing:.3px;
  border:1px solid var(--muted2);background:rgba(122,154,176,.08);color:var(--muted)}
.ds-rank-1{background:rgba(255,204,0,.14);color:var(--yellow);border-color:rgba(255,204,0,.35)}
.ds-rank-2{background:rgba(210,210,210,.10);color:#d6d6d6;border-color:rgba(210,210,210,.30)}
.ds-rank-3{background:rgba(200,124,62,.14);color:#c87c3e;border-color:rgba(200,124,62,.35)}
.ds-rank-wrap{display:inline-flex;align-items:center;justify-content:center;gap:4px}

/* ── SPARKLINE ── */
.spark-wrap{display:flex;align-items:center;gap:4px}
.spark{display:inline-flex;align-items:flex-end;gap:1px;height:20px}
.spark-bar{width:6px;background:var(--cyan);border-radius:1px 1px 0 0;opacity:.7;transition:height .3s}

/* ── WIND CANVAS ── */
#cWindDay{display:block;width:100%;height:120px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .map2{grid-template-columns:1fr}
  .race-tabs{gap:1px}
  .race-tab{padding:5px 8px;font-size:9px}
}

/* ── PRINT / PDF EXPORT ── */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #0a0e14 !important; color: #e0e8f0 !important; font-size: 10px; margin:0; padding:0; }
  .hdr { position: static; border-bottom: 1px solid #3a5060; margin-bottom: 6px; padding: 6px 12px; }
  .hdr-title { font-size: 12px !important; }
  .day-tabs, .race-tabs, .export-btn { display: none !important; }

  /* Only show current day — panels not in current day are hidden */
  .day-panel { display: none !important; }
  .day-panel.active { display: block !important; }
  .race-panel { display: none; padding: 8px 12px; }
  .race-panel.print-show { display: block !important; }
  .race-panel:empty { display: none !important; }
  .day-summary { display: none !important; }
  .day-summary.print-show-summary { display: block !important; }

  /* Each race starts on a new page */
  .race-panel.print-show { page-break-before: always; }
  .race-panel.print-show:first-of-type { page-break-before: auto; }
  .race-print-header { display: block !important; font-family: Orbitron, monospace; font-size: 11px;
    color: #00ccff; letter-spacing: 2px; margin-bottom: 6px; border-bottom: 1px solid #00ccff44; padding-bottom: 4px; }

  /* Strip (summary bar) — compact horizontal */
  .strip { flex-wrap: nowrap; gap: 4px; padding: 5px 0; margin-bottom: 6px; overflow: hidden; }
  .sc { min-width: 70px; padding: 4px 7px; }
  .sv { font-size: 11px !important; }
  .sl { font-size: 7px !important; }

  /* Geometry bar */
  .gb { padding: 5px 8px; min-width: 120px; }
  .gb-val { font-size: 11px !important; }
  .gb-lbl, .gb-sub { font-size: 7px !important; }
  .gb-row { margin-bottom: 6px; }

  /* Section headers */
  .sh { margin: 8px 0 4px; font-size: 8px; }

  /* TWO-COLUMN layout for start maps to save vertical space */
  .map2 { grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; align-items: stretch; }
  .mh { font-size: 7px !important; padding: 4px 7px; }

  /* Canvas: scale to fit without distortion */
  canvas { max-width: 100% !important; height: auto !important; display: block; }

  /* Page 2 starts at LEG 1 header (after start table) */
  .page2-start { page-break-before: always !important; break-before: always !important; }

  /* Course + right panel: two-column grid */
  .course-and-right {
    display: grid !important;
    grid-template-columns: 52% 44% !important;
    gap: 10px !important;
    margin-bottom: 6px !important;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .course-and-right .mc { width: auto !important; }

  /* Tables: compact */
  table { margin-bottom: 4px; font-size: 9px; }
  th { font-size: 7px !important; padding: 3px 4px !important; background: #141c28 !important; }
  td { padding: 2px 4px !important; }
  tr:nth-child(even) td { background: #0f1520 !important; }
  table { page-break-inside: avoid; }

  /* Wind canvas — tall enough for legend (4 rows × ~16px + arrow + padding) */
  [id$="cWind"] { height: 240px !important; }

  /* Places gained canvas */
  [id$="cDelta"] { height: 100px !important; }

  /* Start maps */
  [id$="cGun"], [id$="cT50"] { max-height: none !important; }

  /* Day summary — only shown when explicitly included in PDF export */
  .day-summary.print-show-summary { display: block !important; page-break-after: always; padding: 8px 12px; }

  /* Notes/caveats */
  .notes, .caveat, .nc { font-size: 9px !important; padding: 5px 8px; margin-bottom: 5px; }
  .nc { padding: 5px 8px; }
}

@page {
  size: A4 portrait;
  margin: 8mm 8mm;
}

  <!-- Firestore gun times via REST (no auth required for public regattas) -->
  <script>
    const _regatttaCache = {};
    window._fetchFirestoreGuns = async (regatttaId, dayStart, dayEnd) => {
      if(!_regatttaCache[regatttaId]) {
        const url = `https://firestore.googleapis.com/v1/projects/vakaros-racesense/databases/(default)/documents/regattas/${regatttaId}?key=AIzaSyDoQfjoAtx9g3sS7MzKUM0gGwW8tREKxwk`;
        const res = await fetch(url);
        if(!res.ok) throw new Error(`Firestore REST ${res.status}`);
        _regatttaCache[regatttaId] = await res.json();
      }
      const doc = _regatttaCache[regatttaId];
      // Parse Firestore REST format: fields -> arrayValue -> values -> mapValue -> fields
      const parseValue = (v) => {
        if(v.stringValue !== undefined) return v.stringValue;
        if(v.integerValue !== undefined) return parseInt(v.integerValue);
        if(v.doubleValue !== undefined) return parseFloat(v.doubleValue);
        if(v.booleanValue !== undefined) return v.booleanValue;
        if(v.timestampValue !== undefined) return new Date(v.timestampValue).getTime();
        if(v.nullValue !== undefined) return null;
        if(v.arrayValue) return (v.arrayValue.values||[]).map(parseValue);
        if(v.mapValue) {
          const obj = {};
          for(const [k,val] of Object.entries(v.mapValue.fields||{})) obj[k] = parseValue(val);
          return obj;
        }
        return null;
      };
      const fields = doc.fields;
      const divisions = parseValue(fields.divisions);
      const div = divisions?.find(d => d.name === 'M32' || d.boatClass === 'M32') || divisions?.[0];
      if(!div?.races) return null;
      const guns = [];
      for(const race of div.races) {
        if(!race.starts?.length) continue;
        const finishedStart = [...race.starts].reverse().find(s => s.stopReason === 'finished') || race.starts[race.starts.length-1];
        const ts = finishedStart?.startTime;
        if(!ts) continue;
        if(dayStart && dayEnd && (ts < dayStart || ts > dayEnd)) continue;
        guns.push([race.raceNumber, ts]);
      }
      guns.sort((a,b) => a[0]-b[0]);
      console.log('Firestore guns:', guns.map(g=>`R${g[0]}:${new Date(g[1]).toISOString().slice(11,19)}`).join(', '));
      return guns;
    };
    window._firestoreReady = Promise.resolve();
    console.log('Firestore REST gun loader ready');
  </script>

<div class="hdr">
  <div>
    <div class="hdr-title" id="regattatitle">M32 · REGATTA REPORT</div>
    <div class="hdr-sub" id="regattasub">Vakaros RaceSense telemetry analysis</div>
  </div>
  <button class="export-btn" id="exportBtn" onclick="exportPDF()" style="

</button>
<button class="export-btn" id="polarBtn" onclick="showPolarProposal()" style="
  font-family:Orbitron,monospace;font-size:9px;font-weight:700;letter-spacing:1px;

  onmouseout="this.style.background='rgba(0,255,153,.08)'">
  POLAR — <span id="polarStatusLabel">BASE</span>
</button>

function polarSpeed(twa, tws){
  const polar = getPolarGrid();
  let t = Math.round(Math.abs(twa));
  if(t < M32_POLAR_TWA_MIN) t = M32_POLAR_TWA_MIN;
  if(t > M32_POLAR_TWA_MAX) t = M32_POLAR_TWA_MAX;
  const twsList = M32_POLAR_TWS;
  if(tws <= twsList[0]) return +(polar[String(twsList[0])][String(t)]||0);
  if(tws >= twsList[twsList.length-1]) return +(polar[String(twsList[twsList.length-1])][String(t)]||0);
  let lo=twsList[0], hi=twsList[twsList.length-1];
  for(let i=0;i<twsList.length-1;i++){ if(tws>=twsList[i]&&tws<=twsList[i+1]){lo=twsList[i];hi=twsList[i+1];break;} }
  const f=(tws-lo)/(hi-lo);
  const slo=+(polar[String(lo)][String(t)]||0);
  const shi=+(polar[String(hi)][String(t)]||0);
  return slo + f*(shi-slo);
}

function estimateTWS(observedSOG, reachTWA){
  let bestTWS=12, bestDiff=999;
  for(const tws of M32_POLAR_TWS){
    const diff=Math.abs(polarSpeed(reachTWA,tws)-observedSOG);
    if(diff<bestDiff){bestDiff=diff;bestTWS=tws;}
  }
  return bestTWS;
}
function quantile(arr, q){ if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); const idx=(s.length-1)*q; const lo=Math.floor(idx), hi=Math.ceil(idx); if(lo===hi) return s[lo]; const f=idx-lo; return s[lo]*(1-f)+s[hi]*f; }
function nearestGrid(v, grid){ let best=grid[0], bd=Infinity; for(const g of grid){ const d=Math.abs(v-g); if(d<bd){bd=d;best=g;} } return best; }
function polarObsId(rd, sail, ts){ return `${rd.event?.id||'ev'}_${rd.event?._dayIdx||0}_${rd.raceNum}_${sail}_${Math.round(ts/1000)}`; }
function collectPolarObservationsFromRace(rd){
  if(!rd || !rd.tracks || rd.WF==null) return;
  const twsInfo=getEffectiveTwsInfo(rd);
  if(!Number.isFinite(twsInfo.tws)) return;
  const manualTws=+twsInfo.tws;
  const store=getPolarObsStore(); const obs=store.observations || (store.observations={});
  const raceEnd = rd.nextGunTs ? Math.min(rd.gunTs + 1200000, rd.nextGunTs - 1000) : rd.gunTs + 1200000;
  for(const sail of rd.BOATS||[]){
    const t=rd.tracks[sail]; if(!t || t.length<20) continue;
    for(let i=3;i<t.length-3;i++){
      const p=t[i], p0=t[i-3], p1=t[i+3];
      if(p.ts<rd.gunTs+15000 || p.ts>raceEnd-15000) continue;
      const sog=p.sog*0.539957, sog0=(t[i-1].sog||0)*0.539957, sog1=(t[i+1].sog||0)*0.539957;
      if(sog<6 || sog>35) continue;
      const cog=brg(p0.lat,p0.lon,p1.lat,p1.lon);
      const turn=angDiff(brg(t[i-3].lat,t[i-3].lon,t[i-1].lat,t[i-1].lon), brg(t[i+1].lat,t[i+1].lon,t[i+3].lat,t[i+3].lon));
      const hdgAgree=angDiff(cog, p.hdg||cog);
      const acc=Math.abs(sog1-sog0);
      if(turn>12 || hdgAgree>22 || acc>1.2) continue;
      const twa=Math.abs(((cog-rd.WF+180+360)%360)-180);
      if(twa<M32_POLAR_TWA_MIN || twa>M32_POLAR_TWA_MAX) continue;
      const tws=manualTws;
      const conf=(Math.max(0, 1 - turn/18) * Math.max(0, 1 - hdgAgree/30) * Math.max(0, 1 - acc/1.8)) * (twsInfo.source==='race'?1:0.96);
      if(conf < 0.45) continue;
      const twsBin=nearestGrid(tws, M32_POLAR_TWS), twaBin=Math.round(twa);
      const id=polarObsId(rd, sail, p.ts);
      if(obs[id]) continue;
      obs[id]={id, className:'M32', eventId:rd.event?.id||'', day:rd.event?.label||'', dayIdx:rd.event?._dayIdx||0, raceNum:rd.raceNum, sail, ts:p.ts, twa:twaBin, tws:twsBin, bsp:+sog.toFixed(2), conf:+conf.toFixed(3), wf:+rd.WF.toFixed(1), twsSource:twsInfo.source};
    }
  }
  store.updatedAt=Date.now();
  safeLocalSet(POLAR_OBS_KEY, store);
}
function buildPolarCandidateFromStore(){
  const store=getPolarObsStore(); const obs=Object.values(store.observations||{});
  const active=getPolarGrid(); const candidate=clonePolar(active); const changes=[];
  const byBin={};
  for(const o of obs){
    if(o.conf<0.45) continue;
    const key=`${o.tws}_${o.twa}`;
    (byBin[key]||(byBin[key]=[])).push(o);
  }
  for(const [key, arr] of Object.entries(byBin)){
    if(arr.length < 12) continue;
    const [tws,twa]=key.split('_');
    const oldV=+(active[String(tws)]?.[String(twa)]||0); if(!oldV) continue;
    const vals=arr.map(o=>o.bsp);
    const q=quantile(vals, 0.82); if(q==null) continue;
    const capped=Math.max(oldV*0.97, Math.min(oldV*1.08, q));
    const newV=+(oldV*0.8 + capped*0.2).toFixed(2);
    const delta=+(newV-oldV).toFixed(2);
    if(Math.abs(delta) < 0.08) continue;
    candidate[String(tws)][String(twa)] = newV;
    changes.push({tws:+tws,twa:+twa,old:oldV,new:newV,delta,samples:arr.length});
  }
  changes.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  const cand={className:'M32', createdAt:Date.now(), source:'proposal', polar:candidate, summary:{observations:obs.length, changedBins:changes.length, topChanges:changes.slice(0,20)}, changes};
  safeLocalSet(POLAR_CANDIDATE_KEY, cand);

  return cand;
}

function showPolarProposal(){

    .join(String.fromCharCode(10));

Changed bins: ${cand.summary.changedBins}.

Top changes:
${top || 'No material changes proposed.'}

Approve this proposal as the active polar?`;

Changed bins: 0.

<script id="utils-placeholder">
// ─── MATH ───
function hav(a,b,c,d){const dL=(c-a)*D2R,dO=(d-b)*D2R,x=Math.sin(dL/2)**2+Math.cos(a*D2R)*Math.cos(c*D2R)*Math.sin(dO/2)**2;return RE*2*Math.asin(Math.sqrt(x))}
function brg(a,b,c,d){const dO=(d-b)*D2R,x=Math.sin(dO)*Math.cos(c*D2R),y=Math.cos(a*D2R)*Math.sin(c*D2R)-Math.sin(a*D2R)*Math.cos(c*D2R)*Math.cos(dO);return(Math.atan2(x,y)/D2R+360)%360}
function vmgOf(ms,h,wf){return(ms*0.539957)*Math.cos(Math.abs(((h-wf+180)%360)-180)*D2R)}
function fmt(s){return`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`}
function card(d){const c=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return c[Math.round(((d%360)+360)%360/22.5)%16]}

// ── SIGNED DISTANCE TO START LINE ──
// Convention (canonical, never deviate):
//   DTL > 0  =  pre-start side  (safe / behind line)
//   DTL < 0  =  course side     (OCS)
//
// The raw cross-product gives positive = left-of-RC→PIN.
// RC→PIN points roughly from committee-boat to pin end.
// Boats behind the line are to the RIGHT of that vector,
// so the raw product is negative for safe starters — backwards.
// We flip sign ONCE here and nowhere else.
//
// Configurable thresholds (used everywhere):
const DTL_CLEAR_M = 5;   // DTL >= +5m  → CLEAR
const DTL_OCS_M   = 2;   // DTL <= −2m  → OCS-zone (used for reach-mark inference only)

function distToLine(lat,lon,la1,lo1,la2,lo2){
  const cLat=(la1+la2)/2;
  const toM=(la,lo)=>[(lo-lo1)*D2R*RE*Math.cos(cLat*D2R),(la-la1)*D2R*RE];
  const[px,py]=toM(lat,lon),[ex,ey]=toM(la2,lo2);
  const L=Math.sqrt(ex*ex+ey*ey);
  // Flip sign: positive = pre-start (safe), negative = course/OCS side
  return -(px*(ey/L)-py*(ex/L));
}

// Wrapper — accepts {lat,lon} objects. Returns signed DTL; never abs() this.
function distToLinePt(point, RC, PIN){
  return distToLine(point.lat, point.lon, RC.lat, RC.lon, PIN.lat, PIN.lon);
}

// Linear interpolation between surrounding GPS samples.
// Returns lat/lon/sog/hdg/roll all interpolated at exactly ts.
// Falls back to nearest point if only one sample exists.
function ptAtTime(track, ts){
  if(!track||!track.length) return null;
  // find first sample at or after ts
  let hi = -1;
  for(let i=0;i<track.length;i++){
    if(track[i].ts >= ts){ hi=i; break; }
  }
  if(hi < 0) return track[track.length-1]; // ts after all data
  if(hi === 0) return track[0];             // ts before all data
  const a = track[hi-1], b = track[hi];
  const frac = (ts - a.ts) / (b.ts - a.ts);
  // Heading is circular – interpolate via shortest arc
  let dhdg = ((b.hdg - a.hdg + 540) % 360) - 180;
  return {
    ts,
    lat: a.lat + frac*(b.lat - a.lat),
    lon: a.lon + frac*(b.lon - a.lon),
    sog: a.sog + frac*(b.sog - a.sog),
    hdg: (a.hdg + frac*dhdg + 360) % 360,
    roll: (a.roll!=null&&b.roll!=null) ? a.roll + frac*(b.roll - a.roll) : (a.roll||b.roll||null),
  };
}

function circMean(angles){let sx=0,sy=0;for(const a of angles){sx+=Math.cos(a*D2R);sy+=Math.sin(a*D2R)}return(Math.atan2(sy,sx)/D2R+360)%360}

// ─── REACH MARK: find from lead boat (#63) bear-away, offset to port side ───
// The mark is passed on the PORT (left) side of the boat.
// GPS is at boat centre → mark position = GPS offset half-beam (2.77m) to port.
// Port direction = boat_heading - 90°.
// This single fixed position is then used for ALL boats.

// ─── REACH MARK INFERENCE CONFIGURATION (tune here) ───
const RM_CFG = {
  OCS_THRESHOLD_M:    2,    // metres; boats < −2 m at gun or crossing within 5s = OCS
  OCS_POST_SECS:      5,    // seconds after gun to check for OCS crossing
  TURN_WINDOW_START:  10,   // seconds after gun to start looking for bear-away
  TURN_WINDOW_END:    180,  // seconds; expand to 240 if no event found
  TURN_ANGLE_DEG:     55,   // minimum cumulative heading change to count as bear-away
  TURN_RATE_DEG_S:    8,    // minimum heading change rate (deg/sec) during event
  TURN_RATE_SECS:     2,    // rate must be sustained for this many seconds
  MIN_SPEED_KTS:      4,    // boat must stay above this during the turn
  MARK_PASS_RADIUS_M: 60,   // accept a boat as "passing mark" if within this distance
  DIST_ACCEPT_M:      70,   // sanity check: at least N boats within this radius
  SANITY_N:           3,    // minimum fleet boats needed for HIGH confidence
  APEX_KERNEL:        7,    // number of samples around apex used for centroid (odd)
  BEAM_OFFSET_M:      2.77, // M32 half-beam; offset mark to port from GPS track
  SMOOTH_WIN:         4,    // moving-average window for heading smoothing
};

// ─── GEOMETRY HELPERS ───
function offsetPos(lat,lon,bearingDeg,distM){
  const R=RE,brR=bearingDeg*D2R,laR=lat*D2R;
  const nlat=Math.asin(Math.sin(laR)*Math.cos(distM/R)+Math.cos(laR)*Math.sin(distM/R)*Math.cos(brR));
  const nlon=lon*D2R+Math.atan2(Math.sin(brR)*Math.sin(distM/R)*Math.cos(laR),Math.cos(distM/R)-Math.sin(laR)*Math.sin(nlat));
  return{lat:nlat/D2R, lon:nlon/D2R};
}

// Smooth an array of circular headings with a moving-average window
function smoothHeadings(hdgs, win){
  const out = [];
  for(let i=0;i<hdgs.length;i++){
    let sx=0,sy=0,cnt=0;
    for(let j=Math.max(0,i-win);j<=Math.min(hdgs.length-1,i+win);j++){
      sx+=Math.cos(hdgs[j]*D2R); sy+=Math.sin(hdgs[j]*D2R); cnt++;
    }
    out.push((Math.atan2(sy/cnt,sx/cnt)/D2R+360)%360);
  }
  return out;
}

// Angular difference (signed, −180..+180)
function angDiff(a,b){ return((a-b+540)%360)-180; }

function circMeanDeg(vals, weights){
  if(!Array.isArray(vals)) vals = [vals];
  if(!Array.isArray(weights)) weights = vals.map(()=>1);
  let sx=0, sy=0, sw=0;
  for(let i=0;i<vals.length;i++){
    const v = Number(vals[i]);
    const w = Number(weights[i] ?? 1);
    if(!Number.isFinite(v) || !Number.isFinite(w) || w<=0) continue;
    sx += Math.cos(v*D2R) * w;
    sy += Math.sin(v*D2R) * w;
    sw += w;
  }
  if(sw <= 0) return 0;
  return (Math.atan2(sy, sx) / D2R + 360) % 360;
}

// ─── A) OCS DETECTION ───
// Returns Set of sail numbers that are OCS.
function detectOCS(tracks, gunTs, RC, PIN){
  const ocs = new Set();
  if(!RC||!PIN) return ocs;
  const T = RM_CFG.OCS_THRESHOLD_M;
  const postMs = RM_CFG.OCS_POST_SECS * 1000;
  for(const [sail, t] of Object.entries(tracks)){
    if(!t||t.length<2) continue;
    // Interpolated position AT gun
    const pGun = ptAtTime(t, gunTs);
    if(!pGun) continue;
    const dtl = distToLinePt(pGun, RC, PIN);
    if(dtl < -T){ ocs.add(sail); continue; }
    // Also OCS if boat was on course side (negative DTL) before gun fired
    // crossing detection: DTL positive → negative within OCS_POST_SECS
    const post = t.filter(p => p.ts > gunTs && p.ts <= gunTs + postMs);
    let prev = dtl;
    for(const p of post){
      const d = distToLinePt(p, RC, PIN);
      // positive → negative transition = was on pre-start side, now course side (OCS)
      if(prev > 0 && d < -T){ ocs.add(sail); break; }
      prev = d;
    }
  }
  return ocs;
}

// ─── B/C) BEAR-AWAY DETECTION for one boat ───
// Returns {found, tStart, tEnd, tApex, apexRate, relaxed} or null.
function detectBearAway(track, gunTs, cfg, relax){
  const factor = relax ? 0.75 : 1.0;
  const ANGLE = cfg.TURN_ANGLE_DEG * factor;
  const RATE  = cfg.TURN_RATE_DEG_S * factor;
  const RSECS = cfg.TURN_RATE_SECS;
  const SPEED = cfg.MIN_SPEED_KTS * factor;
  const winEnd = (relax ? 240 : cfg.TURN_WINDOW_END) * 1000 + gunTs;
  const winStart = cfg.TURN_WINDOW_START * 1000 + gunTs;

  // Extract window, smooth headings
  const seg = track.filter(p => p.ts >= winStart && p.ts <= winEnd);
  if(seg.length < 5) return null;

  const hdgs  = smoothHeadings(seg.map(p=>p.hdg), cfg.SMOOTH_WIN);
  const times = seg.map(p => p.ts);
  const sogs  = seg.map(p => p.sog * 0.539957);

  // Compute instantaneous heading-change-rate (deg/sec) between adjacent samples
  const rates = [0];
  for(let i=1;i<seg.length;i++){
    const dt = (times[i]-times[i-1])/1000;
    if(dt <= 0){ rates.push(rates[i-1]); continue; }
    rates.push(Math.abs(angDiff(hdgs[i], hdgs[i-1])) / dt);
  }

  // Slide a window looking for a sustained turn
  for(let i=1;i<seg.length;i++){
    // Only look at the heading change direction to avoid double-counting tacks
    // A bear-away is a turn to a broader angle → heading increases relative to wind
    // We don't assume wind direction here; just look for a large SUSTAINED change
    if(rates[i] < RATE) continue;
    if(sogs[i] < SPEED) continue;

    // Accumulate heading change from this point
    let cumHdg = 0;
    let sustainedSecs = 0;
    let maxRate = 0;
    let apexIdx = i;
    let tEnd = i;

    for(let j=i;j<seg.length;j++){
      const dt = j>0 ? (times[j]-times[j-1])/1000 : 0;
      const dh = Math.abs(angDiff(hdgs[j], hdgs[Math.max(0,j-1)]));
      cumHdg += dh;
      if(rates[j] >= RATE){
        sustainedSecs += dt;
        if(rates[j] > maxRate){ maxRate = rates[j]; apexIdx = j; }
      }
      if(sogs[j] < SPEED * 0.7) break; // speed collapsed → not this event
      if(cumHdg > ANGLE && sustainedSecs >= RSECS){
        tEnd = j;
        return {
          found: true,
          tStart: times[i],
          tEnd:   times[tEnd],
          tApex:  times[apexIdx],
          apexIdx,
          segStart: winStart,
          seg, hdgs, times, rates, sogs,
          cumHdg, maxRate,
          relaxed: !!relax,
        };
      }
      // If rate dropped to near zero, stop accumulating
      if(j > i+3 && rates[j] < RATE*0.3) break;
    }
  }
  return null;
}

// ─── D) INFER MARK POSITION FROM TURN APEX ───
// Weighted centroid of samples around apex, offset to port by half-beam.
function inferMarkFromApex(ev){
  const {seg, hdgs, times, rates, apexIdx} = ev;
  const K = RM_CFG.APEX_KERNEL;
  const half = Math.floor(K/2);
  const lo = Math.max(0, apexIdx - half);
  const hi = Math.min(seg.length-1, apexIdx + half);

  let wLat=0, wLon=0, wSum=0;
  for(let i=lo;i<=hi;i++){
    const w = Math.max(0.01, rates[i]); // weight by heading-change rate
    wLat += seg[i].lat * w;
    wLon += seg[i].lon * w;
    wSum += w;
  }
  const centLat = wLat / wSum;
  const centLon = wLon / wSum;

  // Offset to port by half-beam from heading at apex
  const apexHdg = hdgs[apexIdx];
  const portBrg = (apexHdg - 90 + 360) % 360;
  const mark = offsetPos(centLat, centLon, portBrg, RM_CFG.BEAM_OFFSET_M);

  return { lat: mark.lat, lon: mark.lon, apexHdg, centLat, centLon };
}

// ─── E) FLEET SANITY CHECK ───
// Returns {passCount, minDists} where passCount = boats within DIST_ACCEPT_M.
function fleetSanityCheck(tracks, ocsBoats, candidateSail, markLat, markLon, gunTs){
  const winStart = gunTs + 15000;
  const winEnd   = gunTs + 240000;
  let passCount = 0;
  const minDists = {};

  for(const [sail, t] of Object.entries(tracks)){
    if(sail === candidateSail) continue;
    if(!t || t.length < 3) continue;
    const seg = t.filter(p => p.ts >= winStart && p.ts <= winEnd);
    if(!seg.length) continue;
    let minD = Infinity;
    for(const p of seg){
      const d = hav(p.lat, p.lon, markLat, markLon);
      if(d < minD) minD = d;
    }
    minDists[sail] = minD;
    if(minD <= RM_CFG.DIST_ACCEPT_M) passCount++;
  }
  return { passCount, minDists };
}

// ─── F) PER-BOAT REACH MARK TIME ───
// Returns {markTime, minDist, dtlSeconds, conf} for each boat.
function computeReachTimes(tracks, markLat, markLon, gunTs){
  const winStart = gunTs + 15000;
  const winEnd   = gunTs + 240000;
  const result = {};

  for(const [sail, t] of Object.entries(tracks)){
    if(!t || t.length < 2){ result[sail]={markTime:null,minDist:null,conf:'LOW'}; continue; }
    const seg = t.filter(p => p.ts >= winStart && p.ts <= winEnd);
    if(!seg.length){ result[sail]={markTime:null,minDist:null,conf:'LOW'}; continue; }

    let minD = Infinity, minTs = null;
    // Also detect local minima (first closest approach before moving away)
    let prevD = Infinity;
    let localMinTs = null, localMinD = Infinity;
    let foundLocal = false;

    for(const p of seg){
      const d = hav(p.lat, p.lon, markLat, markLon);
      if(d < minD){ minD = d; minTs = p.ts; }
      // Local minimum: dist decreasing then increasing
      if(d > prevD + 1 && !foundLocal && prevD < RM_CFG.MARK_PASS_RADIUS_M){
        localMinTs = minTs; localMinD = minD; foundLocal = true;
      }
      prevD = d;
    }

    const useTs  = foundLocal ? localMinTs : minTs;
    const useD   = foundLocal ? localMinD  : minD;
    const conf   = useD < 20 ? 'HIGH' : useD < RM_CFG.MARK_PASS_RADIUS_M ? 'MEDIUM' : 'LOW';
    result[sail] = { markTime: useTs, minDist: Math.round(useD), conf };
  }
  return result;
}

// ─── MASTER: findReachMark ───
// Returns rm object compatible with the rest of the report PLUS rmInference metadata.
function findReachMark(tracks, gunTs, WWGATE, LWGATE, MID){
  const GUN = gunTs || window.GUN || 0;
  const RC  = window.RC, PIN = window.PIN;

  // A) OCS detection
  const ocsBoats = detectOCS(tracks, GUN, RC, PIN);

  // B) Select candidates: non-OCS boats, sorted by earliest movement after gun
  const allSails = Object.keys(tracks).filter(s => tracks[s] && tracks[s].length >= 5);
  const cleanSails = allSails.filter(s => !ocsBoats.has(s));
  const trySails = cleanSails.length >= 1 ? cleanSails : allSails; // fallback: all boats
  const forcedFallback = cleanSails.length === 0;

  // Sort candidates by how early they moved away from start (proxy: distance from start at T+20s)
  const startPt = MID || (RC && PIN ? {lat:(RC.lat+PIN.lat)/2,lon:(RC.lon+PIN.lon)/2} : null);
  const ranked = startPt ? [...trySails].sort((a,b)=>{
    const pa = ptAtTime(tracks[a], GUN+20000);
    const pb = ptAtTime(tracks[b], GUN+20000);
    const da = pa ? hav(pa.lat,pa.lon,startPt.lat,startPt.lon) : 0;
    const db = pb ? hav(pb.lat,pb.lon,startPt.lat,startPt.lon) : 0;
    return db - da; // furthest from start = earliest clean leader
  }) : trySails;

  // C/D) Try candidates in order until we find a clean bear-away
  let ev = null, candidateSail = null, markPos2 = null, usedRelax = false;

  for(const sail of ranked.slice(0, 4)){ // try top-4 candidates
    const t = tracks[sail];
    // Try strict first, then relaxed
    ev = detectBearAway(t, GUN, RM_CFG, false);
    if(!ev){ ev = detectBearAway(t, GUN, RM_CFG, true); usedRelax = true; }
    if(ev){ candidateSail = sail; markPos2 = inferMarkFromApex(ev); break; }
    usedRelax = false;
  }

  // E) Fleet sanity check + fallback if weak
  let sanity = {passCount:0, minDists:{}};
  let confidence = 'LOW';
  let reasonParts = [];
  let rmLat, rmLon, t_s;

  if(ev && markPos2){
    sanity = fleetSanityCheck(tracks, ocsBoats, candidateSail, markPos2.lat, markPos2.lon, GUN);

    // If sanity is weak, try second candidate
    if(sanity.passCount < RM_CFG.SANITY_N && ranked.length > 1){
      for(const sail of ranked.slice(1, 5)){
        if(sail === candidateSail) continue;
        const t2 = tracks[sail];
        const ev2 = detectBearAway(t2, GUN, RM_CFG, false) || detectBearAway(t2, GUN, RM_CFG, true);
        if(!ev2) continue;
        const mp2 = inferMarkFromApex(ev2);
        const san2 = fleetSanityCheck(tracks, ocsBoats, sail, mp2.lat, mp2.lon, GUN);
        if(san2.passCount > sanity.passCount){
          ev = ev2; candidateSail = sail; markPos2 = mp2; sanity = san2;
        }
        if(sanity.passCount >= RM_CFG.SANITY_N) break;
      }
    }

    rmLat = markPos2.lat; rmLon = markPos2.lon;
    t_s   = (ev.tApex - GUN) / 1000;

    // Confidence
    if(!forcedFallback && !usedRelax && sanity.passCount >= RM_CFG.SANITY_N) confidence = 'HIGH';
    else if(sanity.passCount >= Math.ceil(RM_CFG.SANITY_N/2)) confidence = 'MEDIUM';
    else confidence = 'LOW';

    reasonParts.push(`inferred from ${ocsBoats.has(candidateSail)?'fallback':'non-OCS'} boat #${candidateSail}`);
    if(usedRelax) reasonParts.push('relaxed thresholds');
    reasonParts.push(`${sanity.passCount} boats within ${RM_CFG.DIST_ACCEPT_M}m`);
    if(forcedFallback) reasonParts.push('all boats OCS — fallback used');

  } else {
    // Complete fallback: use boat furthest from start at T+50
    confidence = 'LOW';
    let bestSail2 = null, bestD2 = -1;
    for(const sail of allSails){
      const t = tracks[sail];
      const pts = t.filter(p => p.ts >= GUN && p.ts <= GUN+50000);
      let d = 0;
      for(let i=1;i<pts.length;i++) d += hav(pts[i-1].lat,pts[i-1].lon,pts[i].lat,pts[i].lon);
      if(d > bestD2){ bestD2=d; bestSail2=sail; }
    }
    if(bestSail2){
      const pt = ptAtTime(tracks[bestSail2], GUN+50000);
      if(pt){
        const portBrg = (pt.hdg - 90 + 360) % 360;
        const mk = offsetPos(pt.lat, pt.lon, portBrg, RM_CFG.BEAM_OFFSET_M);
        rmLat = mk.lat; rmLon = mk.lon; t_s = 50;
        candidateSail = bestSail2;
      }
    }
    reasonParts.push('no bear-away detected — T+50 fallback');
  }

  if(!rmLat) return null; // complete failure

  // F) Per-boat reach mark times
  const reachTimesNew = computeReachTimes(tracks, rmLat, rmLon, GUN);

  // Build result compatible with existing code
  const rm = {
    lat: rmLat, lon: rmLon,
    boat_lat: rmLat, boat_lon: rmLon,
    ts: GUN + t_s*1000, t_s,
    hdg_before: ev ? ev.seg[Math.max(0,ev.apexIdx-1)]?.hdg : null,
    hdg_after:  ev ? ev.seg[Math.min(ev.seg.length-1,ev.apexIdx+1)]?.hdg : null,
    sail: candidateSail,
    // ── inference metadata for info box ──
    inference: {
      confidence,
      reason: reasonParts.join('; '),
      candidateSail,
      ocsBoats: [...ocsBoats],
      passCount: sanity.passCount,
      minDists: sanity.minDists,
      bearAwayFound: !!ev,
      relaxed: usedRelax,
    },
    reachTimes: reachTimesNew,
  };

  return rm;
}

// For a given boat, find the timestamp when it is closest to the fixed reach mark.
// Now delegates to the precomputed reachTimes from findReachMark.
function timeAtMark(track, markLat, markLon){
  // Legacy fallback used if called without precomputed data
  const GUN = window.GUN||0;
  const winStart = GUN+15000, winEnd = GUN+240000;
  const seg = track.filter(p=>p.ts>=winStart&&p.ts<=winEnd);
  if(!seg.length) return null;
  let bestD=Infinity, bestTs=null;
  for(const p of seg){ const d=hav(p.lat,p.lon,markLat,markLon); if(d<bestD){bestD=d;bestTs=p.ts;} }
  return bestD <= RM_CFG.MARK_PASS_RADIUS_M ? bestTs : null;
}

// ─── GATE POSITION INFERENCE FROM TRACKS ───
// WWGate = where quality boats cluster when making their upwind-to-downwind turns
//          (top of upwind leg) = highest northing + most westing points
// LWGate = where quality boats cluster at the bottom of downwind legs
//          (min northing overall, excluding the reach leg which is before T+120s)
function inferGates(tracks){
  const Q=['63','61','65','44','70']; // quality boats
  let lwPts=[], wwPts=[];

  for(const sail of Q){
    const t=tracks[sail]; if(!t||t.length<100) continue;
    // LWGate: find the southernmost point AFTER the reach leg (T>120s, T<700s)
    // This avoids the finish area which is back near start
    const mid=t.filter(p=>p.ts>(window.GUN||0)+120000&&p.ts<(window.GUN||0)+700000);
    if(mid.length){
      let minLat=Infinity,minPt=null;
      for(const p of mid) if(p.lat<minLat){minLat=p.lat;minPt=p}
      if(minPt) lwPts.push({lat:minPt.lat,lon:minPt.lon});
    }
    // WWGate: after first LW rounding (T>300s), find the northernmost & westernmost
    // cluster = top of first upwind leg, before second downwind leg starts
    // Use T=300-600s window
    const up=t.filter(p=>p.ts>(window.GUN||0)+300000&&p.ts<(window.GUN||0)+650000);
    if(up.length){
      // Find max lat in this window (top of upwind leg)
      let maxLat=-Infinity,maxPt=null;
      for(const p of up) if(p.lat>maxLat){maxLat=p.lat;maxPt=p}
      if(maxPt) wwPts.push({lat:maxPt.lat,lon:maxPt.lon});
    }
  }

  // Filter outliers: remove points more than 2 std-devs from median
  function robustMean(pts, key){
    const vals=pts.map(p=>p[key]).sort((a,b)=>a-b);
    const med=vals[Math.floor(vals.length/2)];
    const close=pts.filter(p=>Math.abs(p[key]-med)<0.003);
    return close.length ? close.reduce((s,p)=>s+p[key],0)/close.length : med;
  }

  const lw = lwPts.length>=2 ? {
    lat: robustMean(lwPts,'lat'),
    lon: robustMean(lwPts,'lon')
  } : null;

  const ww = wwPts.length>=2 ? {
    lat: robustMean(wwPts,'lat'),
    lon: robustMean(wwPts,'lon')
  } : null;

  return{lw, ww};
}


// ─── WIND INFERENCE ───
function weightedCircMean(items){
  if(!items || !items.length) return null;
  let sx=0, sy=0, sw=0;
  for(const it of items){ const w=(it.weight!=null?it.weight:1); sx+=Math.cos(it.angle*D2R)*w; sy+=Math.sin(it.angle*D2R)*w; sw+=w; }
  if(!sw) return null;
  return (Math.atan2(sy/sw, sx/sw)/D2R + 360) % 360;
}
function circularBlend(a, wa, b, wb){
  const sx=Math.cos(a*D2R)*wa + Math.cos(b*D2R)*wb;
  const sy=Math.sin(a*D2R)*wa + Math.sin(b*D2R)*wb;
  return (Math.atan2(sy, sx)/D2R + 360) % 360;
}
function inferWind(tracks, wwgateLat, wwgateLon, lwgateLat, lwgateLon, gunTs, raceEndTs){
  const QUAL_BOATS=Object.keys(tracks||{});
  const _gun=(gunTs!=null ? gunTs : (window.GUN||0));
  let inferredEnd = raceEndTs;
  if(inferredEnd==null){
    let mx=_gun+720000;
    for(const sail of QUAL_BOATS){
      const t=tracks[sail];
      if(t && t.length) mx=Math.max(mx, t[t.length-1].ts||mx);
    }
    inferredEnd=mx;
  }
  const startTrimMs=120000;
  const capFromStartMs=720000;
  const usableStart=_gun + startTrimMs;
  const usableEnd=Math.max(usableStart + 90000, Math.min(inferredEnd, _gun + capFromStartMs));
  let upwindAxis = 315;
  if(wwgateLat != null && lwgateLat != null) upwindAxis = brg(lwgateLat, lwgateLon, wwgateLat, wwgateLon);
  const downwindAxis = (upwindAxis + 180) % 360;
  const uwPort=[], uwStbd=[], dwPort=[], dwStbd=[];
  const perBoat=[];

  const vecFrom=(sog,cog)=>{
    const r=cog*D2R;
    return {vx:sog*Math.sin(r), vy:sog*Math.cos(r)};
  };
  const vecMean=(arr)=>{
    if(!arr.length) return null;
    let sx=0, sy=0, sw=0;
    for(const a of arr){ const w=Math.max(0.01,a.weight||1); sx+=(a.vx||0)*w; sy+=(a.vy||0)*w; sw+=w; }
    if(!sw) return null;
    return {vx:sx/sw, vy:sy/sw, mag:Math.hypot(sx/sw, sy/sw)};
  };
  const vecBearing=(v)=>((Math.atan2(v.vx, v.vy)/D2R)+360)%360;

  for(const sail of QUAL_BOATS){
    const t=tracks[sail]; if(!t || t.length<25) continue;
    let stableN=0;
    for(let i=3;i<t.length-3;i++){
      const p=t[i], a=t[i-3], b=t[i+3];
      if(!p || !a || !b) continue;
      if(p.ts<usableStart || p.ts>usableEnd) continue;
      const sog=(p.sog||0)*0.539957;
      if(sog<8 || sog>35) continue;
      const dt=Math.max(0.001, ((b.ts||0)-(a.ts||0))/1000);
      const spanM=hav(a.lat,a.lon,b.lat,b.lon);
      if(dt<6 || spanM<20) continue;
      const cog=brg(a.lat,a.lon,b.lat,b.lon);
      const cogPrev=brg(t[i-3].lat,t[i-3].lon,t[i-1].lat,t[i-1].lon);
      const cogNext=brg(t[i+1].lat,t[i+1].lon,t[i+3].lat,t[i+3].lon);
      const turn=angDiff(cogPrev, cogNext);
      const hdgAgree=angDiff(cog, p.hdg||cog);
      const acc=Math.abs(((t[i+1].sog||0) - (t[i-1].sog||0))*0.539957);
      if(turn>16 || hdgAgree>24 || acc>1.4) continue;
      const q=Math.max(0,1-turn/18) * Math.max(0,1-hdgAgree/28) * Math.max(0,1-acc/1.6) * Math.max(0, Math.min(1.2, spanM/45));
      if(q<0.28) continue;
      stableN++;
      const relUW=((cog-upwindAxis+540)%360)-180;
      const relDW=((cog-downwindAxis+540)%360)-180;
      const v=vecFrom(sog,cog);
      const row={angle:cog,weight:q,sog,spanM,dt,vx:v.vx,vy:v.vy,boat:sail};
      if(Math.abs(relUW) <= 52){
        if(relUW > 0) uwPort.push({...row, rel:relUW}); else uwStbd.push({...row, rel:relUW});
      }else if(Math.abs(relDW) <= 52){
        if(relDW < 0) dwPort.push({...row, rel:relDW}); else dwStbd.push({...row, rel:relDW});
      }
    }
    if(stableN) perBoat.push({sail, stableN});
  }

  const upN=uwPort.length+uwStbd.length, dwN=dwPort.length+dwStbd.length;
  const meanUwPort=vecMean(uwPort), meanUwStbd=vecMean(uwStbd), meanDwPort=vecMean(dwPort), meanDwStbd=vecMean(dwStbd);
  let wfUp=null, wfDw=null, tackAngle=null, gybeAngle=null;
  if(meanUwPort && meanUwStbd && uwPort.length>=4 && uwStbd.length>=4){
    const sum={vx:meanUwPort.vx+meanUwStbd.vx, vy:meanUwPort.vy+meanUwStbd.vy};
    wfUp=vecBearing(sum);
    const pm=weightedCircMean(uwPort.map(s=>({angle:s.angle,weight:s.weight})));
    const sm=weightedCircMean(uwStbd.map(s=>({angle:s.angle,weight:s.weight})));
    tackAngle=angDiff(pm,sm); if(tackAngle>180) tackAngle=360-tackAngle; if(tackAngle>90) tackAngle=180-tackAngle;
  }
  if(meanDwPort && meanDwStbd && dwPort.length>=4 && dwStbd.length>=4){
    const sum={vx:meanDwPort.vx+meanDwStbd.vx, vy:meanDwPort.vy+meanDwStbd.vy};
    wfDw=(vecBearing(sum)+180)%360;
    const pm=weightedCircMean(dwPort.map(s=>({angle:s.angle,weight:s.weight})));
    const sm=weightedCircMean(dwStbd.map(s=>({angle:s.angle,weight:s.weight})));
    gybeAngle=angDiff(pm,sm); if(gybeAngle>180) gybeAngle=360-gybeAngle; if(gybeAngle>90) gybeAngle=180-gybeAngle;
  }

  let wf=wfUp!=null ? wfUp : (wfDw!=null ? wfDw : upwindAxis);
  let agreement = wfUp!=null && wfDw!=null ? angDiff(wfUp,wfDw) : null;
  if(wfUp!=null && wfDw!=null){
    const wUp=Math.max(1, upN) * 1.25;
    const wDw=Math.max(1, dwN) * 0.55 * Math.max(0.3, 1-(agreement||0)/45);
    wf=circularBlend(wfUp,wUp,wfDw,wDw);
  }
  const stablePts=upN+dwN;
  const spreadFrom=(arr,wfRef)=>{
    if(!arr.length) return 180;
    const vals=arr.map(s=>Math.abs((((s.angle-wfRef+540)%360)-180)-180)).sort((a,b)=>a-b);
    return vals[Math.floor(vals.length*0.7)] ?? 180;
  };
  const spread=Math.min(spreadFrom(uwPort,wf), spreadFrom(uwStbd,wf));
  let confidence = Math.min(0.98, 0.16 + Math.min(0.40, stablePts/140) + (wfUp!=null?0.18:0) + (wfDw!=null?0.06:0));
  confidence *= Math.max(0.35, 1 - Math.max(0, (spread-32))/40);
  if(agreement!=null) confidence *= Math.max(0.45, 1 - agreement/50);
  const fallback = wfUp==null && wfDw==null;
  if(fallback) confidence = 0.16;
  return {
    wf, upwindAxis, downwindAxis,
    wfUp, wfDw, agreement,
    port: weightedCircMean(uwPort.map(s=>({angle:s.angle,weight:s.weight}))),
    stbd: weightedCircMean(uwStbd.map(s=>({angle:s.angle,weight:s.weight}))),
    tack: tackAngle||90, gybe: gybeAngle||null,
    n: perBoat.length, stableN: stablePts,
    portN: uwPort.length, stbdN: uwStbd.length,
    dwPortN: dwPort.length, dwStbdN: dwStbd.length,
    confidence:+confidence.toFixed(2),
    fallback,
    startTrimS: Math.round(startTrimMs/1000), endTrimS: Math.max(0, Math.round((inferredEnd-usableEnd)/1000)),
    usableStartTs: usableStart, usableEndTs: usableEnd,
    method:'stable-segment-velocity-clusters-120s-to-12min',
    samples:{uwPort, uwStbd, dwPort, dwStbd},
    means:{uwPort:meanUwPort, uwStbd:meanUwStbd, dwPort:meanDwPort, dwStbd:meanDwStbd}
  };
}
function computeDayWind(event){
  const races=(event?._races||[]).filter(Boolean).filter(rd=>rd.WF_RACE_OBJ && rd.WF_RACE_OBJ.wf!=null);
  if(!races.length) return null;
  const weighted=[];
  for(const rd of races){
    const wObj=rd.WF_RACE_OBJ; const w=Math.max(0.15, (wObj.confidence||0.2)) * Math.max(1, wObj.stableN||10);
    weighted.push({angle:wObj.wf, weight:w, raceNum:rd.raceNum});
  }
  const wf=weightedCircMean(weighted);
  const spreads=weighted.map(x=>angDiff(x.angle,wf)).sort((a,b)=>a-b);
  const spread=spreads.length?spreads[Math.floor(spreads.length/2)]:null;
  let confidence=Math.min(0.95, 0.25 + weighted.length*0.12 + Math.max(0, 0.32 - (spread||0)/40));
  return {wf, nRaces:weighted.length, spread, confidence:+confidence.toFixed(2), method:'day-consensus'};
}
function blendRaceAndDayWind(raceObj, dayObj){
  if(raceObj && !dayObj) return {...raceObj, source:'race'};
  if(dayObj && !raceObj) return {...dayObj, source:'day'};
  if(!raceObj && !dayObj) return null;
  const agreement=angDiff(raceObj.wf, dayObj.wf);
  let wr=0.70;
  const rc=(raceObj.confidence||0.3), dc=(dayObj.confidence||0.3);
  if(rc<0.45) wr=0.58;
  if(rc<0.30) wr=0.45;
  if(agreement>12) wr=Math.max(0.45, wr-0.10);
  if(agreement>20) wr=Math.max(0.38, wr-0.12);
  const wd=1-wr;
  return {
    wf:circularBlend(raceObj.wf, wr, dayObj.wf, wd),
    confidence:+Math.min(0.96, rc*wr + dc*wd).toFixed(2),
    agreement:+agreement.toFixed(1),
    raceWf:raceObj.wf, dayWf:dayObj.wf,
    source:'blend',
    race:raceObj, day:dayObj,
    stableN:raceObj.stableN||0
  };
}
// ─── GYBE ANGLE INFERENCE ───
// Mirror of inferWind but for downwind legs.
// Wind from ~315°, dead downwind = ~135°.
// Port gybe (wind on port quarter): headings ~85–130°
// Stbd gybe (wind on stbd quarter): headings ~140–185°
// Collect from quality boats, same SOG filter, but skip the upwind/reach zones.
function inferGybe(tracks, wf){
  const QUAL_BOATS=Object.keys(tracks);
  const ddw=(wf+180)%360; // dead downwind heading
  let portH=[],stbdH=[];
  for(const s of QUAL_BOATS){
    const t=tracks[s]; if(!t||t.length<200) continue;
    // Skip first 120s (reach leg) and cap at 12min (avoids final reach)
    const dw=t.filter(p=>p.ts>_gun+120000&&p.ts<_gun+720000&&p.sog*0.539957>3);
    for(const p of dw){
      const h=p.hdg;
      // Port gybe: 50–130° (ddw - 5° to ddw - 85°)
      const loP=((ddw-85)+360)%360, hiP=((ddw-5)+360)%360;
      // Stbd gybe: 140–210° (ddw + 5° to ddw + 75°)
      const loS=(ddw+5)%360, hiS=(ddw+75)%360;
      if(inRange(h,loP,hiP)) portH.push(h);
      if(inRange(h,loS,hiS)) stbdH.push(h);
    }
  }
  if(portH.length<10||stbdH.length<10) return null;
  const pm=circMean(portH), sm=circMean(stbdH);
  // Gybing angle = acute angle between the two gybe headings
  let ga=Math.abs(((pm-sm+180)%360)-180);
  if(ga>90) ga=180-ga;
  // Wind FROM bisect check (should match inferred wind)
  let bisect=((pm+sm)/2+360)%360;
  if(Math.abs(pm-sm)>180) bisect=((pm+sm+360)/2+360)%360;
  const nBoats=QUAL_BOATS.filter(s=>tracks[s]&&tracks[s].length>=200).length;
  return{port:pm, stbd:sm, angle:ga, bisect, n:nBoats, portN:portH.length, stbdN:stbdH.length};
}

// Helper: is heading h within arc from lo to hi (handles wrap through 360°)
function inRange(h, lo, hi){
  if(lo<=hi) return h>=lo&&h<=hi;
  return h>=lo||h<=hi; // wraps through 0°
}


// ─── CANVAS SETUP ───
function cvs(id,h){const c=document.getElementById(id),W=c.offsetWidth;c.width=W*devicePixelRatio;c.height=h*devicePixelRatio;c.style.height=h+'px';const ctx=c.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);return{ctx,W,H:h}}
function cbg(ctx,W,H){ctx.fillStyle='#07111f';ctx.fillRect(0,0,W,H)}
function nmark(ctx,W,H){const x=W-30,y=22;ctx.save();for(let a=0;a<360;a+=45){const r=a*D2R;ctx.strokeStyle='rgba(0,204,255,.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.sin(r)*12,y-Math.cos(r)*12);ctx.stroke()}ctx.fillStyle='rgba(0,204,255,.4)';ctx.font='7px Orbitron';ctx.textAlign='center';ctx.fillText('N',x,y-16);ctx.restore()}

// Simple projection
function mkProj(ptsLat,ptsLon,W,H,padH,padV){
  const mnLa=Math.min(...ptsLat),mxLa=Math.max(...ptsLat),mnLo=Math.min(...ptsLon),mxLo=Math.max(...ptsLon);
  const tX=lo=>padH+(lo-mnLo)/(mxLo-mnLo)*(W-padH*2);
  const tY=la=>(H-padV)-(la-mnLa)/(mxLa-mnLa)*(H-padV*2);
  return{tX,tY};
}

// Rotated projection (vertical start line)
function rotProj(pts,W,H,px,py){
  const cLa=MID.lat,cLo=MID.lon,toM=(la,lo)=>({x:(lo-cLo)*D2R*RE*Math.cos(cLa*D2R),y:(la-cLa)*D2R*RE});
  const rcM=toM(RC.lat,RC.lon),pnM=toM(PIN.lat,PIN.lon);
  const ang=Math.atan2(rcM.y-pnM.y,rcM.x-pnM.x),rot=-(ang-Math.PI/2);
  const r=(mx,my)=>({rx:mx*Math.cos(rot)-my*Math.sin(rot),ry:mx*Math.sin(rot)+my*Math.cos(rot)});
  const rcR=r(rcM.x,rcM.y),pnR=r(pnM.x,pnM.y);
  const p2=pts.map(p=>{const m=toM(p.lat,p.lon);return{...p,...r(m.x,m.y)}});
  const allX=[rcR.rx,pnR.rx,...p2.map(p=>p.rx)],allY=[rcR.ry,pnR.ry,...p2.map(p=>p.ry)];
  // Use uniform scale (same m/px on both axes) to preserve real-world proportions
  // Add extra vertical padding to show depth behind the line
  const padX=40, padY=80;
  const spanX=Math.max(...allX)-Math.min(...allX)+padX*2;
  const spanY=Math.max(...allY)-Math.min(...allY)+padY*2;
  const scale=Math.min((W-px*2)/spanX, (H-py*2)/spanY);
  const cxOff=(Math.min(...allX)+Math.max(...allX))/2;
  const cyOff=(Math.min(...allY)+Math.max(...allY))/2;
  const plotCX=W/2, plotCY=H/2-18;
  const tX=rx=>plotCX+(rx-cxOff)*scale;
  const tY=ry=>plotCY-(ry-cyOff)*scale;
  return{tX,tY,rcR,pnR,p2};
}

// ─── DRAW CATAMARAN (M32 favicon silhouette, 9.68m x 5.54m) ───
// Matches the favicon: two curved hulls with pointed bow+stern, two crossbeams
function drawCat(ctx,cx,cy,hdgDeg,color,label,mpp,rankBadge){
  const halfL=(M32_LEN/2)/mpp;   // half-length in pixels
  const halfB=(M32_BEAM/2)/mpp;  // half-beam (hull centre to boat centre) in pixels
  const hw=Math.max(1.5, halfL*0.13); // hull half-width in pixels

  const hr=hdgDeg*D2R;
  // Forward (+bow) and starboard unit vectors in canvas coords
  const fx= Math.sin(hr), fy=-Math.cos(hr);
  const sx= Math.cos(hr), sy= Math.sin(hr);

  // Helper: boat-local (fwd, stbd) → canvas (x, y)
  const bp=(f,s)=>[cx+fx*f+sx*s, cy+fy*f+sy*s];

  ctx.save();

  // Draw one hull given sign: +1=stbd, -1=port
  function drawHull(sign){
    const hc=halfB*sign; // hull centre lateral offset
    // Hull shape: pointed bow & stern, curved outer edge, straighter inner edge
    // Points in (fwd, lateral) boat coords:
    // bow tip, outer bow shoulder, outer mid, outer stern shoulder, stern tip,
    // inner stern shoulder, inner mid, inner bow shoulder → back to bow tip
    const bow  = bp( halfL,       hc);
    const oBS  = bp( halfL*0.75,  hc + hw*sign*1.4);  // outer bow shoulder
    const oMid = bp( 0,           hc + hw*sign*1.6);  // outer mid (widest)
    const oSS  = bp(-halfL*0.75,  hc + hw*sign*1.4);  // outer stern shoulder
    const stern= bp(-halfL,       hc);
    const iSS  = bp(-halfL*0.75,  hc + hw*sign*0.5);  // inner stern shoulder
    const iMid = bp( 0,           hc + hw*sign*0.5);  // inner mid
    const iBS  = bp( halfL*0.75,  hc + hw*sign*0.5);  // inner bow shoulder

    ctx.beginPath();
    ctx.moveTo(...bow);
    ctx.bezierCurveTo(...oBS, ...oBS, ...oMid);
    ctx.bezierCurveTo(...oSS, ...oSS, ...stern);
    ctx.lineTo(...iSS);
    ctx.bezierCurveTo(...iMid, ...iMid, ...iBS);
    ctx.closePath();

    ctx.fillStyle=color+'cc';
    ctx.strokeStyle=color;
    ctx.lineWidth=Math.max(0.8,hw*0.3);
    ctx.fill();
    ctx.stroke();
  }

  drawHull(1);   // starboard hull
  drawHull(-1);  // port hull

  // Crossbeams — two rectangular bars connecting the hulls
  // Forward beam: at 55% of half-length toward bow
  // Aft beam: at 55% of half-length toward stern
  const beamW=Math.max(1, hw*0.55); // beam thickness
  [[0.52], [-0.52]].forEach(([f])=>{
    const p1=bp(halfL*f, -halfB+hw*0.5);
    const p2=bp(halfL*f,  halfB-hw*0.5);
    ctx.save();
    ctx.strokeStyle=color+'dd';
    ctx.lineWidth=beamW*2;
    ctx.lineCap='butt';
    ctx.beginPath();
    ctx.moveTo(...p1);
    ctx.lineTo(...p2);
    ctx.stroke();
    ctx.restore();
  });

  // Sail number label in trampoline centre
  const fontSize=Math.max(7, Math.min(14, halfL*0.38));
  ctx.fillStyle='#ffffff';
  ctx.font=`bold ${fontSize}px Orbitron`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(label, cx, cy);

  ctx.restore();
}


function drawSL(ctx,rx,ry,px,py,dim){
  const a=dim?0.35:1;
  ctx.save();
  ctx.strokeStyle=`rgba(0,204,255,${.1*a})`;ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(px,py);ctx.stroke();
  ctx.strokeStyle=`rgba(0,204,255,${.55*a})`;ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(px,py);ctx.stroke();ctx.setLineDash([]);
  if(!dim){
    [[rx,ry,'RC','#00ccff'],[px,py,'PIN','#ffcc00']].forEach(([x,y,l,c])=>{
      ctx.fillStyle=c;ctx.shadowBlur=10;ctx.shadowColor=c;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#cde';ctx.font='bold 8px Orbitron';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(l,x+8,y);
    });
  }
  ctx.restore();
}

function markRound(ctx,x,y,c,lbl,r){
  r=r||5;ctx.save();
  ctx.fillStyle=c;ctx.shadowBlur=12;ctx.shadowColor=c;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 8px Orbitron';ctx.textAlign='center';
  ctx.fillText(lbl,x,y-r-4);ctx.restore();
}

function dline(ctx,x1,y1,x2,y2,c,lbl,dash){
  ctx.save();ctx.strokeStyle=c;ctx.lineWidth=1.5;if(dash)ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);
  if(lbl){const mx=(x1+x2)/2,my=(y1+y2)/2,ang=Math.atan2(y2-y1,x2-x1);
    ctx.save();ctx.translate(mx,my);ctx.rotate(ang);ctx.fillStyle=c;ctx.font='8px Share Tech Mono';
    ctx.textAlign='center';ctx.fillText(lbl,0,-5);ctx.restore();}
  ctx.restore();
}

// ─── SCALE BAR HELPER ───
function scaleBar(ctx,mpp,W,H){
  // choose a round number of metres
  const targets=[50,100,200,500];
  const idealPx=80;
  let best=100;
  for(const t of targets)if(Math.abs(t/mpp-idealPx)<Math.abs(best/mpp-idealPx))best=t;
  const barPx=best/mpp;
  const bx=14,by=H-14;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+barPx,by);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by-4);ctx.lineTo(bx,by+4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+barPx,by-4);ctx.lineTo(bx+barPx,by+4);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='8px Share Tech Mono';ctx.textAlign='center';
  ctx.fillText(`${best}m`,bx+barPx/2,by-6);
  ctx.restore();
}

// ─── COMPUTE metres-per-pixel for a given projection ───
function mppForProj(tX,tY,lat1,lon1,lat2,lon2){
  const dx=tX(lon2)-tX(lon1),dy=tY(lat2)-tY(lat1);
  const px=Math.sqrt(dx*dx+dy*dy);
  const m=hav(lat1,lon1,lat2,lon2);
  return m/px;
}

function drawGun(mpp_ref){
  const{ctx,W,H}=cvs('cGun',900);cbg(ctx,W,H);

  const rx=tX(rcR.rx),ry=tY(rcR.ry),px=tX(pnR.rx),py=tY(pnR.ry);

  const optimalStart = computeOptimalStartR(rd);
  if(optimalStart){
    const {times,best,minT,tRange} = optimalStart;
    for(let i=0;i<times.length-1;i++){
      const a=times[i], b=times[i+1];
      const norm=(a.t-minT)/tRange;
      const rr=Math.round(norm*220), gg=Math.round((1-norm)*200);
      const aM=toM(a.sLat,a.sLon), bM=toM(b.sLat,b.sLon);
      const aR=r(aM.x,aM.y), bR=r(bM.x,bM.y);

      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.restore();
    }
    const bestM=toM(best.sLat,best.sLon), bestR=r(bestM.x,bestM.y);
    const obx=tX(bestR.rx), oby=tY(bestR.ry);
    ctx.save();
    ctx.strokeStyle='#00ff99';ctx.fillStyle='rgba(0,255,153,0.22)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(obx,oby,8,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(obx-11,oby);ctx.lineTo(obx+11,oby);ctx.moveTo(obx,oby-11);ctx.lineTo(obx,oby+11);ctx.stroke();
    ctx.fillStyle='#00ff99';ctx.font='bold 8px Orbitron';ctx.textAlign='center';
    ctx.fillText('OPT',obx,oby-14);
    ctx.fillStyle='rgba(0,255,153,0.8)';ctx.font='8px Share Tech Mono';
    ctx.fillText(Math.round(best.t)+'s · TWA'+Math.round(best.twa)+'°',obx,oby+20);
    ctx.restore();
    ctx.save();ctx.font='7px Share Tech Mono';ctx.fillStyle='rgba(0,204,255,.7)';
    ctx.textAlign='right';ctx.fillText(Math.round(times[0].t)+'s',rx-6,ry-8);
    ctx.fillStyle='rgba(255,204,0,.7)';ctx.textAlign='left';
    ctx.fillText(Math.round(times[times.length-1].t)+'s',px+6,py-8);
    ctx.restore();
  }
  ctx.save();ctx.fillStyle='rgba(0,204,255,.025)';ctx.font='bold 24px Orbitron';ctx.textAlign='center';ctx.fillText('GUN',W/2,H/2+10);ctx.restore();
  // Compute mpp for this canvas
  // mpp: use rotated metre coords (tX/tY work in rotated-metre space, not lat/lon)
  const slPx=Math.sqrt((tX(rcR.rx)-tX(pnR.rx))**2+(tY(rcR.ry)-tY(pnR.ry))**2);
  const mpp=hav(RC.lat,RC.lon,PIN.lat,PIN.lon)/slPx;
  // Distance to line dashes
  p2.forEach(d=>{
    if(d.dist<45){const bx=tX(d.rx),by=tY(d.ry),ddx=px-rx,ddy=py-ry,len2=ddx*ddx+ddy*ddy,tt=Math.max(0,Math.min(1,((bx-rx)*ddx+(by-ry)*ddy)/len2)),cx2=rx+tt*ddx,cy2=ry+tt*ddy;
      ctx.save();ctx.strokeStyle=reachRankColor(rd, d.sail)+'28';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(cx2,cy2);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=reachRankColor(rd, d.sail)+'75';ctx.font='8px Share Tech Mono';ctx.textAlign='center';ctx.fillText(Math.round(d.dist)+'m',(bx+cx2)/2-8,(by+cy2)/2-4);ctx.restore()}
  });
  // Speed/heading vectors — drawn before cats so they appear underneath
  p2.forEach(d=>{
    const bx=tX(d.rx),by=tY(d.ry);
    const sogM=d.sog*0.514444*10; // 10s projection at current SOG in metres
    const vlen=sogM/mpp; // pixels
    const hr=d.hdg*D2R;
    const ex=bx+Math.sin(hr)*vlen, ey=by-Math.cos(hr)*vlen;
    ctx.save();ctx.strokeStyle=reachRankColor(rd, d.sail)+'99';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,ey);ctx.stroke();
    // Arrowhead
    const ah=6,aw=3;
    ctx.fillStyle=reachRankColor(rd, d.sail)+'99';
    ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-Math.sin(hr-0.4)*ah, ey+Math.cos(hr-0.4)*ah);
    ctx.lineTo(ex-Math.sin(hr+0.4)*ah, ey+Math.cos(hr+0.4)*ah);
    ctx.closePath();ctx.fill();ctx.restore();
  });
  p2.forEach((d)=>drawCat(ctx,tX(d.rx),tY(d.ry),d.hdg,reachRankColor(rd, d.sail),d.sail,mpp,null));
  // Speed legend
  ctx.save();p2.forEach((d,i)=>{ctx.fillStyle=COL[d.sail];ctx.font='8px Share Tech Mono';ctx.textAlign='left';ctx.fillText(`#${d.sail} ${d.sog.toFixed(1)} kts`,14,18+i*13)});ctx.restore();
  scaleBar(ctx,mpp,W,H);
}

function drawCourse(tracks, rm, wf, markPos){
  // Course axis = 317.7° (LW→WW). Rotate by -42.3° so axis is vertical (WW at top).
  // Canvas sized to true aspect ratio of key marks: ~440px wide × 1000px tall.
  const CANVAS_W=440, CANVAS_H=1000;
  const{ctx,W,H}=cvs('cCourse',CANVAS_H);cbg(ctx,W,H);

  const _axis = brg(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon); // LW→WW bearing
  const THETA = (90 - _axis) * (Math.PI/180); // rotate so course axis points up
  const cLat=(WWGATE.lat+LWGATE.lat)/2, cLon=(WWGATE.lon+LWGATE.lon)/2;

  function toM(la,lo){
    return[(lo-cLon)*D2R*RE*Math.cos(cLat*D2R),(la-cLat)*D2R*RE];
  }
  function rot(x,y){
    return[x*Math.cos(THETA)-y*Math.sin(THETA), x*Math.sin(THETA)+y*Math.cos(THETA)];
  }
  function toRot(la,lo){ return rot(...toM(la,lo)); }

  // Build extent from key marks + start line + reach mark
  const keyPts=[WWGATE,LWGATE,{lat:RC.lat,lon:RC.lon},{lat:PIN.lat,lon:PIN.lon},
    {lat:WW_A.lat,lon:WW_A.lon},{lat:WW_B.lat,lon:WW_B.lon},
    {lat:LW_A.lat,lon:LW_A.lon},{lat:LW_B.lat,lon:LW_B.lon}];
  if(rm) keyPts.push({lat:rm.lat,lon:rm.lon});
  const rk=keyPts.map(p=>toRot(p.lat,p.lon));
  const mnX=Math.min(...rk.map(p=>p[0]))-60, mxX=Math.max(...rk.map(p=>p[0]))+60;
  const mnY=Math.min(...rk.map(p=>p[1]))-60, mxY=Math.max(...rk.map(p=>p[1]))+60;

  const pad=44;
  const scaleX=(W-pad*2)/(mxX-mnX), scaleY=(H-pad*2)/(mxY-mnY);
  const scale=Math.min(scaleX,scaleY); // uniform scale to preserve aspect ratio
  const offX=pad+(W-pad*2-(mxX-mnX)*scale)/2;
  const offY=pad+(H-pad*2-(mxY-mnY)*scale)/2;

  // tX/tY: rotated metres → canvas pixels (Y inverted: higher math Y = lower canvas Y → flip)
  const tX=rx=>offX+(rx-mnX)*scale;
  const tY=ry=>H-offY-(ry-mnY)*scale; // flip Y

  function tP(la,lo){const[rx,ry]=toRot(la,lo);return[tX(rx),tY(ry)];}

  const mpp=1/scale; // metres per pixel

  // Draw boat tracks (faint, top 4)
  for(const s of ['65','70','63','61'].reverse()){
    const t=tracks[s];if(!t)continue;
    ctx.save();ctx.strokeStyle=COL[s]+'38';ctx.lineWidth=1.5;ctx.beginPath();let f=1;
    for(const p of t.filter((_,i)=>i%3===0)){
      const[px,py]=tP(p.lat,p.lon);
      f?(ctx.moveTo(px,py),f=0):ctx.lineTo(px,py);
    }
    ctx.stroke();ctx.restore();
  }

  // Course axis line + bearing labels
  {const[ax,ay]=tP(LWGATE.lat,LWGATE.lon),[bx,by]=tP(WWGATE.lat,WWGATE.lon);
   dline(ctx,ax,ay,bx,by,'rgba(0,204,255,.3)',null,true);
   const caBrg2=brg(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon);
   const caLen2=Math.round(hav(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon));
   // Label at midpoint, offset 10px to right of line direction
   const mx2=(ax+bx)/2, my2=(ay+by)/2;
   const lineAng=Math.atan2(by-ay,bx-ax); // canvas angle of line
   const ox=Math.cos(lineAng+Math.PI/2)*12, oy=Math.sin(lineAng+Math.PI/2)*12;
   ctx.save();
   ctx.fillStyle='rgba(0,204,255,.75)';
   ctx.font='8px Share Tech Mono';
   ctx.textAlign='center'; ctx.textBaseline='middle';
   // Rotate label to follow the line
   ctx.translate(mx2+ox, my2+oy);
   ctx.rotate(lineAng);
   ctx.fillText(`${caBrg2.toFixed(1)}° / ${((caBrg2+180)%360).toFixed(1)}°  ${caLen2}m`, 0, 0);
   ctx.restore();}

  // Reach leg line from start mid to reach mark
  if(rm){
    const[sx,sy]=tP(MID.lat,MID.lon),[rx2,ry2]=tP(rm.lat,rm.lon);
    const rlB=brg(MID.lat,MID.lon,rm.lat,rm.lon);
    dline(ctx,sx,sy,rx2,ry2,'rgba(255,140,0,.5)',null,true);
    // Distance lines RC→RM and PIN→RM
    const[rcx,rcy]=tP(RC.lat,RC.lon),[pinx,piny]=tP(PIN.lat,PIN.lon);
    ctx.save();ctx.strokeStyle='rgba(0,204,255,.18)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
    ctx.beginPath();ctx.moveTo(rcx,rcy);ctx.lineTo(rx2,ry2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pinx,piny);ctx.lineTo(rx2,ry2);ctx.stroke();
    ctx.setLineDash([]);
    // Distance labels
    ctx.fillStyle='rgba(0,204,255,.55)';ctx.font='8px Share Tech Mono';ctx.textAlign='center';
    ctx.fillText(Math.round(hav(RC.lat,RC.lon,rm.lat,rm.lon))+'m',(rcx+rx2)/2+8,(rcy+ry2)/2);
    ctx.fillStyle='rgba(255,204,0,.55)';
    ctx.fillText(Math.round(hav(PIN.lat,PIN.lon,rm.lat,rm.lon))+'m',(pinx+rx2)/2-8,(piny+ry2)/2);
    ctx.restore();
    // Reach mark
    markRound(ctx,rx2,ry2,'#ff8c00','REACH',5);
    ctx.save();ctx.fillStyle='#ff8c00';ctx.font='8px Share Tech Mono';ctx.textAlign='left';
    ctx.fillText(`T+${rm.t_s.toFixed(0)}s  ${rlB.toFixed(1)}°`,rx2+9,ry2+3);ctx.restore();
  }

  // Start line + bearing label
  const[rcx,rcy]=tP(RC.lat,RC.lon),[pinx,piny]=tP(PIN.lat,PIN.lon);
  drawSL(ctx,rcx,rcy,pinx,piny,false);
  {const slBrg2=brg(RC.lat,RC.lon,PIN.lat,PIN.lon);
   const slLen2=Math.round(hav(RC.lat,RC.lon,PIN.lat,PIN.lon));
   const mx2=(rcx+pinx)/2, my2=(rcy+piny)/2;
   const lineAng=Math.atan2(piny-rcy,pinx-rcx);
   const ox=Math.cos(lineAng+Math.PI/2)*12, oy=Math.sin(lineAng+Math.PI/2)*12;
   ctx.save();
   ctx.fillStyle='rgba(255,204,0,.75)';
   ctx.font='8px Share Tech Mono';
   ctx.textAlign='center'; ctx.textBaseline='middle';
   ctx.translate(mx2+ox, my2+oy);
   ctx.rotate(lineAng);
   ctx.fillText(`${slBrg2.toFixed(1)}°  ${slLen2}m`, 0, 0);
   ctx.restore();}

  // Individual gate buoys + centroid markers
  const buoyPairs=[
    {snA:13498,snB:15255,ptA:WW_A,ptB:WW_B,col:'#00ff99',label:'WWGate'},
    {snA:15025,snB:15205,ptA:LW_A,ptB:LW_B,col:'#a78bfa',label:'LWGate'},
  ];
  buoyPairs.forEach(({snA,snB,ptA,ptB,col,label})=>{
    // Gate line between buoys
    const posA=markPos&&markPos[snA]?markPos[snA]:ptA;
    const posB=markPos&&markPos[snB]?markPos[snB]:ptB;
    const[ax2,ay2]=tP(posA.lat,posA.lon),[bx2,by2]=tP(posB.lat,posB.lon);
    ctx.save();ctx.strokeStyle=col+'60';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(ax2,ay2);ctx.lineTo(bx2,by2);ctx.stroke();ctx.restore();
    // Buoy dots
    [[ax2,ay2],[bx2,by2]].forEach(([bpx,bpy])=>{
      ctx.save();ctx.fillStyle=col+'99';ctx.strokeStyle=col;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(bpx,bpy,4,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
    });
    // Gate centre + label
    const gc=label==='WWGate'?WWGATE:LWGATE;
    const[gcx,gcy]=tP(gc.lat,gc.lon);
    markRound(ctx,gcx,gcy,col,label,4);
  });

  // Rotated north arrow — map is rotated by THETA so true north is offset
  // True north points at -THETA from canvas-up = +42.3° clockwise from up
  {const nx=W-28,ny=28,nl=16,na=-THETA; // north direction in canvas coords
   ctx.save();
   ctx.strokeStyle='rgba(0,204,255,.55)';ctx.lineWidth=1.5;
   ctx.beginPath();ctx.moveTo(nx,ny);
   ctx.lineTo(nx+Math.sin(na)*nl, ny-Math.cos(na)*nl);
   ctx.stroke();
   ctx.fillStyle='rgba(0,204,255,.7)';ctx.font='7px Orbitron';
   ctx.textAlign='center';ctx.textBaseline='middle';
   ctx.fillText('N', nx+Math.sin(na)*(nl+7), ny-Math.cos(na)*(nl+7));
   ctx.restore();}

  // Track legend (bottom-left)
  ['63','61','70','65'].forEach((s,i)=>{ctx.save();ctx.strokeStyle=COL[s]+'90';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(10,H-50+i*13);ctx.lineTo(26,H-50+i*13);ctx.stroke();
    ctx.fillStyle=COL[s];ctx.font='bold 8px Orbitron';ctx.textAlign='left';ctx.fillText('#'+s,29,H-46+i*13);ctx.restore();});

  scaleBar(ctx,mpp,W,H);
}
