function renderEventSummary(panelEl, allRaces){
  if(!allRaces.length){
    panelEl.innerHTML='<div class="load-wrap"><div class="load-msg">NO RACES LOADED</div><div class="load-sub">Load races from each day tab first, then return here</div></div>';
    return;
  }
  const avg  = arr => { const v=arr.filter(x=>x!=null); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; };
  const sum  = arr => arr.filter(x=>x!=null).reduce((a,b)=>a+b,0);
  const fmtN = (v,dp=1) => v!=null ? v.toFixed(dp) : '—';

  const allBoats = [...new Set(allRaces.flatMap(r=>r.BOATS.filter(b=>!EXCLUDED_BOATS.includes(b))))].sort();
  const N = allRaces.length;

  const boatData = {};
  allBoats.forEach(b=>{ boatData[b]={ reachPos:[], finPos:[], delta:[], distGun:[], sogGun:[], t95:[], ocsVakaros:[], raceDay:[] }; });

  for(const rd of allRaces){
    const dayIdx = rd.event?._dayIdx ?? 0;
    const officialRace = (OFFICIAL_RESULTS_BY_DAY[dayIdx]||OFFICIAL_RESULTS_BY_DAY[0])[rd.raceNum] || {};
    for(const b of allBoats){
      const rp = rd.l1Order.indexOf(b);
      boatData[b].reachPos.push(rp>=0?rp+1:null);
      const fp = officialRace[b];
      boatData[b].finPos.push(typeof fp==='number'?fp:null);
      const rPos=rp>=0?rp+1:null, fPos=typeof fp==='number'?fp:null;
      boatData[b].delta.push(rPos!=null&&fPos!=null?rPos-fPos:null);
      const ss=rd.startStats?.find(s=>s.sail===b);
      boatData[b].distGun.push(ss?.distGun!=null?Math.abs(ss.distGun):null);
      const gd=rd.GUND?.find(d=>d.sail===b);
      boatData[b].sogGun.push(gd?gd.sog:null);
      boatData[b].t95.push(ss?.accel != null ? ss.accel : null);
      const ocsVak=rd.ocsFromTelemetry?rd.ocsFromTelemetry.has(b):false;
      boatData[b].ocsVakaros.push(ocsVak);
      boatData[b].raceDay.push(EVENTS[dayIdx]?.label||`D${dayIdx+1}`);
    }
  }

  const aggr={};
  allBoats.forEach(b=>{
    const d=boatData[b];
    const nRaces=d.finPos.filter(v=>v!=null).length;
    aggr[b]={
      avgReach: avg(d.reachPos), avgFin: avg(d.finPos),
      avgDelta: avg(d.delta), avgDist: avg(d.distGun),
      avgSog: avg(d.sogGun), avgT95: avg(d.t95),
      ocsCount: sum(d.ocsVakaros.map(v=>v?1:0)),
      nRaces, totalPts: sum(d.finPos.filter(v=>v!=null))
    };
  });

  const finCell=v=>v!=null?`<span style="font-family:Orbitron,monospace;font-size:11px;color:${v<=2?'var(--green)':v<=4?'var(--yellow)':'var(--muted)'}">${v.toFixed(1)}</span>`:'—';
  const ocsCell=v=>v?`<span style="color:#ff3355;font-family:Orbitron,monospace;font-size:11px">${v}</span>`:'<span class="ds-ocs-none">0</span>';
  const deltaCell=v=>{if(v==null)return'—';const c=v>0?'var(--green)':v<0?'var(--red)':'var(--muted)';return`<span style="font-family:Orbitron,monospace;font-size:11px;color:${c}">${v>0?'+':''}${v.toFixed(1)}</span>`;};

  const reachRankMap = {};
  [...allBoats]
    .sort((a,b)=>{
      const va = aggr[a].avgReach, vb = aggr[b].avgReach;
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return va-vb;
    })
    .forEach((b,i)=>{ reachRankMap[b]=i+1; });

  const rankBadge = rank => {
    if(!rank) return '';
    const cls = rank===1?'ds-rank-1':rank===2?'ds-rank-2':rank===3?'ds-rank-3':'';
    return `<span class="ds-rank-badge ${cls}">#${rank}</span>`;
  };

  let sortKey='totalPts', sortDir=1;
  function sortedBoats(){
    return [...allBoats].sort((a,b)=>{
      if(sortKey==='boat') return String(a).localeCompare(String(b))*sortDir;
      const va = aggr[a][sortKey], vb = aggr[b][sortKey];
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return (va-vb)*sortDir;
    });
  }

  function renderTable(){
    const boats=sortedBoats();
    const colDefs = [
      {key:'boat', label:'BOAT'},
      {key:'nRaces', label:'RACES'},
      {key:'totalPts', label:'TOTAL PTS'},
      {key:'avgFin', label:'AVG FINISH'},
      {key:'avgReach', label:'AVG REACH'},
      {key:'avgDelta', label:'AVG Δ'},
      {key:'avgDist', label:'AVG DTL'},
      {key:'avgSog', label:'AVG SPD@GUN'},
      {key:'avgT95', label:'AVG T→95%'},
      {key:'ocsCount', label:'OCS'},
    ];
    const hdrs = colDefs.map(c=>{
      const cls = sortKey===c.key ? (sortDir===1?'sort-asc':'sort-desc') : '';
      return `<th class="${cls}" data-sort="${c.key}" style="text-align:${c.key==='boat'?'left':'center'};padding:4px 8px">${c.label}</th>`;
    }).join('');

    const rows = boats.map((b,i)=>{
      const ag=aggr[b], c=COL[b]||'#888', rank=reachRankMap[b];
      return `<tr style="border-bottom:1px solid rgba(255,255,255,.04)${i%2?' ':';background:rgba(255,255,255,.02)'}">
        <td style="padding:5px 8px">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:6px;vertical-align:middle"></span>
          <span style="font-family:Orbitron,monospace;font-weight:700;color:${c}">${b}</span>
          <span style="font-size:9px;color:var(--muted);margin-left:4px">${TEAM_NAMES[b]||''}</span>
        </td>
        <td style="text-align:center;color:var(--muted)">${ag.nRaces}</td>
        <td style="text-align:center;font-family:Orbitron,monospace;font-weight:700;color:${rank<=3?'var(--green)':'var(--muted)'}">${ag.totalPts||'—'}</td>
        <td style="text-align:center">${finCell(ag.avgFin)}</td>
        <td style="text-align:center"><span class="ds-rank-wrap"><span style="font-family:Orbitron,monospace;color:${c}">${fmtN(ag.avgReach)}</span>${rankBadge(rank)}</span></td>
        <td style="text-align:center">${deltaCell(ag.avgDelta)}</td>
        <td style="text-align:center;color:var(--muted);font-family:Share Tech Mono,monospace">${ag.avgDist!=null?ag.avgDist.toFixed(1)+'m':'—'}</td>
        <td style="text-align:center;color:var(--muted);font-family:Share Tech Mono,monospace">${ag.avgSog!=null?ag.avgSog.toFixed(1)+'kts':'—'}</td>
        <td style="text-align:center;color:var(--muted);font-family:Share Tech Mono,monospace">${ag.avgT95!=null?ag.avgT95.toFixed(1)+'s':'—'}</td>
        <td style="text-align:center">${ocsCell(ag.ocsCount)}</td>
      </tr>`;
    }).join('');

    return `<table class="ds-avg-table" style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  const fleetAvgSog = avg(allBoats.map(b=>aggr[b].avgSog));
  const fleetAvgDist = avg(allBoats.map(b=>aggr[b].avgDist));
  const fleetAvgT95 = avg(allBoats.map(b=>aggr[b].avgT95));
  const totalOCS = sum(allBoats.map(b=>aggr[b].ocsCount));

  panelEl.innerHTML=`
    <div style="padding:16px 20px">
      <div class="sh" style="margin-bottom:12px">EVENT OVERALL — ${N} races · ${allBoats.length} boats · ${EVENTS.length} days</div>
      <div class="ds-highlights" style="margin-bottom:16px">
        <div class="ds-hl">
          <div class="ds-hl-val">${N}</div>
          <div class="ds-hl-lbl">RACES LOADED</div>
        </div>
        <div class="ds-hl">
          <div class="ds-hl-val">${fleetAvgSog!=null?fleetAvgSog.toFixed(2)+' kts':'—'}</div>
          <div class="ds-hl-lbl">REGATTA AVG SPEED @ GUN</div>
        </div>
        <div class="ds-hl">
          <div class="ds-hl-val">${fleetAvgDist!=null?Math.round(fleetAvgDist)+'m':'—'}</div>
          <div class="ds-hl-lbl">REGATTA AVG DIST TO LINE @ GUN</div>
        </div>
        <div class="ds-hl">
          <div class="ds-hl-val">${fleetAvgT95!=null?fleetAvgT95.toFixed(1)+'s':'—'}</div>
          <div class="ds-hl-lbl">REGATTA AVG T→95%</div>
        </div>
        <div class="ds-hl" style="border-color:${totalOCS>0?'rgba(255,68,102,.4)':'var(--muted2)'}">
          <div class="ds-hl-val" style="color:${totalOCS>0?'var(--red)':'var(--cyan)'}">${totalOCS}</div>
          <div class="ds-hl-lbl">TOTAL VAKAROS OCS CALLS</div>
        </div>
      </div>
      <div class="ds-title">REGATTA AVERAGES — click column header to sort</div>
      <div id="eventSummaryTableWrap">${renderTable()}</div>
    </div>`;

  panelEl.querySelector('#eventSummaryTableWrap').addEventListener('click', function onEventSummaryClick(e){
    const th=e.target.closest('th[data-sort]');
    if(!th) return;
    const key=th.dataset.sort;
    if(sortKey===key) sortDir*=-1;
    else { sortKey=key; sortDir=1; }
    panelEl.querySelector('#eventSummaryTableWrap').innerHTML=renderTable();
  });
}

function renderDaySummary(panelEl, event, races){
  const loaded = races.filter(Boolean);
  if(!loaded.length){
    panelEl.innerHTML='<div class="load-wrap"><div class="load-msg">LOAD RACES FIRST</div><div class="load-sub">Click each race tab to load data, then return here</div></div>';
    return;
  }

  // ── helpers ──
  const avg  = arr => { const v=arr.filter(x=>x!=null); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; };
  const sum  = arr => arr.filter(x=>x!=null).reduce((a,b)=>a+b,0);
  const fmtN = (v,dp=1) => v!=null ? v.toFixed(dp) : '—';

  // ── exclude non-racing boats ──
  const allBoats = [...new Set(loaded.flatMap(r=>
    r.BOATS.filter(b=>!EXCLUDED_BOATS.includes(b))
  ))].sort();
  const raceNums = loaded.map(r=>r.raceNum);
  const N = loaded.length;

  // ══════════════════════════════════════════════════════
  // Per-boat per-race metrics
  // ══════════════════════════════════════════════════════
  // boatData[sail] = { reachPos[], finPos[], delta[], distGun[], sogGun[], ocsOfficial[], ocsVakaros[] }
  const boatData = {};
  allBoats.forEach(b=>{ boatData[b]={ reachPos:[], finPos:[], delta:[], distGun:[], sogGun:[], t95:[], ocsVakaros:[] }; });

  for(const rd of loaded){
    const officialRace = (OFFICIAL_RESULTS_BY_DAY[rd.event._dayIdx||0]||OFFICIAL_RESULTS_BY_DAY[0])[rd.raceNum] || {};
    // Build finish order from OFFICIAL_RESULTS (numeric pos, ascending)
    const finOrder = Object.entries(officialRace)
      .filter(([,v])=>typeof v==='number')
      .sort((a,b)=>a[1]-b[1])
      .map(([sail])=>sail);

    for(const b of allBoats){
      // 1. Reach position (l1Order rank 1-based)
      const rp = rd.l1Order.indexOf(b);
      const reachPos = rp>=0 ? rp+1 : null;
      boatData[b].reachPos.push(reachPos);

      // 2. Finish position from official results
      const fp = officialRace[b];
      const finPos = (typeof fp==='number') ? fp : null;
      boatData[b].finPos.push(finPos);

      // 3. Places delta: reach → finish (positive = gained places after reach mark)
      const delta = (reachPos!=null && finPos!=null) ? reachPos - finPos : null;
      boatData[b].delta.push(delta);

      // 4. Distance from start line at gun — absolute signed DTL (distance to line itself)
      const ss = rd.startStats?.find(s=>s.sail===b);
      const gd = rd.GUND?.find(d=>d.sail===b);
      // distGun is signed DTL: + = pre-start side, - = OCS side. Abs = dist to line.
      const distFromLine = ss?.distGun != null ? Math.abs(ss.distGun) : null;
      boatData[b].distGun.push(distFromLine);

      // 5. Speed at gun (from GUND which already has interpolated SOG in kts)
      boatData[b].sogGun.push(gd ? gd.sog : null);

      // 5b. T→95% time from the start report
      boatData[b].t95.push(ss?.accel != null ? ss.accel : null);

      // 6. Official OCS — Vakaros telemetry status=1 flag (authoritative)
      // ocsFromTelemetry is a Set of sail numbers called OCS by Vakaros this race
      const ocsVak = rd.ocsFromTelemetry ? rd.ocsFromTelemetry.has(b) : null;
      boatData[b].ocsVakaros.push(ocsVak === true ? true : false);
    }
  }

  // ── Day-level aggregates per boat ──
  const aggr = {};
  allBoats.forEach(b=>{
    const d = boatData[b];
    aggr[b] = {
      avgReach  : avg(d.reachPos),
      avgFin    : avg(d.finPos),
      avgDelta  : avg(d.delta),
      avgDist   : avg(d.distGun),
      avgSog    : avg(d.sogGun),
      avgT95    : avg(d.t95),
      ocsCount  : sum(d.ocsVakaros.map(v=>v?1:0)),
      nRaces    : d.reachPos.filter(x=>x!=null).length,
      // per-race arrays for slope chart
      reachPerRace : d.reachPos,
      finPerRace   : d.finPos,
    };
  });

  const reachRankMap = {};
  [...allBoats]
    .sort((a,b)=>{
      const va = aggr[a].avgReach, vb = aggr[b].avgReach;
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return va-vb;
    })
    .forEach((b,i)=>{ reachRankMap[b]=i+1; });

  const rankBadge = rank => {
    if(!rank) return '';
    const cls = rank===1?'ds-rank-1':rank===2?'ds-rank-2':rank===3?'ds-rank-3':'';
    return `<span class="ds-rank-badge ${cls}">#${rank}</span>`;
  };

  // ── Fleet highlights ──
  const fleetAvgSog  = avg(allBoats.map(b=>aggr[b].avgSog));
  const fleetAvgDist = avg(allBoats.map(b=>aggr[b].avgDist));
  const fleetAvgT95  = avg(allBoats.map(b=>aggr[b].avgT95));
  const totalOCS     = sum(allBoats.map(b=>aggr[b].ocsCount));

  // ══════════════════════════════════════════════════════
  // Render
  // ══════════════════════════════════════════════════════

  // Sort state — default by avg finish position ascending
  let sortKey = 'avgFin', sortDir = 1;

  function sortedBoats(){
    return [...allBoats].sort((a,b)=>{
      const va = aggr[a][sortKey], vb = aggr[b][sortKey];
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return (va - vb) * sortDir;
    });
  }

  function finCell(v){
    if(v==null) return '<span class="ds-fin-n">—</span>';
    const cls = v===1?'ds-fin-1':v===2?'ds-fin-2':v===3?'ds-fin-3':'ds-fin-n';
    return `<span class="${cls}">${fmtN(v,1)}</span>`;
  }
  function deltaCell(v){
    if(v==null) return '<span class="ds-delta-neu">—</span>';
    const cls = v>0.4?'ds-delta-pos':v<-0.4?'ds-delta-neg':'ds-delta-neu';
    return `<span class="${cls}">${v>0?'+':''}${fmtN(v,1)}</span>`;
  }
  function ocsCell(count){
    if(count>0) return `<span class="ds-ocs-warn">⚠ ${count}</span>`;
    return '<span class="ds-ocs-none">0</span>';
  }

  function renderTable(){
    const boats = sortedBoats();
    const colDefs = [
      {key:'boat',   label:'BOAT',              sortKey:null},
      {key:'avgFin', label:'AVG FINISH',        sortKey:'avgFin'},
      {key:'avgReach',label:'AVG REACH',        sortKey:'avgReach'},
      {key:'avgDelta',label:'REACH→FIN Δ',      sortKey:'avgDelta'},
      {key:'avgDist', label:'AVG DIST TO LINE (m)', sortKey:'avgDist'},
      {key:'avgSog',  label:'AVG SPD@GUN (kts)',sortKey:'avgSog'},
      {key:'avgT95', label:'AVG T→95% (s)', sortKey:'avgT95'},
      {key:'ocsCount',label:'OCS (VAKAROS)',    sortKey:'ocsCount'},
      {key:'nRaces',  label:'RACES',            sortKey:'nRaces'},
    ];

    const hdrs = colDefs.map(c=>{
      if(!c.sortKey) return `<th>${c.label}</th>`;
      const cls = sortKey===c.sortKey ? (sortDir===1?'sort-asc':'sort-desc') : '';
      return `<th class="${cls}" data-sort="${c.sortKey}">${c.label}</th>`;
    }).join('');

    const rows = boats.map(b=>{
      const ag = aggr[b]; const col = COL[b]||'#888';
      const team = TEAM_NAMES[b] || '';
      const reachRank = reachRankMap[b];
      return `<tr>
        <td><div class="cell-boat">
          <div class="boat-dot" style="background:${col}"></div>
          <div><div class="boat-name" style="color:${col}">#${b}</div>
          ${team?`<div class="boat-team">${team}</div>`:''}
          </div>
        </div></td>
        <td style="text-align:center">${finCell(ag.avgFin)}</td>
        <td style="text-align:center"><span class="ds-rank-wrap"><span class="ds-fin-n" style="font-family:Orbitron,monospace;font-size:11px;color:${col}">${fmtN(ag.avgReach,1)}</span>${rankBadge(reachRank)}</span></td>
        <td style="text-align:center">${deltaCell(ag.avgDelta)}</td>
        <td style="text-align:center"><span class="ds-mono">${ag.avgDist!=null?Math.round(ag.avgDist)+'m':'—'}</span></td>
        <td style="text-align:center"><span class="ds-mono">${fmtN(ag.avgSog,2)}</span></td>
        <td style="text-align:center"><span class="ds-mono">${ag.avgT95!=null?ag.avgT95.toFixed(1)+'s':'—'}</span></td>
        <td style="text-align:center">${ocsCell(ag.ocsCount)}</td>
        <td style="text-align:center"><span class="ds-mono">${ag.nRaces}/${N}</span></td>
      </tr>`;
    }).join('');

    return `<table class="ds-avg-table"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  function renderSlopeChart(){
    // SVG slope chart: reach pos → finish pos per boat
    // Y axis: position 1 (top) → max boats (bottom)
    // Each boat: left node (reach), right node (finish), line connecting
    const maxPos = allBoats.length;
    const W=520, H=Math.max(180, maxPos*28+40);
    const L=120, R=W-120, pad=20; // left/right x for reach/finish columns
    const yScale = p => pad + (p-1)/(maxPos-1||1)*(H-pad*2);

    // Deduplicate overlapping positions slightly
    const reachCounts={}, finCounts={};
    const boats = sortedBoats();

    const lines = boats.map(b=>{
      const ag=aggr[b], col=COL[b]||'#888';
      if(ag.avgReach==null || ag.avgFin==null) return '';
      const ry=yScale(ag.avgReach), fy=yScale(ag.avgFin);
      const gained = ag.avgReach > ag.avgFin; // lower pos number = better = gained
      const strokeCol = gained ? '#00ff99' : ag.avgReach < ag.avgFin ? '#ff4466' : '#7a9ab0';
      return `<line x1="${L}" y1="${ry.toFixed(1)}" x2="${R}" y2="${fy.toFixed(1)}"
        stroke="${strokeCol}" stroke-width="1.8" stroke-opacity="0.65"/>`;
    }).join('');

    const rNodes = boats.map(b=>{
      const ag=aggr[b], col=COL[b]||'#888';
      if(ag.avgReach==null) return '';
      const ry=yScale(ag.avgReach);
      return `<circle cx="${L}" cy="${ry.toFixed(1)}" r="4" fill="${col}" opacity="0.9"/>
        <text x="${L-8}" y="${(ry+4).toFixed(1)}" text-anchor="end" font-size="9"
          font-family="Share Tech Mono,monospace" fill="${col}">#${b} ${ag.avgReach.toFixed(1)}</text>`;
    }).join('');

    const fNodes = boats.map(b=>{
      const ag=aggr[b], col=COL[b]||'#888';
      if(ag.avgFin==null) return '';
      const fy=yScale(ag.avgFin);
      return `<circle cx="${R}" cy="${fy.toFixed(1)}" r="4" fill="${col}" opacity="0.9"/>
        <text x="${R+8}" y="${(fy+4).toFixed(1)}" text-anchor="start" font-size="9"
          font-family="Share Tech Mono,monospace" fill="${col}">${ag.avgFin.toFixed(1)} #${b}</text>`;
    }).join('');

    return `<div class="ds-slope-wrap">
      <div class="ds-slope-title">SLOPE CHART — AVG REACH POSITION → AVG FINISH POSITION &nbsp;
        <span style="color:var(--green);font-size:8px">▬ gained</span> &nbsp;
        <span style="color:var(--red);font-size:8px">▬ lost</span></div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible">
        <line x1="${L}" y1="${pad-8}" x2="${L}" y2="${H-pad+8}" stroke="rgba(0,204,255,.2)" stroke-width="1"/>
        <line x1="${R}" y1="${pad-8}" x2="${R}" y2="${H-pad+8}" stroke="rgba(0,204,255,.2)" stroke-width="1"/>
        <text x="${L}" y="${pad-12}" text-anchor="middle" font-size="9" font-family="Orbitron,monospace"
          fill="rgba(0,204,255,.6)" letter-spacing="1">REACH</text>
        <text x="${R}" y="${pad-12}" text-anchor="middle" font-size="9" font-family="Orbitron,monospace"
          fill="rgba(0,204,255,.6)" letter-spacing="1">FINISH</text>
        ${lines}${rNodes}${fNodes}
      </svg>
    </div>`;
  }

  // Initial render
  panelEl.innerHTML = `
    <!-- Highlights strip -->
    <div class="ds-highlights">
      <div class="ds-hl">
        <div class="ds-hl-val">${N}</div>
        <div class="ds-hl-lbl">RACES LOADED</div>
      </div>
      <div class="ds-hl">
        <div class="ds-hl-val">${fleetAvgSog!=null?fleetAvgSog.toFixed(2)+' kts':'—'}</div>
        <div class="ds-hl-lbl">FLEET AVG SPEED @ GUN</div>
      </div>
      <div class="ds-hl">
        <div class="ds-hl-val">${fleetAvgDist!=null?Math.round(fleetAvgDist)+'m':'—'}</div>
        <div class="ds-hl-lbl">FLEET AVG DIST TO LINE @ GUN</div>
      </div>
      <div class="ds-hl">
        <div class="ds-hl-val">${fleetAvgT95!=null?fleetAvgT95.toFixed(1)+'s':'—'}</div>
        <div class="ds-hl-lbl">FLEET AVG T→95%</div>
      </div>
      <div class="ds-hl" style="border-color:${totalOCS>0?'rgba(255,68,102,.4)':'var(--muted2)'}">
        <div class="ds-hl-val" style="color:${totalOCS>0?'var(--red)':'var(--cyan)'}">${totalOCS}</div>
        <div class="ds-hl-lbl">TOTAL VAKAROS OCS CALLS</div>
      </div>
    </div>

    <!-- Averages table -->
    <div class="ds-section">
      <div class="ds-title">DAY AVERAGES — click column header to sort</div>
      <div id="dsTableWrap">${renderTable()}</div>
    </div>

    <!-- Slope chart -->
    <div class="ds-section">${renderSlopeChart()}</div>
  `;

  // Wire up sortable column headers (event delegation)
  panelEl.querySelector('#dsTableWrap').addEventListener('click', e=>{
    const th = e.target.closest('th[data-sort]');
    if(!th) return;
    const key = th.dataset.sort;
    if(sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = 1; }
    panelEl.querySelector('#dsTableWrap').innerHTML = renderTable();
    // re-attach listener on the new table
    panelEl.querySelector('#dsTableWrap').addEventListener('click', arguments.callee);
  });
}

  const dayPanelsEl= document.getElementById('dayPanels');

  document.getElementById('hdrFleet').textContent = 'M32 Fleet';
  document.getElementById('regattatitle').textContent = REGATTA_TITLE;
  document.getElementById('regattasub').textContent = REGATTA_SUBTITLE;
  document.title = REGATTA_SUBTITLE + ' · Race Report';
  const exportLbl = document.getElementById('exportDayLabel');
  if(exportLbl) exportLbl.textContent = EVENTS[0]?.label || '';

  EVENTS.forEach((event, di)=>{
    // Day tab
    const dt = document.createElement('div');
    dt.className = 'day-tab' + (di===0?' active':'');
    dt.textContent = event.label;
    dt.dataset.day = di;
    dt.onclick = ()=>switchDay(di);
    dayTabsEl.appendChild(dt);

    // Day panel
    const dp = document.createElement('div');
    dp.className = 'day-panel' + (di===0?' active':'');
    dp.id = `dayPanel${di}`;

    // Race tabs row
    const rtRow = document.createElement('div');
    rtRow.className = 'race-tabs';
    rtRow.id = `raceTabs${di}`;

    const dayTwsBar = document.createElement('div');
    dayTwsBar.className = 'nc';
    dayTwsBar.style.cssText='margin:0 0 10px 0;padding:10px 12px';
    dayTwsBar.innerHTML = `<div class="nt">POLAR INPUT — DAY TRUE WIND SPEED</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px">
        <span style="font-size:10px;color:var(--muted)">Day override (kt)</span>
        <input id="dayTwsInput${di}" type="number" min="1" step="0.1" placeholder="optional" style="width:88px;background:#0f1822;border:1px solid #263647;color:#e9f1fa;border-radius:6px;padding:6px 8px;font:600 11px Orbitron,sans-serif">
        <button class="export-btn" style="padding:6px 10px" onclick="saveDayTwsOverride(${di})">SAVE DAY TWS</button>
        <button class="export-btn" style="padding:6px 10px" onclick="clearDayTwsOverride(${di})">CLEAR DAY</button>
        <span id="dayTwsState${di}" style="font-size:10px;color:var(--muted2)"></span>
      </div>
      <div style="font-size:9px;color:var(--muted);margin-top:6px">Day TWS applies to all races on this day unless a race-level override is entered.</div>`;

    // Race content
    const rcContent = document.createElement('div');
    rcContent.id = `raceContent${di}`;

    // Loading state initially
    rcContent.innerHTML = `<div class="load-wrap" id="dayLoad${di}">
      <div class="load-spinner"></div>
      <div class="load-msg" id="dayLoadMsg${di}">SCANNING ${event.label}…</div>
      <div class="load-sub">Detecting race starts</div>
    </div>`;

    dp.appendChild(dayTwsBar);
    dp.appendChild(rtRow);
    dp.appendChild(rcContent);
    dayPanelsEl.appendChild(dp);
  });

  EVENTS.forEach((_,di)=>updateDayTwsUi(di));

  // EVENT tab — overall averages across all days
  const et = document.createElement('div');
  et.className = 'day-tab event-tab';
  et.textContent = 'EVENT';
  et.dataset.day = 'event';
  et.onclick = ()=>showEventSummary();
  dayTabsEl.appendChild(et);

  // Event panel
  const ep = document.createElement('div');
  ep.className = 'day-panel';
  ep.id = 'dayPanelEvent';
  ep.innerHTML = '<div class="load-wrap"><div class="load-msg">Click EVENT tab to load overall averages</div></div>';
  dayPanelsEl.appendChild(ep);
}

function showEventSummary(){
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.day-tab.event-tab').classList.add('active');
  document.getElementById('dayPanelEvent').classList.add('active');
  const lbl = document.getElementById('exportDayLabel');
  if(lbl) lbl.textContent = 'EVENT';
  // Gather all loaded races across all days
  const allRaces = EVENTS.flatMap(ev => (ev._races||[]).filter(Boolean));
  const panel = document.getElementById('dayPanelEvent');
  renderEventSummary(panel, allRaces);
}

function switchDay(di){ currentDay=di;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.day-tab[data-day="${di}"]`).classList.add('active');
  document.getElementById(`dayPanel${di}`).classList.add('active');
  // Update PDF button label
  const lbl = document.getElementById('exportDayLabel');
  if(lbl) lbl.textContent = EVENTS[di]?.label || `DAY ${di+1}`;
  // Trigger first-race load for this day if not yet loaded
  const event = EVENTS[di];
  updateDayTwsUi(di);
  if(event && event._guns && !event._firstRaceLoaded){
    event._firstRaceLoaded = true;
    const guns = event._guns;
    selectRace(event, di, guns[0][0], guns, 0);
  }
}

function refreshDayWind(event){
  const dayObj=computeDayWind(event);
  for(const rd of (event?._races||[]).filter(Boolean)){
    rd.WF_DAY_OBJ = dayObj;
    rd.WF_BLEND_OBJ = blendRaceAndDayWind(rd.WF_RACE_OBJ || rd.WF_OBJ, dayObj) || rd.WF_RACE_OBJ || rd.WF_OBJ;
    rd.WF_OBJ = rd.WF_BLEND_OBJ;
    rd.WF = rd.WF_BLEND_OBJ?.wf ?? rd.WF_RACE_OBJ?.wf ?? rd.WF ?? null;
    const panelEl=document.getElementById(`racePanel${rd._dayIdx}_${rd.raceNum}`);
    if(panelEl && panelEl.offsetParent !== null){
      const saved=saveGlobals(); setGlobals(rd);
      try{ drawWindR(rd); drawCourseR(rd); if(rd.GUND?.length && rd.RC && rd.PIN) drawGunR(rd); }
      catch(e){ console.warn('refreshDayWind redraw failed', rd.raceNum, e); }
      finally{ restoreGlobals(saved); }
    }
  }
}

function buildRaceTabs(event, di, guns){
  const rtRow = document.getElementById(`raceTabs${di}`);
  const rcContent = document.getElementById(`raceContent${di}`);
  const dayLoadEl = document.getElementById(`dayLoad${di}`);
  
  if(dayLoadEl) dayLoadEl.remove();

  // Set dayIdx NOW so auto-load uses the correct cache key and raceData._dayIdx
  event._dayIdx = di;
  // Store guns so switchDay can trigger first-load on demand
  event._guns = guns;
  event._firstRaceLoaded = (di === currentDay); // day 0 will load immediately

  // Store races array for day summary
  event._races = new Array(guns.length).fill(null);

  // Day summary tab — FIRST (before race tabs)
  const st = document.createElement('div');
  st.className = 'race-tab avg-tab';
  st.textContent = 'DAY AVG';
  st.id = `summaryTab${di}`;
  st.onclick = ()=>{
    document.querySelectorAll(`#raceTabs${di} .race-tab`).forEach(t=>t.classList.remove('active'));
    st.classList.add('active');
    const sp = document.getElementById(`summaryPanel${di}`) || (() => {
      const el=document.createElement('div'); el.id=`summaryPanel${di}`; el.className='day-summary'; rcContent.appendChild(el); return el;
    })();
    document.querySelectorAll(`#raceContent${di} > div`).forEach(p=>p.style.display='none');
    sp.style.display='block';
    renderDaySummary(sp, event, event._races);
  };
  rtRow.appendChild(st);

  // Race tabs
  guns.forEach(([raceNum], ri)=>{
    const rt = document.createElement('div');
    rt.className = 'race-tab';
    rt.id = `raceTab${di}_${raceNum}`;
    rt.textContent = `R${raceNum}`;
    rt.dataset.race = raceNum;
    rt.onclick = ()=>selectRace(event, di, raceNum, guns, ri);
    rtRow.appendChild(rt);
  });

  // Auto-load first race only for the currently visible day.
  // Other days defer until the user clicks that tab (avoids global variable clobbering).
  if(guns.length && di === currentDay){
    selectRace(event, di, guns[0][0], guns, 0);
  }
}

// ── Serial race load queue — ensures only one loadRace runs at a time ──
// This prevents global variable clobbering (window.GUN, RC, PIN etc.)
// when multiple races are triggered (e.g. switching day tabs quickly).
let _raceQueue = Promise.resolve();

function selectRace(event, di, raceNum, guns, ri){
  event._dayIdx = di;

  // Update tab active state immediately (before any async work)
  document.querySelectorAll(`#raceTabs${di} .race-tab`).forEach(t=>t.classList.remove('active'));
  const tabEl = document.getElementById(`raceTab${di}_${raceNum}`);
  if(tabEl) tabEl.classList.add('active');

  const rcContent = document.getElementById(`raceContent${di}`);
  const panelId = `racePanel${di}_${raceNum}`;

  // If already rendered, just show it — no queue needed
  const existing = document.getElementById(panelId);
  if(existing){
    document.querySelectorAll(`#raceContent${di} > div`).forEach(p=>p.style.display='none');
    existing.style.display='block';
    const rd=(event._races||[]).find(r=>r && r.raceNum===raceNum && (r._dayIdx===di || event._dayIdx===di));
    if(rd){ requestAnimationFrame(()=>{ try{ const saved=saveGlobals(); setGlobals(rd); drawWindR(rd); drawCourseR(rd); if(rd.GUND?.length && rd.RC && rd.PIN) drawGunR(rd); if(rd.T50?.length && rd.RC && rd.PIN) drawT50R(rd); if(rd.RC && rd.PIN) initStartReplayR(rd); restoreGlobals(saved);}catch(e){ console.warn('revisit redraw failed', raceNum, e); } }); }
    return;
  }

  // Create panel with loading state immediately so user sees spinner
  const panel = document.createElement('div');
  panel.id = panelId;
  panel.className = 'race-panel active';
  panel.innerHTML = `<div class="load-wrap"><div class="load-spinner"></div><div class="load-msg" id="raceLoadMsg${di}_${raceNum}">LOADING RACE ${raceNum}…</div></div>`;
  document.querySelectorAll(`#raceContent${di} > div`).forEach(p=>p.style.display='none');
  rcContent.appendChild(panel);

  // Chain onto the queue — loadRace and renderRacePanel run serially
  _raceQueue = _raceQueue.then(async ()=>{
    const msgEl = document.getElementById(`raceLoadMsg${di}_${raceNum}`);
    const gunTs = guns[ri][1];
    const nextGunTs = guns[ri+1] ? guns[ri+1][1] : null;
    let rd;
    try {
      rd = await loadRace(event, raceNum, gunTs, nextGunTs, msgEl);
    } catch(e){
      panel.innerHTML = `<div class="err">ERROR LOADING RACE ${raceNum} (fetch): ${e.message}</div>`;
      console.error('loadRace error R'+raceNum, e);
      return;
    }
    event._races[ri] = rd;
    try{ refreshDayWind(event); }catch(e){ console.warn('day wind refresh failed', e); }
    updatePolarStatusLabel();
    if(tabEl) tabEl.classList.add('loaded');
    panel.innerHTML = '';
    try {
      renderRacePanel(panel, rd);
    } catch(e){
      panel.innerHTML = `<div class="err">ERROR RENDERING RACE ${raceNum}: ${e.message}<br><pre style="font-size:9px;white-space:pre-wrap">${e.stack}</pre></div>`;
      console.error('renderRacePanel error R'+raceNum, e);
    }
  });
}

// ── REACH MARK CLICK HANDLER ──
function handleReachMarkClick(e, canvasEl){
  const tr = canvasEl._rmTransform;
  if(!tr) return;
  const {cLat, cLon, THETA, mnX, mnY, scale, offX, offY, W, H, raceNum, rd} = tr;

  // Get click position relative to canvas (accounting for CSS scaling)
  const rect = canvasEl.getBoundingClientRect();
  const cssX = e.clientX - rect.left;
  const cssY = e.clientY - rect.top;
  // Canvas logical coords
  const px = cssX * (W / rect.width);
  const py = cssY * (H / rect.height);

  // Inverse tX/tY → rotated metres
  const rx = (px - offX) / scale + mnX;
  const ry = (H - offY - py) / scale + mnY;

  // Inverse rotation (un-rotate by -THETA = rotate by THETA)
  const cosT = Math.cos(-THETA), sinT = Math.sin(-THETA);
  const mx = rx * cosT - ry * sinT;
  const my = rx * sinT + ry * cosT;

  // Inverse projection → lat/lon
  const lat = cLat + my / (D2R * RE);
  const lon = cLon + mx / (D2R * RE * Math.cos(cLat * D2R));

  // Update reach mark on raceData
  const t_s = 50; // keep nominal T+50 label
  rd.rm = { lat, lon, boat_lat: lat, boat_lon: lon, ts: rd.gunTs + 50000, t_s, manual: true };

  // Flash feedback on canvas
  const ctx = canvasEl.getContext('2d');
  ctx.save();
  ctx.fillStyle = 'rgba(255,140,0,0.25)';
  ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Re-render race views that depend on the reach mark, including the AT GUN optimizer.
  const panelEl = document.getElementById(`racePanel${rd._dayIdx}_${raceNum}`);
  if(panelEl){
    const saved = saveGlobals();
    setGlobals(rd);
    window.GUN = rd.gunTs;
    try {
      // Recompute mark-dependent stats first so the start optimizer uses fresh inputs.
      recomputeL1(rd);
      renderL1R(rd);
      if(rd.T50.length && rd.RC && rd.PIN) drawT50R(rd);
      if(rd.GUND && rd.GUND.length && rd.RC && rd.PIN) drawGunR(rd);
      if(rd.RC && rd.PIN) initStartReplayR(rd);
      drawCourseR(rd);
    } finally { restoreGlobals(saved); }
  }

  // Update leg length and TWA in the strip and geometry bar
  if(rd.PIN){
    const rlDist = Math.round(hav(rd.PIN.lat, rd.PIN.lon, lat, lon));
    const rlB = brg(rd.PIN.lat, rd.PIN.lon, lat, lon);
    const twa = rd.WF != null ? Math.abs(((rlB - rd.WF + 180 + 360)%360)-180) : null;
    // Update LEG LENGTH in strip
    const legEl = document.querySelector(`#racePanel${rd._dayIdx}_${raceNum} .sc .sv`);
    const scElems = document.querySelectorAll(`#racePanel${rd._dayIdx}_${raceNum} .sc`);
    // Find the "LEG LENGTH" sc
    scElems.forEach(sc => {
      if(sc.querySelector('.sl')?.textContent === 'LEG LENGTH'){
        sc.querySelector('.sv').textContent = rlDist + 'm';
      }
    });
    // Update geometry bar reach leg entry
    const gbRow = document.querySelector(`#racePanel${rd._dayIdx}_${raceNum} .gb-row`);
    if(gbRow){
      const reachGb = [...gbRow.querySelectorAll('.gb')].find(el=>el.querySelector('.gb-lbl')?.textContent.includes('Reach'));
      if(reachGb){
        reachGb.querySelector('.gb-val').textContent = rlDist + 'm' + (twa!=null ? ' · ' + twa.toFixed(0)+'° TWA' : '');
        reachGb.querySelector('.gb-sub').textContent = rlB.toFixed(1) + '° bearing (Pin→mark)';
      }
    }
  }
  // Show confirmation toast
  const rlDistShow = rd.PIN ? Math.round(hav(rd.PIN.lat, rd.PIN.lon, lat, lon)) : '?';
  showToast(`Reach mark placed · leg ${rlDistShow}m from pin`);
}

function recomputeL1(rd){
  // Rank by distance from PIN at T+50 — same logic as loadRace, no mark detection needed.
  const {tracks, gunTs, PIN} = rd;
  const l1stats = [];
  for(const sail of rd.BOATS){
    const t = tracks[sail]; if(!t) continue;
    const p50 = ptAtTime(t, gunTs + 50000); if(!p50) continue;
    const distFromPin = PIN ? hav(p50.lat, p50.lon, PIN.lat, PIN.lon) : null;
    const pts50 = t.filter(p => p.ts >= gunTs && p.ts <= gunTs+50000);
    let dist50 = 0;
    for(let i=1;i<pts50.length;i++) dist50 += hav(pts50[i-1].lat,pts50[i-1].lon,pts50[i].lat,pts50[i].lon);
    const sogs50 = pts50.map(p=>p.sog*0.539957);
    const sog50 = sogs50.length ? sogs50.reduce((a,b)=>a+b,0)/sogs50.length : null;
    const rollPts = pts50.filter(p=>p.roll!=null&&p.roll!==0);
    const heel = rollPts.length>3 ? rollPts.reduce((s,p)=>s+Math.abs(p.roll),0)/rollPts.length : null;
    let heelSd = null;
    if(rollPts.length>3){
      const rms = rollPts.reduce((s,p)=>s+p.roll,0)/rollPts.length;
      heelSd = Math.sqrt(rollPts.reduce((s,p)=>s+(p.roll-rms)**2,0)/rollPts.length);
    }
    l1stats.push({sail, distFromPin, dist:dist50, sog:sog50||0, heel, heelSd});
  }
  const hasPinDist = l1stats.some(s=>s.distFromPin!=null);
  if(hasPinDist) l1stats.sort((a,b)=>(b.distFromPin??-Infinity)-(a.distFromPin??-Infinity));
  else l1stats.sort((a,b)=>b.dist-a.dist);
  rd.l1stats = l1stats;
  rd.l1Order = l1stats.map(s=>s.sail);
}

function showToast(msg){
  let t = document.getElementById('rmToast');
  if(!t){ t=document.createElement('div'); t.id='rmToast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,140,0,.9);color:#000;font-family:Orbitron,monospace;font-size:10px;font-weight:700;letter-spacing:1px;padding:8px 18px;border-radius:4px;z-index:999;transition:opacity .4s';
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2500);
}

function exportPDF(){
  const dayPanel = document.getElementById(`dayPanel${currentDay}`);
  if(!dayPanel){ alert('No day loaded yet.'); return; }

  const event = EVENTS[currentDay];
  const label = event ? event.label : `DAY ${currentDay+1}`;
  const rcContent = document.getElementById(`raceContent${currentDay}`);

  // Always include day summary first — render if needed, move to top of rcContent
  let summaryPanel = document.getElementById(`summaryPanel${currentDay}`);
  if(!summaryPanel && rcContent){
    summaryPanel = document.createElement('div');
    summaryPanel.id = `summaryPanel${currentDay}`;
    summaryPanel.className = 'day-summary';
    summaryPanel.style.display = 'none';
    rcContent.appendChild(summaryPanel);
    renderDaySummary(summaryPanel, event, event._races);
  }
  // Move summary to be first child so it prints first
  if(summaryPanel && rcContent) rcContent.prepend(summaryPanel);
  if(summaryPanel) summaryPanel.classList.add('print-show-summary');

  // Mark all loaded race panels as print-show, add race headers
  dayPanel.querySelectorAll('.race-panel').forEach(p=>{
    if(p.innerHTML.trim()){
      p.classList.add('print-show');
      if(!p.querySelector('.race-print-header')){
        const rn = p.id ? p.id.match(/racePanel\d+_(\d+)/)?.[1] : null;
        if(rn){
          const lbl = document.createElement('div');
          lbl.className = 'race-print-header';
          lbl.textContent = `RACE ${rn} — ${REGATTA_SUBTITLE} · ${label}`;
          p.prepend(lbl);
        }
      }
    }
  });



  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      dayPanel.querySelectorAll('.race-panel').forEach(p=>p.classList.remove('print-show'));
      if(summaryPanel) summaryPanel.classList.remove('print-show-summary');
    }, 1500);
  }, 200);
}

// ── SORTABLE TABLE UTILITY ───────────────────────────────────────────────────
// tableId: id of <table> element
// col: data-* key on <tr> rows
// defaultDir: 'asc' or 'desc'
// respectOCS: if true, OCS rows (data-ocs="1") always stay at bottom
function sortTable(tableId, col, defaultDir, respectOCS){
  const table = document.getElementById(tableId);
  if(!table) return;
  const tbody = table.querySelector('tbody');
  if(!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr'));
  // Determine current sort state from header th
  const th = table.querySelector(`th[data-col="${col}"]`);
  const curDir = th ? th.dataset.dir : defaultDir;
  const newDir = curDir === 'asc' ? 'desc' : 'asc';
  // Update all header indicators
  table.querySelectorAll('th[data-col]').forEach(h=>{
    h.dataset.dir = h.dataset.col === col ? newDir : (h.dataset.dir || 'asc');
  });
  // Partition OCS if needed
  const ocsRows = respectOCS ? rows.filter(r=>r.dataset.ocs==='1') : [];
  const sortRows = respectOCS ? rows.filter(r=>r.dataset.ocs!=='1') : rows;
  // Sort
  sortRows.sort((a,b)=>{
    const av = parseFloat(a.dataset[col] ?? '0');
    const bv = parseFloat(b.dataset[col] ?? '0');
    return newDir === 'asc' ? av-bv : bv-av;
  });
  // Re-append: sorted rows first, OCS rows last
  [...sortRows, ...ocsRows].forEach(r=>tbody.appendChild(r));
}

let currentDay = 0;

async function init(){
  buildUI();
  
  // Load events serially — detectGuns is fast but we want buildRaceTabs (which
  // triggers selectRace for day 0) to complete before moving to the next day.
  // This ensures the queue is in the right state before deferred days are set up.
  for(let di=0; di<EVENTS.length; di++){
    const event = EVENTS[di];
    const msgEl = document.getElementById(`dayLoadMsg${di}`);
    try {
      const guns = await detectGuns(event, msgEl);
      if(!guns.length){
        document.getElementById(`dayLoad${di}`).innerHTML = `<div class="err">No races found for ${event.label}</div>`;
        continue;
      }
      const dayTab = document.querySelector(`.day-tab[data-day="${di}"]`);
      if(dayTab) dayTab.title = `${guns.length} races`;
      buildRaceTabs(event, di, guns);
      // Wait for day 0's R1 to finish loading before scanning next day's guns
      // so globals are clean when day 1/2 buildRaceTabs runs
      if(di === 0) await _raceQueue;
    } catch(e){
      const ld = document.getElementById(`dayLoad${di}`);
      if(ld) ld.innerHTML = `<div class="err">FAILED: ${e.message}</div>`;
    }
  }
}

// Inject utilities from race3 report then init
(async()=>{
  // The utility functions are already defined above via the included script
  // Just call init
  init();
})();
