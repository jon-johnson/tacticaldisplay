// DRAW: WIND CANVAS
// ──────────────────────────────────────────────
function drawWind(tracks,wind,canvasId){
  const cEl=document.getElementById(canvasId||'cWind');
  if(cEl){
    const pw=(cEl.parentElement?.clientWidth||420)-24;
    const size=Math.max(260, Math.min(420, pw));
    cEl.style.width=size+'px';
    cEl.style.height=size+'px';
    cEl.style.display='block';
    cEl.style.margin='10px auto 12px auto';
  }
  const {ctx,W,H}=cvs(canvasId||'cWind', cEl?.offsetWidth||340); cbg(ctx,W,H);
  const wind_wf=wind&&wind.wf!=null?wind.wf:315;
  const samples=(wind?.race?.samples)||wind?.samples||{uwPort:[],uwStbd:[],dwPort:[],dwStbd:[]};
  const totalSamples = (samples.uwPort?.length||0) + (samples.uwStbd?.length||0) + (samples.dwPort?.length||0) + (samples.dwStbd?.length||0);
  const plotCX=W/2, plotCY=H/2;
  const maxR=Math.min(W,H)*0.34;
  const upLen=maxR*0.98;
  const dnLen=maxR*0.88;
  const relDeg=(a,b)=>(((a-b+540)%360)-180);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.08)';
  ctx.lineWidth=1;
  [0.36,0.62,0.88].forEach(f=>{ctx.beginPath();ctx.arc(plotCX,plotCY,maxR*f,0,Math.PI*2);ctx.stroke();});
  ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(plotCX,16); ctx.lineTo(plotCX,H-16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16,plotCY); ctx.lineTo(W-16,plotCY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.34)';
  ctx.font='8px Share Tech Mono';
  ctx.textAlign='center';
  ctx.fillText('UPWIND', plotCX, 14);
  ctx.fillText('DOWNWIND', plotCX, H-6);
  ctx.textAlign='left'; ctx.fillText('PORT', 14, plotCY-6);
  ctx.textAlign='right'; ctx.fillText('STBD', W-14, plotCY-6);
  ctx.restore();

  const endpoint=(relDegFromAxis, len)=>{
    const th=relDegFromAxis*D2R;
    return [plotCX + len*Math.sin(th), plotCY - len*Math.cos(th)];
  };
  const drawGroup=(arr, color, len, mode='up', strong=false)=>{
    if(!arr?.length) return;
    ctx.save();
    ctx.strokeStyle=color;
    ctx.lineWidth=strong?3.5:1.2;
    ctx.lineCap='round';
    if(mode==='down' && !strong) ctx.setLineDash([5,4]);
    for(const s of arr){
      const relRaw=relDeg(s.angle, wind_wf);
      const rel = mode==='down' ? (Math.abs(relRaw)>90 ? relRaw : (relRaw<0 ? relRaw-180 : relRaw+180)) : relRaw;
      const L = len * (strong ? 1.04 : (0.70 + 0.26*clamp(s.weight||0.5,0,1)));
      const [x,y]=endpoint(rel,L);
      ctx.globalAlpha = strong ? 0.98 : (0.12 + 0.14*clamp(s.weight||0.5,0,1));
      ctx.beginPath(); ctx.moveTo(plotCX,plotCY); ctx.lineTo(x,y); ctx.stroke();
    }
    ctx.restore();
  };
  const meanAngle=(arr)=>arr?.length?weightedCircMean(arr.map(s=>({angle:s.angle,weight:s.weight||1}))):null;

  drawGroup(samples.uwPort, 'rgba(0,204,255,.95)', upLen, 'up');
  drawGroup(samples.uwStbd, 'rgba(255,160,35,.95)', upLen, 'up');
  drawGroup(samples.dwPort, 'rgba(0,255,153,.9)', dnLen, 'down');
  drawGroup(samples.dwStbd, 'rgba(190,145,255,.9)', dnLen, 'down');

  const uwPortAbs=meanAngle(samples.uwPort), uwStbdAbs=meanAngle(samples.uwStbd), dwPortAbs=meanAngle(samples.dwPort), dwStbdAbs=meanAngle(samples.dwStbd);
  if(uwPortAbs!=null) drawGroup([{angle:uwPortAbs,weight:1}], 'rgba(0,204,255,1)', upLen, 'up', true);
  if(uwStbdAbs!=null) drawGroup([{angle:uwStbdAbs,weight:1}], 'rgba(255,170,40,1)', upLen, 'up', true);
  if(dwPortAbs!=null) drawGroup([{angle:dwPortAbs,weight:1}], 'rgba(0,255,153,.95)', dnLen, 'down', true);
  if(dwStbdAbs!=null) drawGroup([{angle:dwStbdAbs,weight:1}], 'rgba(190,145,255,.95)', dnLen, 'down', true);

  ctx.save();
  const ax=plotCX, ay1=20, ay2=58;
  ctx.strokeStyle='rgba(255,204,0,.95)'; ctx.lineWidth=3.4;
  ctx.beginPath(); ctx.moveTo(ax, ay1); ctx.lineTo(ax, ay2); ctx.stroke();
  ctx.fillStyle='rgba(255,204,0,.95)';
  ctx.beginPath(); ctx.moveTo(ax, ay2+10); ctx.lineTo(ax-7, ay2-1); ctx.lineTo(ax+7, ay2-1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,204,0,.98)'; ctx.font='bold 10px Orbitron'; ctx.textAlign='center';
  ctx.fillText(`FROM ${wind_wf.toFixed(0)}° ${card(wind_wf)}`, ax, 12);
  ctx.restore();

  const spreadDeg=(arr, meanAbs)=>{
    if(!arr?.length || meanAbs==null) return null;
    const vals=arr.map(s=>angDiff(s.angle, meanAbs)).sort((a,b)=>a-b);
    return vals[Math.floor(vals.length*0.75)] ?? vals[vals.length-1] ?? null;
  };
  const spreadP = spreadDeg(samples.uwPort, uwPortAbs);
  const spreadS = spreadDeg(samples.uwStbd, uwStbdAbs);
  const spreadText = (spreadP!=null && spreadS!=null) ? `${Math.round((spreadP+spreadS)/2)}°` : '—';

  ctx.save();
  ctx.fillStyle='rgba(255,255,255,.86)';
  ctx.font='8px Share Tech Mono';
  ctx.textAlign='right';
  let ty=18;
  if(wind?.race?.wf!=null){ ctx.fillText(`RACE ${wind.race.wf.toFixed(0)}° · conf ${(wind.race.confidence||0).toFixed(2)}`, W-12, ty); ty+=11; }
  if(wind?.day?.wf!=null){ ctx.fillText(`DAY  ${wind.day.wf.toFixed(0)}° · ${wind.day.nRaces||1} races`, W-12, ty); ty+=11; }
  ctx.fillText(`SAMPLES ${totalSamples} · spread ${spreadText}`, W-12, ty);
  ctx.restore();

  ctx.save();
  ctx.fillStyle='rgba(0,204,255,.85)'; ctx.fillRect(14,H-52,12,3); ctx.font='8px Share Tech Mono'; ctx.textAlign='left'; ctx.fillText('Upwind port / stbd vectors',30,H-47);
  ctx.fillStyle='rgba(0,255,153,.78)'; ctx.fillRect(14,H-38,12,3); ctx.fillText('Downwind check vectors',30,H-33);
  ctx.fillStyle='rgba(255,255,255,.42)'; ctx.fillText('Bold = mean vector per side',30,H-19);
  ctx.restore();

  if(!totalSamples){
    ctx.save();
    ctx.fillStyle='rgba(255,90,90,.95)';
    ctx.font='bold 10px Orbitron';
    ctx.textAlign='center';
    ctx.fillText('NO CLEAN WIND SAMPLES', plotCX, plotCY+2);
    ctx.font='8px Share Tech Mono';
    ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.fillText('Check speed / stability filters', plotCX, plotCY+18);
    ctx.restore();
  }
}// ──────────────────────────────────────────────
// DRAW: DELTA FLOW
// ──────────────────────────────────────────────
function drawDelta(l1,fin,canvasId){
  if(!document.getElementById(canvasId||'cDelta'))return;
  const{ctx,W,H}=cvs(canvasId||'cDelta',290);ctx.fillStyle='#07111f';ctx.fillRect(0,0,W,H);
  const x1=90,x2=W-90,rH=(H-44)/8;
  ctx.save();ctx.fillStyle='rgba(0,204,255,.45)';ctx.font='9px Share Tech Mono';ctx.textAlign='center';ctx.fillText('AFTER REACH MARK',x1,16);ctx.fillText('FINISH',x2,16);ctx.restore();
  l1.forEach((sail,i)=>{const fi=fin.indexOf(sail),y1=28+i*rH+rH/2,y2=28+fi*rH+rH/2,d=i-fi;
    ctx.save();ctx.strokeStyle=d>0?'rgba(0,255,153,.22)':d<0?'rgba(255,51,85,.18)':'rgba(255,255,255,.07)';ctx.lineWidth=d===0?1:2;
    ctx.beginPath();ctx.moveTo(x1+16,y1);ctx.bezierCurveTo((x1+x2)/2,y1,(x1+x2)/2,y2,x2-16,y2);ctx.stroke();ctx.restore();
  });
  l1.forEach((sail,i)=>{const y=28+i*rH+rH/2,c=COL[sail];
    ctx.save();ctx.fillStyle=c;ctx.shadowBlur=8;ctx.shadowColor=c;ctx.beginPath();ctx.arc(x1,y,10,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 8px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sail,x1,y);ctx.restore();
    ctx.save();ctx.fillStyle='rgba(0,204,255,.35)';ctx.font='bold 8px Orbitron';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText('P'+(i+1),x1-16,y);ctx.restore();
  });
  fin.forEach((sail,i)=>{const y=28+i*rH+rH/2,c=COL[sail],l1i=l1.indexOf(sail),d=l1i-i;
    ctx.save();ctx.fillStyle=c;ctx.shadowBlur=8;ctx.shadowColor=c;ctx.beginPath();ctx.arc(x2,y,10,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 8px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sail,x2,y);ctx.restore();
    ctx.save();ctx.fillStyle='rgba(0,204,255,.35)';ctx.font='bold 8px Orbitron';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('P'+(i+1),x2+16,y);ctx.restore();
    if(d!==0){const bc=d>0?'#00ff99':'#ff3355';ctx.save();ctx.fillStyle=bc+'20';ctx.strokeStyle=bc+'50';ctx.lineWidth=1;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x2+34,y-6,26,13,2);else ctx.rect(x2+34,y-6,26,13);ctx.fill();ctx.stroke();ctx.fillStyle=bc;ctx.font='bold 7px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText((d>0?'▲':'▼')+Math.abs(d),x2+47,y);ctx.restore();}
  });
}

// ─── BAR CHART ───
function mkBars(elId,items,maxV,vf,lf){
  const el=document.getElementById(elId);
  items.forEach(d=>{const c=COL[d.sail],p=(vf(d)/maxV*100).toFixed(1);
    const div=document.createElement('div');div.style.cssText='display:flex;align-items:center;gap:10px';
    div.innerHTML=`<div style="font-family:Orbitron,monospace;font-size:11px;font-weight:700;color:${c};width:32px">${d.sail}</div><div style="flex:1;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${c};border-radius:2px"></div></div><div style="font-family:Orbitron,monospace;font-size:12px;font-weight:700;color:${c};min-width:72px;text-align:right">${lf(d)}</div>`;
    el.appendChild(div);
  });
}

// ─── TABLES ───
// ─── START TABLE ───
function renderStart(startStats,l1O){
  const tb=document.getElementById('startBody');
  // Sort by reach mark position (leg 1 order)
  const sorted=l1O
    .map(s=>({sail:s,...startStats[s]}))
    .filter(d=>d.distGun!=null);

  // Find best values for bar scaling
  const maxDist=Math.max(...sorted.map(d=>Math.max(d.distGun||0,d.distM15||0)));
  const maxSog=Math.max(...sorted.map(d=>Math.max(d.sogGun||0,d.avgSog30||0)));

  sorted.forEach((d,i)=>{
    const c=COL[d.sail];
    const rk=i===0?'g':i===1?'s':i===2?'b':'';
    const fmtDist=v=>v!=null?`${v.toFixed(1)} m`:'—';
    const fmtSpd=v=>v!=null?`${v.toFixed(2)} kts`:'—';
    const pDG=(d.distGun||0)/maxDist*100, pDM=(d.distM15||0)/maxDist*100;
    const pSG=(d.sogGun||0)/maxSog*100, pSA=(d.avgSog30||0)/maxSog*100;
    const ocs=d.distGun!=null&&d.distGun<0;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="td"><span class="sn" style="color:${c}">${d.sail}</span></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${pDG.toFixed(1)}%;background:${c}${ocs?';opacity:.4':''}"></div></div>
        <div class="bv" style="color:${ocs?'var(--red)':c}">${ocs?'OCS ':''}&nbsp;${fmtDist(d.distGun)}</div>
      </div></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${pSG.toFixed(1)}%;background:${c}"></div></div>
        <div class="bv" style="color:${c}">${fmtSpd(d.sogGun)}</div>
      </div></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${pDM.toFixed(1)}%;background:${c}"></div></div>
        <div class="bv" style="color:${c}">${fmtDist(d.distM15)}</div>
      </div></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${pSA.toFixed(1)}%;background:${c}"></div></div>
        <div class="bv" style="color:${c}">${fmtSpd(d.avgSog30)}${d.ptsIn30<5?' <span style=\"font-size:8px;color:var(--orange)\">sparse</span>':''}</div>
      </div></div></td>`;
    tb.appendChild(tr);
  });
}

function renderL1(stats,wf){
  const tb=document.getElementById('l1Body'),mD=Math.max(...stats.map(s=>s.dist)),mS=Math.max(...stats.map(s=>s.sog)),lT=stats[0].dur;

    tb.appendChild(tr);
  });

}

function renderPL(l1O,fO){

  fO.forEach(s=>{const c=COL[s],l1p=l1O.indexOf(s)+1,fp=fO.indexOf(s)+1,d=l1p-fp,cc=d>0?'cup':d<0?'cdn':'ceq',ct=d>0?`▲${d}`:d<0?`▼${Math.abs(d)}`:'—';
    const l1t=((rmTS[s]||MARK1_TS_FALLBACK[s]||(window.GUN||0)+200000)-(window.GUN||0))/1000,ft=(FIN_TS[s]-(window.GUN||0))/1000;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><div class="td"><span class="sn" style="color:${c}">${s}</span></div></td><td><div class="td" style="font-family:Orbitron,monospace;font-size:18px;font-weight:700">P${l1p}</div></td><td><div class="td" style="font-family:Orbitron,monospace;font-size:18px;font-weight:700">P${fp}</div></td><td><div class="td"><span class="chip ${cc}">${ct}</span></div></td><td><div class="td"><span class="mn">${fmt(l1t)}</span></div></td><td><div class="td"><span class="mn">${fmt(ft)}</span></div></td><td><div class="td"><span class="ms">+${fmt(ft-wT)}</span></div></td>`;
    tb.appendChild(tr);
  });
}

// ─── MAIN ───
// Fallback reach times (from LWGate detection - worst case)
const MARK1_TS_FALLBACK={'63':1770397596800,'70':1770397626400,'61':1770397641000,'65':1770397689000,'44':1770397701500,'71':1770397713600,'69':1770397809400,'60':1770397820800};
let rmTS={};

</script>
<script>
// ══════════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════════
async function fetchTelemetry(eventId, after, before, limit=5000){
  const url = `https://teleapi.regatta.app/telemetry/event/${eventId}?after=${after}&before=${before}&limit=${limit}&division=M32`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  return d.Rows || [];
}

async function fetchAllPages(eventId, after, before, maxPages=30){
  let cursor = after;
  const allRows = [];
  for(let p=0; p<maxPages; p++){
    const rows = await fetchTelemetry(eventId, cursor, before);
    if(!rows.length) break;
    allRows.push(...rows);
    cursor = rows[rows.length-1][0] + 1;
    if(rows.length < 5000) break;
  }
  return allRows;
}

// ══════════════════════════════════════════════════════════════════
//  GUN DETECTION
// ══════════════════════════════════════════════════════════════════
async function detectGuns(event, progressEl){
  if(event.knownGuns && event.knownGuns.length > 0){
    progressEl && (progressEl.textContent = `Found ${event.knownGuns.length} races`);
    return event.knownGuns;
  }
  progressEl && (progressEl.textContent = 'No race times configured');
  return [];
}

// ══════════════════════════════════════════════════════════════════
//  RACE DATA LOADER
// ══════════════════════════════════════════════════════════════════
async function loadRace(event, raceNum, gunTs, nextGunTs, progressEl){
  const cacheKey = `${event.id}_d${event._dayIdx||0}_r${raceNum}`;
  if(raceCache[cacheKey]) return raceCache[cacheKey];

  progressEl && (progressEl.textContent = `Loading Race ${raceNum} telemetry…`);

  window.GUN = gunTs; // set global for utility functions
  const BEFORE_GUN = 35000;
  const AFTER_GUN  = 1200000; // 20 min
  const fetchEnd   = nextGunTs ? Math.min(gunTs + AFTER_GUN, nextGunTs - 1000) : gunTs + AFTER_GUN;

  const rows = await fetchAllPages(event.id, gunTs - BEFORE_GUN, fetchEnd);
  progressEl && (progressEl.textContent = `Processing Race ${raceNum}… (${rows.length} rows)`);

  // ── OCS from telemetry: status=1 in [gun-2s .. gun+15s] ──
  // RaceSense sets status=1 on any boat the system flags as OCS at the start.
  const ocsFromTelemetry = new Set();
  {
    for (const r of rows) {
      const ts=r[0], role=r[7], sail=r[3], status=r[14];
      if(ts < gunTs-2000 || ts > gunTs+15000) continue;
      if(role !== 'competitor') continue;
      if(EXCLUDED_BOATS.includes(sail)) continue;
      if(status === 1) ocsFromTelemetry.add(sail);
    }
  }

  // Parse rows into tracks, marks, etc
  const tracks = {}, markPos = {}, markAcc = {};
  let BOATS = new Set();

  for(const row of rows){
    const type = row[7];
    if(type === 'competitor'){
      const name = row[3];
      if(!name) continue;
      BOATS.add(name);
      if(EXCLUDED_BOATS.includes(name)) continue; // skip excluded boats
      if(!tracks[name]) tracks[name] = [];
      tracks[name].push({
        ts: row[0], lat: row[8], lon: row[9],
        sog: row[13], hdg: row[12], roll: row[11]
      });
    } else if(type === 'mark'){
      const sn = row[1];
      const ts = row[0];
      // Use mark positions within 3 min before gun to 30s after
      // Wider window catches marks that reported infrequently between races
      if(ts >= gunTs - 180000 && ts <= gunTs + 30000){
        if(!markAcc[sn]) markAcc[sn] = {lats:[], lons:[]};
        markAcc[sn].lats.push(row[8]);
        markAcc[sn].lons.push(row[9]);
      }
    }
  }

  // Average mark positions at gun time
  for(const [sn, acc] of Object.entries(markAcc)){
    markPos[sn] = {
      lat: acc.lats.reduce((a,b)=>a+b,0)/acc.lats.length,
      lon: acc.lons.reduce((a,b)=>a+b,0)/acc.lons.length,
    };
  }

  BOATS = [...BOATS].filter(s => !EXCLUDED_BOATS.includes(s));

  // Resolve gate positions
  const wwSns = GATE_SNS.WW.filter(s => markPos[s]);
  const lwSns = GATE_SNS.LW.filter(s => markPos[s]);
  
  let WWGATE, LWGATE, WW_A, WW_B, LW_A, LW_B;
  if(wwSns.length >= 1){
    WW_A = markPos[wwSns[0]]; WW_B = markPos[wwSns[1]] || WW_A;
    WWGATE = {lat:(WW_A.lat+WW_B.lat)/2, lon:(WW_A.lon+WW_B.lon)/2};
  }
  if(lwSns.length >= 1){
    LW_A = markPos[lwSns[0]]; LW_B = markPos[lwSns[1]] || LW_A;
    LWGATE = {lat:(LW_A.lat+LW_B.lat)/2, lon:(LW_A.lon+LW_B.lon)/2};
  }
  
  // RC and PIN
  let RC, PIN;
  for(const sn of GATE_SNS.RC_SNS){
    if(markPos[sn]){ RC = markPos[sn]; break; }
  }
  if(markPos[GATE_SNS.PIN_SN]) PIN = markPos[GATE_SNS.PIN_SN];

  // Fallback: infer from tracks if marks missing
  if(!WWGATE || !LWGATE){
    window.GUN = gunTs; // ensure GUN is set for inferGates
    const inf = inferGates ? inferGates(tracks, gunTs) : null;
    if(inf){ WWGATE = WWGATE||inf.ww; LWGATE = LWGATE||inf.lw; }
  }

  // Start line midpoint
  const MID = RC && PIN ? {
    lat:(RC.lat+PIN.lat)/2, lon:(RC.lon+PIN.lon)/2
  } : null;

  // ── Per-boat VMG analysis (upwind and downwind legs) ──
  // Uses the inferred wind direction and course axis to classify segments.
  // Upwind = TWA < 60°, Downwind = TWA > 120°
  function computeVMG(tracks, WF, gunTs, raceEnd){
    if(WF == null) return {};
    const vmgData = {};
    for(const [sail, t] of Object.entries(tracks)){
      if(!t || t.length < 10) continue;
      const racePts = t.filter(p => p.ts >= gunTs + 60000 && p.ts <= raceEnd);
      let uwVMGs = [], dwVMGs = [];
      for(const p of racePts){
        const sog = p.sog * 0.539957; // m/s → kts
        if(sog < 2) continue;
        const twa = Math.abs(((p.hdg - WF + 180 + 360) % 360) - 180);
        const vmg = sog * Math.cos(twa * D2R);
        if(twa < 60)  uwVMGs.push(vmg);
        if(twa > 120) dwVMGs.push(-vmg); // downwind VMG is positive when going away from wind
      }
      const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
      vmgData[sail] = {
        uwVMG: avg(uwVMGs),
        dwVMG: avg(dwVMGs),
        uwN: uwVMGs.length,
        dwN: dwVMGs.length,
      };
    }
    // Fleet medians
    const uwAll = Object.values(vmgData).map(v=>v.uwVMG).filter(v=>v!=null).sort((a,b)=>a-b);
    const dwAll = Object.values(vmgData).map(v=>v.dwVMG).filter(v=>v!=null).sort((a,b)=>a-b);
    const medUW = uwAll.length ? uwAll[Math.floor(uwAll.length/2)] : null;
    const medDW = dwAll.length ? dwAll[Math.floor(dwAll.length/2)] : null;
    for(const [sail, v] of Object.entries(vmgData)){
      v.uwVMGvsMed = medUW != null && v.uwVMG != null ? v.uwVMG - medUW : null;
      v.dwVMGvsMed = medDW != null && v.dwVMG != null ? v.dwVMG - medDW : null;
      v.medUW = medUW; v.medDW = medDW;
    }
    return vmgData;
  }

  // ── Data quality assessment per boat ──
  // Computes sample rate, coverage %, max gap, speed spikes → HIGH/MEDIUM/LOW
  const dataQuality = {};
  for(const sail of BOATS){
    const t = tracks[sail];
    if(!t || t.length < 2){ dataQuality[sail]={score:'LOW',coverage:0,maxGap:9999,spikes:0,n:0}; continue; }
    const raceEnd = nextGunTs ? Math.min(gunTs + 1200000, nextGunTs - 1000) : gunTs + 1200000;
    const raceDur = raceEnd - gunTs; // ms
    // coverage: fraction of race duration that has samples within 5s
    const pts = t.filter(p => p.ts >= gunTs && p.ts <= raceEnd);
    // max gap between consecutive samples
    let maxGap = 0;
    for(let i=1;i<pts.length;i++) maxGap = Math.max(maxGap, pts[i].ts - pts[i-1].ts);
    // coverage estimate: time covered vs race duration
    const covered = pts.length > 1 ? pts[pts.length-1].ts - pts[0].ts : 0;
    const coverage = Math.min(1, covered / raceDur);
    // speed spikes: samples where SOG > 2× median
    const sogs = pts.map(p=>p.sog*0.539957).sort((a,b)=>a-b);
    const medSog = sogs[Math.floor(sogs.length/2)] || 1;
    const spikes = pts.filter(p => p.sog*0.539957 > medSog*2.5 && p.sog*0.539957 > 20).length;
    // score
    let score = 'HIGH';
    if(coverage < 0.5 || maxGap > 30000 || pts.length < 30) score = 'LOW';
    else if(coverage < 0.8 || maxGap > 10000 || spikes > 3) score = 'MEDIUM';
    dataQuality[sail] = {score, coverage: Math.round(coverage*100), maxGap: Math.round(maxGap/1000), spikes, n: pts.length};
  }

  // Reach mark detection
  const rm = WWGATE && LWGATE && MID ? findReachMark(tracks, gunTs, WWGATE, LWGATE, MID) : null;

  // Wind inference — race-level, later blended with same-day consensus
  const raceEnd = nextGunTs ? Math.min(gunTs + 1200000, nextGunTs - 1000) : gunTs + 1200000;
  const WF_RACE_OBJ = WWGATE && LWGATE ? inferWind(tracks, WWGATE.lat, WWGATE.lon, LWGATE.lat, LWGATE.lon, gunTs, raceEnd) : null;
  const WF_OBJ = WF_RACE_OBJ;
  const WF = WF_RACE_OBJ ? WF_RACE_OBJ.wf : null;

  // Reach times — now computed inside findReachMark via computeReachTimes()
  // rm.reachTimes is a map of sail -> {markTime, minDist, conf}
  const reachTimes = {};
  if(rm && rm.reachTimes){
    for(const [sail, rt] of Object.entries(rm.reachTimes)){
      if(rt.markTime) reachTimes[sail] = rt.markTime;
    }
  }

  // Finish times — detect line crossing: boat crosses start/finish line from course side
  // More accurate than 'finished' stage which is manually recorded by RC and can be late.
  // Method: track signed distance to line; find zero-crossing (positive→negative) after T+300s
  const finTimes = {};
  if(RC && PIN){
    for(const sail of BOATS){
      const t = tracks[sail]; if(!t) continue;
      const late = t.filter(p => p.ts > gunTs + 300000);
      let prevDist = null, prevTs = null;
      for(const p of late){
        const d = distToLine(p.lat, p.lon, RC.lat, RC.lon, PIN.lat, PIN.lon);
        // Finish: boat crosses from course side (DTL<0) back to pre-start side (DTL>0)
        // i.e. negative → positive transition after T+300s
        if(prevDist !== null && prevDist < 0 && d >= 0){
          const frac = Math.abs(prevDist) / (Math.abs(prevDist) + Math.abs(d));
          finTimes[sail] = Math.round(prevTs + frac * (p.ts - prevTs));
          break;
        }
        prevDist = d; prevTs = p.ts;
      }
    }
  }
  // Fallback: use 'finished' stage rows for any boats we didn't catch crossing
  for(const row of rows){
    if(row[7]==='competitor' && row[6]==='finished'){
      const sail = row[3];
      if(sail && !finTimes[sail]) finTimes[sail] = row[0];
    }
  }

  // L1 stats — ranked by distance from PIN at T+50 (covers ALL boats, no mark detection needed)
  // Distance from PIN = how far the boat has sailed toward the reach mark.
  // Closest to PIN at T+50 = furthest ahead on the reach leg.
  const l1stats = [];
  for(const sail of BOATS){
    const t = tracks[sail];
    if(!t) continue;
    const p50 = ptAtTime(t, gunTs + 50000);
    if(!p50) continue;
    // Distance from PIN at T+50 (smaller = closer to mark = better position)
    const distFromPin = PIN ? hav(p50.lat, p50.lon, PIN.lat, PIN.lon) : null;
    // Also compute reach time from reachTimes if available (for gap column)
    const ts1 = reachTimes[sail] || null;
    const dur = ts1 ? (ts1 - gunTs)/1000 : null;
    // Distance sailed gun→T+50
    const pts50 = t.filter(p => p.ts >= gunTs && p.ts <= gunTs+50000);
    let dist50 = 0;
    for(let i=1;i<pts50.length;i++) dist50 += hav(pts50[i-1].lat,pts50[i-1].lon,pts50[i].lat,pts50[i].lon);
    // Avg SOG gun→T+50
    const sogs50 = pts50.map(p=>p.sog*0.539957);
    const sog50 = sogs50.length ? sogs50.reduce((a,b)=>a+b,0)/sogs50.length : null;
    // Heel: use gun→T+50 window
    const rollPts = pts50.filter(p=>p.roll!=null&&p.roll!==0);
    const heel = rollPts.length>3 ? rollPts.reduce((s,p)=>s+Math.abs(p.roll),0)/rollPts.length : null;
    let heelSd = null;
    if(rollPts.length>3){
      const rm2 = rollPts.reduce((s,p)=>s+p.roll,0)/rollPts.length;
      heelSd = Math.sqrt(rollPts.reduce((s,p)=>s+(p.roll-rm2)**2,0)/rollPts.length);
    }
    l1stats.push({sail, distFromPin, dur, dist:dist50, sog:sog50||0, heel, heelSd});
  }
  // Sort by distFromPin DESCENDING (further from pin = further ahead on reach leg).
  // If PIN unavailable, fall back to distance sailed descending.
  const hasPinDist = l1stats.some(s=>s.distFromPin!=null);
  if(hasPinDist){
    l1stats.sort((a,b)=>(b.distFromPin??-Infinity)-(a.distFromPin??-Infinity));
  } else {
    l1stats.sort((a,b)=>b.dist-a.dist); // fallback: most distance sailed first
  }
  const l1Order = l1stats.map(s=>s.sail);

  // ── Enhanced start analysis ──
  // Uses SIGNED distance (positive=pre-start, negative=OCS).
  // Computes closest approach, first crossing, acceleration, OCS classification.
  let startStats = null;
  if(RC && PIN){
    const startData = [];
    for(const sail of BOATS){
      const t = tracks[sail];
      if(!t || t.length < 2) continue;

      // Interpolated position AT gun
      const pGun = ptAtTime(t, gunTs);
      if(!pGun) continue;

      // SIGNED distance at gun (negative = OCS)
      const distGun = distToLinePt(pGun, RC, PIN);
      const sogGun  = pGun.sog * 0.539957;

      // Start position as percentage up the line
      // 0% = pin, 100% = committee boat
      let linePct = null;
      {
        const cLat = (RC.lat + PIN.lat) / 2;
        const toM = (la, lo, la0, lo0) => [
          (lo - lo0) * D2R * RE * Math.cos(cLat * D2R),
          (la - la0) * D2R * RE
        ];
        const [px, py] = toM(pGun.lat, pGun.lon, RC.lat, RC.lon);
        const [ex, ey] = toM(PIN.lat, PIN.lon, RC.lat, RC.lon);
        const len2 = ex*ex + ey*ey;
        if(len2 > 0){
          const t = Math.max(0, Math.min(1, (px*ex + py*ey) / len2)); // 0=RC, 1=PIN
          linePct = (1 - t) * 100; // 0=PIN, 100=RC boat
        }
      }

      // Closest approach to line in final 20s before gun
      // = most negative DTL value (smallest signed value = closest to / over line)
      // DTL > 0 = pre-start side; DTL < 0 = course/OCS side
      const pre20 = t.filter(p => p.ts >= gunTs - 20000 && p.ts <= gunTs);
      let closestApproach = null; // signed: most negative = deepest into OCS zone
      for(const p of pre20){
        const d = distToLinePt(p, RC, PIN);
        if(closestApproach === null || d < closestApproach) closestApproach = d;
      }

      // First line crossing AFTER gun (T+0 to T+30s)
      // = first time signed distance goes from positive to ≤0
      let crossingTime = null;
      const post30 = t.filter(p => p.ts >= gunTs && p.ts <= gunTs + 30000);
      let prevD2 = null, prevTs2 = null;
      for(const p of post30){
        const d = distToLinePt(p, RC, PIN);
        if(prevD2 !== null && prevD2 > 0 && d <= 0){
          const frac = prevD2 / (prevD2 - d);
          crossingTime = (prevTs2 + frac*(p.ts - prevTs2) - gunTs) / 1000; // seconds after gun
          break;
        }
        prevD2 = d; prevTs2 = p.ts;
      }

      // T→95%: seconds after gun for boat to reach 95% of average reach-leg speed
      // Average reach speed = mean SOG from gun to reach mark rounding (or T+120s fallback)
      const reachEnd = reachTimes[sail] || (gunTs + 120000);
      const reachSeg = t.filter(p => p.ts >= gunTs && p.ts <= reachEnd);
      const avgReachSog = reachSeg.length >= 3
        ? reachSeg.reduce((s,p) => s + p.sog*0.539957, 0) / reachSeg.length
        : null;
      let accel = null; // reused variable name — now means seconds to 95% of reach speed
      if(avgReachSog != null && avgReachSog > 1){
        const target95 = avgReachSog * 0.95;
        // Scan forward from gun using 3-point rolling average to avoid noise spikes
        const postGun = t.filter(p => p.ts >= gunTs && p.ts <= gunTs + 120000);
        for(let pi = 1; pi < postGun.length - 1; pi++){
          const rollingSOG = (postGun[pi-1].sog + postGun[pi].sog + postGun[pi+1].sog) / 3 * 0.539957;
          if(rollingSOG >= target95){
            accel = (postGun[pi].ts - gunTs) / 1000; // seconds
            break;
          }
        }
      }

      // Avg approach speed T-30s → T-5s
      const approach = t.filter(p => p.ts >= gunTs-30000 && p.ts <= gunTs-5000);
      const avgSogApproach = approach.length
        ? approach.reduce((s,p)=>s+p.sog*0.539957,0)/approach.length : null;

      // OCS classification using signed distance
      // Check if official results has an OCS for this boat
      const officialRace = (OFFICIAL_RESULTS_BY_DAY[event._dayIdx||0] || OFFICIAL_RESULTS_BY_DAY[0])[raceNum] || {};
      const officialOCS = officialRace[sail] === 'OCS' || officialRace[sail] === 999;
      // Only mark OCS if official results confirm it — no guessing
      let startStatus;
      if(officialOCS) startStatus = 'OCS';
      else startStatus = null;

      startData.push({
        sail, distGun, sogGun, linePct,
        closestApproach,  // signed: negative = was over line, positive = stayed behind
        crossingTime, accel, avgSogApproach,
        startStatus,
      });
    }
    // Sort by l1Order (reach position), with OCS boats at back
    startData.sort((a,b) => {
      if(a.startStatus==='OCS' && b.startStatus!=='OCS') return 1;
      if(b.startStatus==='OCS' && a.startStatus!=='OCS') return -1;
      return 0; // l1Order handles final sort in renderStartR
    });
    startStats = startData;
  }

  // GUND and T50 data for start maps
  const GUND = [], T50 = [];
  for(const sail of BOATS){
    const t = tracks[sail];
    if(!t || !RC || !PIN) continue;
    const pGun = ptAtTime ? ptAtTime(t, gunTs) : null;
    if(pGun){
      // Keep SIGNED distance so gun diagram can show OCS boats on wrong side of line
      const dg = distToLine ? distToLine(pGun.lat, pGun.lon, RC.lat, RC.lon, PIN.lat, PIN.lon) : 0;
      // isOCS: telemetry status=1 is authoritative; DTL fallback if no telemetry OCS data
      const isOCS_tele = ocsFromTelemetry.has(sail);
      const isOCS_dtl  = dg < -DTL_OCS_M;
      GUND.push({sail, lat:pGun.lat, lon:pGun.lon, hdg:pGun.hdg, sog:pGun.sog*0.539957, dist:dg,
        isOCS: isOCS_tele || isOCS_dtl,
        isOCS_tele, isOCS_dtl});
    }
    const p50 = ptAtTime ? ptAtTime(t, gunTs + 50000) : null;
    if(p50){
      const d50 = distToLine ? distToLine(p50.lat, p50.lon, RC.lat, RC.lon, PIN.lat, PIN.lon) : 0;
      const avg50 = t.filter(p=>p.ts>=gunTs&&p.ts<=gunTs+50000).reduce((s,p,_,a)=>s+p.sog*0.539957/a.length,0);
      T50.push({sail, lat:p50.lat, lon:p50.lon, hdg:p50.hdg, avg:avg50, dist:d50}); // signed DTL at T+50
    }
  }
  // Sort T50 by l1 order for ranking
  if(l1Order.length) T50.sort((a,b)=>l1Order.indexOf(a.sail)-l1Order.indexOf(b.sail));

  const _vmgRaceEnd = nextGunTs ? Math.min(gunTs + 1200000, nextGunTs - 1000) : gunTs + 1200000;
  const vmgData = computeVMG(tracks, WF, gunTs, _vmgRaceEnd);

  const raceData = {
    gunTs, BOATS, tracks, markPos,
    WWGATE, LWGATE, WW_A, WW_B, LW_A, LW_B,
    RC, PIN, MID, rm, WF, WF_OBJ,
    WF_RACE_OBJ, WF_DAY_OBJ:null, WF_BLEND_OBJ:WF_OBJ,
    reachTimes, finTimes, l1stats, l1Order,
    startStats, GUND, T50, dataQuality, vmgData,
    rmInference: rm ? rm.inference : null,
    ocsFromTelemetry,
    raceNum, event, nextGunTs,
  };

  raceData._dayIdx = event._dayIdx;
  try{ collectPolarObservationsFromRace(raceData); }catch(e){ console.warn('polar obs collect failed', e); }
  raceCache[cacheKey] = raceData;

  // ── DEV: DTL sign convention audit log (console only) ──
  // Confirms: positive = pre-start (safe), negative = course/OCS side
  if(RC && PIN && startStats){
    console.groupCollapsed(`[DTL audit] Race ${raceNum}`);
    console.log('Convention: DTL>0=pre-start(safe)  DTL<0=course(OCS side)');
    console.log(`Thresholds: CLEAR>= +${DTL_CLEAR_M}m  OCS<= -${DTL_OCS_M}m`);
    for(const s of startStats){
      const dtl = s.distGun;
      const cls = dtl == null ? 'NO DATA'
                : dtl >= DTL_CLEAR_M ? 'CLEAR'
                : dtl >= 0          ? 'MARGINAL'
                :                     'OCS-SIDE';
      const ca  = s.closestApproach;
      console.log(
        `  #${s.sail.padEnd(3)} DTL@gun=${dtl!=null?(dtl>=0?'+':'')+dtl.toFixed(1)+'m':'—  '}  `+
        `minDTL[−20s..0]=${ca!=null?(ca>=0?'+':'')+ca.toFixed(1)+'m':'—  '}  `+
        `cross=${s.crossingTime!=null?'+'+s.crossingTime.toFixed(1)+'s':'none'}  `+
        `→ ${cls}${s.startStatus==='OCS'?' [OFFICIAL OCS]':''}`
      );
    }
    console.groupEnd();
  }

  return raceData;
}

              +'<td style="padding:2px 4px;white-space:nowrap;text-align:center">'+deltaStr+'</td>'
              +'<td style="padding:2px 6px">'
                +'<span style="width:7px;height:7px;border-radius:50%;background:'+c+';display:inline-block;vertical-align:middle;margin-right:4px"></span>'
                +'<span style="font-family:Orbitron,monospace;font-size:11px;font-weight:700;color:'+c+'">'+sail+'</span>'
                +'<span style="font-size:9px;color:var(--muted);margin-left:3px">'+tn+'</span>'
              +'</td>'
              +'</tr>';
          }).join('');
          return '<div class="sh" style="margin-top:0">OFFICIAL FINISH</div>'
            +'<table style="width:100%;margin-bottom:6px">'
            +'<thead><tr>'
            +'<th style="width:24px;padding:2px 4px">Fin</th>'
            +'<th style="width:32px;padding:2px 4px">Reach</th>'
            +'<th style="width:36px;padding:2px 4px">Δ</th>'
            +'<th style="padding:2px 6px">Boat</th>'
            +'</tr></thead>'
            +'<tbody>'+rows+'</tbody>'
            +'</table>';
        })()}

        <!-- Wind — full legend needs sufficient height -->
        <div class="sh" style="font-size:7px;opacity:0.7;margin-top:2px">WIND INFERENCE</div>
        <div class="mc">
          <div class="mh" style="font-size:7px">PORT/STBD TACK &amp; GYBE SEGMENTS · INFERRED DIRECTION</div>
          <canvas id="${cWindId}" style="display:block;margin:0 auto"></canvas>
        </div>

      </div>
    </div>


  `;

  // Render all canvases using the shared draw functions
  // Need to temporarily set globals for the draw functions
  const saved = saveGlobals();
  setGlobals(rd);

  try {
    if(startStats && startStats.length) renderStartR(rd);
    if(GUND.length && RC && PIN) drawGunR(rd);
    if(T50.length  && RC && PIN) drawT50R(rd);
    if(RC && PIN) initStartReplayR(rd);
    if(RC && PIN) drawCourseR(rd); // draw even without WW/LW gates
    if(l1stats.length) renderL1R(rd);
    drawWindR(rd);
    updateRaceTwsUi(rd);
  } finally {
    restoreGlobals(saved);

// ── Global state management for draw functions ──
function saveGlobals(){
  return {
    _RC:window.RC,_PIN:window.PIN,_MID:window.MID,
    _WWGATE:window.WWGATE,_LWGATE:window.LWGATE,
    _WW_A:window.WW_A,_WW_B:window.WW_B,
    _LW_A:window.LW_A,_LW_B:window.LW_B,
    _GUN:window.GUN,_WF:window.WF,
    _GUND:window.GUND,_T50:window.T50,
  };
}
function setGlobals(rd){
  window.RC=rd.RC; window.PIN=rd.PIN; window.MID=rd.MID;
  window.WWGATE=rd.WWGATE; window.LWGATE=rd.LWGATE;
  window.WW_A=rd.WW_A; window.WW_B=rd.WW_B;
  window.LW_A=rd.LW_A; window.LW_B=rd.LW_B;
  window.GUN=rd.gunTs; window.GUND=rd.GUND; window.T50=rd.T50;
  window.WF=rd.WF!=null?rd.WF:null;
}
function restoreGlobals(s){
  window.RC=s._RC; window.PIN=s._PIN; window.MID=s._MID;
  window.WWGATE=s._WWGATE; window.LWGATE=s._LWGATE;
  window.WW_A=s._WW_A; window.WW_B=s._WW_B;
  window.LW_A=s._LW_A; window.LW_B=s._LW_B;
  window.GUN=s._GUN; window.GUND=s._GUND; window.T50=s._T50;
  window.WF=s._WF;
}


function computeOptimalStartR(rd){
  const {RC,PIN,rm,WF,l1stats} = rd;
  if(!RC || !PIN || !rm || WF == null) return null;
  const avgReachSOG = (() => {
    const l1 = l1stats;
    if(l1 && l1.length){
      const sogs = l1.map(s=>s.sog).filter(v=>v>0);
      return sogs.length ? sogs.reduce((a,b)=>a+b,0)/sogs.length : null;
    }
    return null;
  })();
  const N_SAMP = 60;
  const times = [];
  let minT = Infinity, minIdx = -1;
  for(let i=0;i<=N_SAMP;i++){
    const f=i/N_SAMP;
    const sLat=RC.lat+(PIN.lat-RC.lat)*f;
    const sLon=RC.lon+(PIN.lon-RC.lon)*f;
    const dist=hav(sLat,sLon,rm.lat,rm.lon);
    const brgToRM=brg(sLat,sLon,rm.lat,rm.lon);
    const twa=Math.abs(((brgToRM-WF+180+360)%360)-180);
    const absTWA=twa>180?360-twa:twa;
    let twsInfo=getEffectiveTwsInfo(rd);
    let tws=Number.isFinite(twsInfo.tws) ? twsInfo.tws : 12;
    if(!Number.isFinite(twsInfo.tws) && avgReachSOG && absTWA>=M32_POLAR_TWA_MIN && absTWA<=M32_POLAR_TWA_MAX){
      tws=estimateTWS(avgReachSOG, absTWA);
    }
    const spd=(absTWA>=M32_POLAR_TWA_MIN&&absTWA<=M32_POLAR_TWA_MAX)
      ? polarSpeed(absTWA, tws) : (avgReachSOG||12);
    const spdMs=spd*0.514444;
    const t=spdMs>0?dist/spdMs:9999;
    const item={f,sLat,sLon,t,twa:absTWA,spd};
    times.push(item);
    if(t<minT){ minT=t; minIdx=i; }
  }
  if(!times.length || minIdx < 0) return null;

  const best=times[minIdx];
  const rawPenalty=times.map(p=>Math.max(0,p.t-minT));

  // Smooth the penalties so the line degrades gradually away from OPT.
  const kernel=[1,4,6,4,1];
  const smoothPenalty=rawPenalty.map((_,i)=>{
    let acc=0, w=0;
    for(let k=-2;k<=2;k++){
      const j=Math.max(0,Math.min(rawPenalty.length-1,i+k));
      const kw=kernel[k+2];
      acc += rawPenalty[j]*kw;
      w += kw;
    }
    return w ? acc/w : rawPenalty[i];
  });
  smoothPenalty[minIdx]=0;
  for(let i=minIdx-1;i>=0;i--) smoothPenalty[i]=Math.max(smoothPenalty[i], smoothPenalty[i+1]);
  for(let i=minIdx+1;i<smoothPenalty.length;i++) smoothPenalty[i]=Math.max(smoothPenalty[i], smoothPenalty[i-1]);

  times.forEach((p,i)=>{
    p.rawPenalty = rawPenalty[i];
    p.penalty = smoothPenalty[i];
  });

  const maxPenalty = Math.max(...smoothPenalty, 0);
  return {
    times,
    best,
    bestIdx:minIdx,
    minT,
    maxT:Math.max(...times.map(p=>p.t)),
    tRange:(Math.max(...times.map(p=>p.t))-minT)||1,
    penaltyRange:maxPenalty || 1,
    rcPenalty: smoothPenalty[0] || 0,
    pinPenalty: smoothPenalty[smoothPenalty.length-1] || 0
  };
}

// ── Race-scoped draw wrappers (use prefixed canvas IDs) ──
function lineHeatColor(norm){
  const stops=[
    [0.00,[0,255,153]],
    [0.28,[170,255,60]],
    [0.55,[255,220,60]],
    [0.78,[255,150,40]],
    [1.00,[255,60,60]]
  ];
  const n=Math.max(0,Math.min(1,norm||0));
  for(let i=1;i<stops.length;i++){
    const [p1,c1]=stops[i-1], [p2,c2]=stops[i];
    if(n<=p2){
      const t=(n-p1)/Math.max(1e-6,p2-p1);
      const mix=(a,b)=>Math.round(a+(b-a)*t);
      return `rgba(${mix(c1[0],c2[0])},${mix(c1[1],c2[1])},${mix(c1[2],c2[2])},0.96)`;
    }
  }
  return 'rgba(255,60,60,0.96)';
}
function reachRankColor(rd, sail){
  const idx = (rd?.l1Order || []).indexOf(sail);
  if(idx===0) return '#ffcc00';
  if(idx===1) return '#cfcfcf';
  if(idx===2) return '#c87c3e';
  return '#ffffff';
}
function isVisibleAtGunReplay(rd, sail){
  const gd = rd?.GUND?.find(d=>d.sail===sail);
  if(!gd) return false;
  const dist = Number.isFinite(gd.dist) ? Math.abs(gd.dist) : 0;
  return dist <= 100;
}
function visibleGunBoats(rd){
  return (rd?.GUND || []).filter(d=>isVisibleAtGunReplay(rd, d.sail));
}

function drawGunR(rd){
  const {raceNum,RC,PIN,gunTs,ocsFromTelemetry} = rd;
  const GUND = visibleGunBoats(rd);
  // Match the T+50 panel height so both cards line up, while fitting the start line tightly again.
  const{ctx,W,H}=cvs(raceDomId(rd,'cGun'),600);cbg(ctx,W,H);
  if(!GUND.length) return;

  const cLa=MID.lat,cLo=MID.lon;
  const toM=(la,lo)=>({x:(lo-cLo)*D2R*RE*Math.cos(cLa*D2R),y:(la-cLa)*D2R*RE});
  const rcM=toM(RC.lat,RC.lon),pnM=toM(PIN.lat,PIN.lon);
  const ang=Math.atan2(rcM.y-pnM.y,rcM.x-pnM.x),rot=-(ang-Math.PI/2);
  const r=(mx,my)=>({rx:mx*Math.cos(rot)-my*Math.sin(rot),ry:mx*Math.sin(rot)+my*Math.cos(rot)});
  const rcR=r(rcM.x,rcM.y),pnR=r(pnM.x,pnM.y);
  const p2=GUND.map(p=>{const m=toM(p.lat,p.lon);return{...p,...r(m.x,m.y)}});

  // Fit mainly to the start-line height, then shift horizontally so the fleet still fits.
  const lineLen=Math.abs(rcR.ry-pnR.ry)||1;
  const topPad=54, bottomPad=54, leftPad=34, rightPad=56;
  let scale=(H-topPad-bottomPad)/lineLen;
  const allX=[rcR.rx,pnR.rx,...p2.map(p=>p.rx)];
  const cxOff=(rcR.rx+pnR.rx)/2;
  const scaledMinX=Math.min(...allX.map(v=>(v-cxOff)*scale));
  const scaledMaxX=Math.max(...allX.map(v=>(v-cxOff)*scale));
  const maxAllowedW=W-leftPad-rightPad;
  const neededW=scaledMaxX-scaledMinX;
  if(neededW>maxAllowedW){
    scale*=maxAllowedW/neededW;
  }
  const cyOff=(rcR.ry+pnR.ry)/2;
  const scaledMinX2=Math.min(...allX.map(v=>(v-cxOff)*scale));
  const scaledMaxX2=Math.max(...allX.map(v=>(v-cxOff)*scale));
  const lineCenterX=(leftPad + (-scaledMinX2) + (W-rightPad - (scaledMaxX2-scaledMinX2))/2);
  const plotCX=Math.max(leftPad - scaledMinX2, Math.min(W-rightPad - scaledMaxX2, lineCenterX));
  const plotCY=H/2-6;
  const tX=rx=>plotCX+(rx-cxOff)*scale;
  const tY=ry=>plotCY-(ry-cyOff)*scale;
  const rx=tX(rcR.rx),ry=tY(rcR.ry),px=tX(pnR.rx),py=tY(pnR.ry);

  // "Forward of the line" = the course side, using the active reach mark when available.
  const lineMidX=(rx+px)/2, lineMidY=(ry+py)/2;
  let courseUx=0, courseUy=1;
  if(rd.rm && Number.isFinite(rd.rm.lat) && Number.isFinite(rd.rm.lon)){
    const rmM=toM(rd.rm.lat,rd.rm.lon), rmR=r(rmM.x,rmM.y);
    const rmx=tX(rmR.rx), rmy=tY(rmR.ry);
    const dx=rmx-lineMidX, dy=rmy-lineMidY, mag=Math.hypot(dx,dy);
    if(mag>1){ courseUx=dx/mag; courseUy=dy/mag; }
  }
  const lineDx=px-rx, lineDy=py-ry, lineMag=Math.hypot(lineDx,lineDy)||1;
  const alongUx=lineDx/lineMag, alongUy=lineDy/lineMag;

  // Start line bearing label
  const slB=brg(RC.lat,RC.lon,PIN.lat,PIN.lon);
  ctx.save();ctx.fillStyle='rgba(0,204,255,.4)';ctx.font='9px Share Tech Mono';ctx.textAlign='center';
  ctx.fillText(`${slB.toFixed(1)}° (RC→Pin)`,W/2,H-18);ctx.restore();

  drawSL(ctx,rx,ry,px,py,false);

  // Polar-based quickest path to the reach mark from each point on the line
  // Draw as a smoother green→yellow→orange→red gradient directly on the start line,
  // with the time penalties and OPT marker kept to the left for a cleaner lane.
  const optimalStart = computeOptimalStartR(rd);
  if(optimalStart && optimalStart.times && optimalStart.times.length > 1){
    const {times,best,penaltyRange,rcPenalty,pinPenalty,minT} = optimalStart;
    const colorRange=Math.max(5, penaltyRange || 0);
    for(let i=0;i<times.length-1;i++){
      const a=times[i], b=times[i+1];
      const midPenalty=((a.penalty||0)+(b.penalty||0))/2;
      const norm=Math.max(0,Math.min(1,midPenalty/colorRange));
      const aM=toM(a.sLat,a.sLon), bM=toM(b.sLat,b.sLon);
      const aR=r(aM.x,aM.y), bR=r(bM.x,bM.y);
      const ax=tX(aR.rx), ay=tY(aR.ry), bx=tX(bR.rx), by=tY(bR.ry);
      ctx.save();
      ctx.strokeStyle=lineHeatColor(norm);
      ctx.lineWidth=8;
      ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
      ctx.restore();
    }

    // Re-draw the baseline line lightly underneath the heat overlay for crisp edges
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.18)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(px,py);ctx.stroke();
    ctx.restore();

    const bestM=toM(best.sLat,best.sLon), bestR=r(bestM.x,bestM.y);
    const obx=tX(bestR.rx), oby=tY(bestR.ry);
    const fmtPenalty = v => (v == null ? null : (v < 0.15 ? 'OPT' : `+${v.toFixed(1)}s`));
    const leftTick = 18;
    const labelX = Math.min(rx, px, obx) - 28;
    const optX1 = obx - leftTick;
    const optX2 = obx - 2;
    ctx.save();
    ctx.strokeStyle='#00ff99';
    ctx.lineWidth=5;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(optX1, oby);ctx.lineTo(optX2, oby);ctx.stroke();
    ctx.fillStyle='#00ff99';
    ctx.strokeStyle='rgba(8,12,18,0.92)';
    ctx.lineWidth=3;
    ctx.font='bold 9px Orbitron';
    ctx.textAlign='right';
    ctx.strokeText('Optimal Starting Position', labelX, oby+3);
    ctx.fillText('Optimal Starting Position', labelX, oby+3);
    ctx.restore();

    // Time penalties vs the optimal start point: dedicated lane to the left of the line.
    ctx.save();
    ctx.font='bold 8px Share Tech Mono';
    ctx.textAlign='right';
    ctx.strokeStyle='rgba(8,12,18,0.9)';
    ctx.lineWidth=2.5;
    if(rcPenalty != null){
      ctx.fillStyle='rgba(0,204,255,0.92)';
      ctx.strokeText(fmtPenalty(rcPenalty), labelX, ry-8);
      ctx.fillText(fmtPenalty(rcPenalty), labelX, ry-8);
    }
    if(pinPenalty != null){
      ctx.fillStyle='rgba(255,204,0,0.92)';
      ctx.strokeText(fmtPenalty(pinPenalty), labelX, py-10);
      ctx.fillText(fmtPenalty(pinPenalty), labelX, py-10);
    }
    ctx.restore();
  }

  // RC and PIN end labels
  [[rx,ry,'RC','#00ccff'],[px,py,'PIN','#ffcc00']].forEach(([x,y,l,c])=>{
    ctx.save();ctx.fillStyle=c+'55';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c+'90';ctx.font='8px Orbitron';ctx.textAlign='left';ctx.fillText(l,x+10,y+3);ctx.restore();
  });

  const slPx=Math.sqrt((rx-px)**2+(ry-py)**2);
  const mpp=hav(RC.lat,RC.lon,PIN.lat,PIN.lon)/slPx;

  // Distance-to-line dashes for ALL boats
  const ddx=px-rx,ddy=py-ry,len2=ddx*ddx+ddy*ddy;
  p2.forEach(d=>{
    const bx=tX(d.rx),by=tY(d.ry);
    const tt=Math.max(0,Math.min(1,((bx-rx)*ddx+(by-ry)*ddy)/len2));
    const cx2=rx+tt*ddx,cy2=ry+tt*ddy;
    ctx.save();ctx.strokeStyle=reachRankColor(rd, d.sail)+'35';ctx.lineWidth=1;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(cx2,cy2);ctx.stroke();ctx.setLineDash([]);
    // Distance label sits just forward of the line on the course side to keep the line itself clean.
    const lx=cx2 + courseUx*24;
    const ly=cy2 + courseUy*24;
    ctx.fillStyle=reachRankColor(rd, d.sail)+'90';ctx.font='bold 9px Share Tech Mono';ctx.textAlign='center';
    ctx.fillText(Math.round(d.dist)+'m',lx,ly);
    ctx.restore();
  });

  // Speed vectors (arrows) + boats — OCS boats drawn in red
  const rotDeg = rot * 180 / Math.PI;
  p2.forEach(d=>{
    const isOCS = ocsFromTelemetry ? ocsFromTelemetry.has(d.sail) : false;
    const boatCol = reachRankColor(rd, d.sail);
    const bx=tX(d.rx),by=tY(d.ry);
    // OCS: draw pulsing shaded circle behind boat
    if(isOCS){
      const r=Math.max(14,(M32_LEN/mpp)*0.9);
      ctx.save();
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,51,85,.18)';ctx.fill();
      ctx.strokeStyle='rgba(255,51,85,.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
    const vlen=(d.sog*0.514444*10)/mpp;
    const screenHdg = d.hdg - rotDeg;
    const hr=screenHdg*D2R;
    const ex=bx+Math.sin(hr)*vlen,ey=by-Math.cos(hr)*vlen;
    ctx.save();ctx.strokeStyle=boatCol+'88';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.fillStyle=boatCol+'88';ctx.beginPath();ctx.moveTo(ex,ey);
    ctx.lineTo(ex-Math.sin(hr-0.4)*6,ey+Math.cos(hr-0.4)*6);
    ctx.lineTo(ex-Math.sin(hr+0.4)*6,ey+Math.cos(hr+0.4)*6);
    ctx.closePath();ctx.fill();ctx.restore();
    drawCat(ctx,bx,by,screenHdg,boatCol,d.sail,mpp,null);
  });
  // Speed legend top-left
  ctx.save();p2.forEach((d,i)=>{
    const isOCS = ocsFromTelemetry ? ocsFromTelemetry.has(d.sail) : false;
    const lc = reachRankColor(rd, d.sail);
    ctx.fillStyle=lc;ctx.font='8px Share Tech Mono';ctx.textAlign='left';
    ctx.fillText(`#${d.sail} ${d.sog.toFixed(1)} kts${isOCS?' OCS':''}`,14,18+i*13)});ctx.restore();

  scaleBar(ctx,mpp,W,H);
}

window._startReplayStates = window._startReplayStates || {};

function interpTrackPoint(track, ts, toM){
  if(!track || !track.length) return null;
  if(ts < track[0].ts || ts > track[track.length-1].ts) return null;
  let lo=0, hi=track.length-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(track[mid].ts < ts) lo=mid+1; else hi=mid-1;
  }
  const i=Math.max(1, lo);
  const a=track[i-1], b=track[i] || a;
  if(!a || !b) return null;
  const dt=b.ts-a.ts;
  const f=dt>0 ? (ts-a.ts)/dt : 0;
  const lerp=(x,y)=>x+(y-x)*f;
  let lat = lerp(a.lat,b.lat), lon = lerp(a.lon,b.lon), mx = null, my = null;
  if(typeof toM === 'function'){
    const am = toM(a.lat,a.lon), bm = toM(b.lat,b.lon);
    mx = lerp(am.x,bm.x);
    my = lerp(am.y,bm.y);
  }
  return {
    ts,
    lat,
    lon,
    mx,
    my,
    sog: lerp(a.sog||0,b.sog||0),
    hdg: circMeanDeg([a.hdg||0,b.hdg||0],[1-f,f])
  };
}

function buildStartReplayGeom(rd){
  const {RC,PIN,MID,tracks,gunTs}=rd;
  if(!RC || !PIN || !MID) return null;
  const cLa=MID.lat,cLo=MID.lon;
  const toM=(la,lo)=>({x:(lo-cLo)*D2R*RE*Math.cos(cLa*D2R),y:(la-cLa)*D2R*RE});
  const rcM=toM(RC.lat,RC.lon), pnM=toM(PIN.lat,PIN.lon);
  const ang=Math.atan2(rcM.y-pnM.y,rcM.x-pnM.x), rot=-(ang-Math.PI/2);
  const r=(mx,my)=>({rx:mx*Math.cos(rot)-my*Math.sin(rot),ry:mx*Math.sin(rot)+my*Math.cos(rot)});
  const rcR=r(rcM.x,rcM.y), pnR=r(pnM.x,pnM.y);
  const sampleXs=[rcR.rx,pnR.rx], sampleYs=[rcR.ry,pnR.ry];
  const relSamples=[];
  for(let rel=-30; rel<=30.0001; rel+=2) relSamples.push(rel);
  for(const sail of Object.keys(tracks||{}).filter(s=>!EXCLUDED_BOATS.includes(s) && isVisibleAtGunReplay(rd, s))){
    const t=tracks[sail]; if(!t || !t.length) continue;
    for(const rel of relSamples){
      const p=interpTrackPoint(t, gunTs + rel*1000, toM);
      if(!p) continue;
      const pr=r(p.mx, p.my);
      sampleXs.push(pr.rx); sampleYs.push(pr.ry);
    }
  }
  const lineLen=Math.abs(rcR.ry-pnR.ry)||1;
  const widthSpan=Math.max(...sampleXs)-Math.min(...sampleXs);
  const ySpan=Math.max(...sampleYs)-Math.min(...sampleYs);
  return {toM,r,rcR,pnR,lineLen,widthSpan,ySpan,sampleXs,sampleYs,rot};
}

function startReplayLayout(rd,W,H){
  const g=rd._replayGeom || (rd._replayGeom=buildStartReplayGeom(rd));
  if(!g) return null;
  const {rcR,pnR,lineLen,sampleXs,sampleYs}=g;
  const topPad=36, bottomPad=36, leftPad=46, rightPad=46;
  let scale=(H-topPad-bottomPad)/lineLen;
  const cxOff=(rcR.rx+pnR.rx)/2, cyOff=(rcR.ry+pnR.ry)/2;
  const scaledMinX=Math.min(...sampleXs.map(v=>(v-cxOff)*scale));
  const scaledMaxX=Math.max(...sampleXs.map(v=>(v-cxOff)*scale));
  const maxAllowedW=W-leftPad-rightPad;
  const neededW=scaledMaxX-scaledMinX;
  if(neededW>maxAllowedW) scale*=maxAllowedW/neededW;
  scale *= 1.3;
  const scaledMinX2=Math.min(...sampleXs.map(v=>(v-cxOff)*scale));
  const scaledMaxX2=Math.max(...sampleXs.map(v=>(v-cxOff)*scale));
  const plotCX=(leftPad + (-scaledMinX2) + (W-rightPad - (scaledMaxX2-scaledMinX2))/2);
  const plotCY=H/2;
  const tX=rx=>plotCX+(rx-cxOff)*scale;
  const tY=ry=>plotCY-(ry-cyOff)*scale;
  const rx=tX(rcR.rx), ry=tY(rcR.ry), px=tX(pnR.rx), py=tY(pnR.ry);
  const slPx=Math.hypot(rx-px, ry-py);
  const mpp=hav(rd.RC.lat,rd.RC.lon,rd.PIN.lat,rd.PIN.lon)/Math.max(slPx,1);
  return {tX,tY,rx,ry,px,py,mpp,rot:g.rot};
}

function drawStartReplayFrame(rd, relSec){
  const replayWEl=document.getElementById(raceDomId(rd,'cReplay')); const targetH=Math.max(620, Math.round((replayWEl?.offsetWidth||380)*1.62)); const {ctx,W,H}=cvs(raceDomId(rd,'cReplay'),targetH); cbg(ctx,W,H);
  const lay=startReplayLayout(rd,W,H); if(!lay) return;
  const {tX,tY,rx,ry,px,py,mpp,rot}=lay;
  const {toM,r}=rd._replayGeom;
  drawSL(ctx,rx,ry,px,py,false);
  [[rx,ry,'RC','#00ccff'],[px,py,'PIN','#ffcc00']].forEach(([x,y,l,c])=>{ctx.save();ctx.fillStyle=c+'55';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.fillStyle=c+'cc';ctx.font='8px Orbitron';ctx.textAlign='left';ctx.fillText(l,x+8,y+3);ctx.restore();});
  const ts = rd.gunTs + relSec*1000;

  const sails=Object.keys(rd.tracks||{}).filter(s=>!EXCLUDED_BOATS.includes(s) && isVisibleAtGunReplay(rd, s));
  for(const sail of sails){

    ctx.save();
    for(let back=5; back>=1; back--){
      const pA=interpTrackPoint(t, ts-(back)*1000, toM), pB=interpTrackPoint(t, ts-(back-1)*1000, toM);
      if(!pA || !pB) continue;
      const aR=r(pA.mx, pA.my), bR=r(pB.mx, pB.my);

      ctx.lineWidth=back>3?1.5:2.2;

    }
    ctx.restore();
    const p=interpTrackPoint(t, ts, toM); if(!p) continue;
    const pr=r(p.mx, p.my);
    const bx=tX(pr.rx), by=tY(pr.ry);
    const vlen=(Math.max(0,p.sog||0)*0.514444*6)/Math.max(mpp,0.1);
    const screenHdg=(p.hdg||0) - rotDeg;
    const hr=screenHdg*D2R;
    const ex=bx+Math.sin(hr)*vlen, ey=by-Math.cos(hr)*vlen;

    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.fillStyle=reachRankColor(rd, sail)+'aa'; ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex-Math.sin(hr-0.45)*5,ey+Math.cos(hr-0.45)*5); ctx.lineTo(ex-Math.sin(hr+0.45)*5,ey+Math.cos(hr+0.45)*5); ctx.closePath(); ctx.fill();
    drawCat(ctx,bx,by,screenHdg,COL[sail]||'#888',sail,mpp,null);
    ctx.restore();
  }
  const boxW=78, boxH=22;
  ctx.save();
  ctx.fillStyle='rgba(8,16,28,0.82)'; ctx.strokeStyle='rgba(64,128,196,0.45)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(W-boxW-12, 12, boxW, boxH, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle=relSec<0 ? '#facc15' : '#22d3ee'; ctx.font='bold 12px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const prefix = relSec>=0 ? 'T+' : 'T';
  ctx.fillText(prefix + relSec.toFixed(1), W-boxW/2-12, 23);
  ctx.restore();
  scaleBar(ctx,mpp,W,H);
}

function formatReplayLabel(rel){ return (rel>=0 ? 'T+' : 'T') + Number(rel).toFixed(1); }

function stopOtherStartReplays(activeKey){
  Object.entries(window._startReplayStates).forEach(([k,s])=>{
    if(k!==activeKey && s && s.timer){ clearInterval(s.timer); s.timer=null; s.playing=false; const b=document.getElementById(s.playId); if(b) b.textContent='Play'; }
  });
}

function initStartReplayR(rd){
  const key = raceDomId(rd,'cReplay');
  const canvas = document.getElementById(key);
  const slider = document.getElementById(raceDomId(rd,'replaySlider'));
  const playBtn = document.getElementById(raceDomId(rd,'replayPlay'));
  const timeEl = document.getElementById(raceDomId(rd,'replayTime'));
  const speedBtns = {1:document.getElementById(raceDomId(rd,'replaySpeed1')),2:document.getElementById(raceDomId(rd,'replaySpeed2')),4:document.getElementById(raceDomId(rd,'replaySpeed4'))};
  if(!canvas || !slider || !playBtn || !timeEl || canvas.offsetWidth===0) return;
  stopOtherStartReplays(key);
  let st = window._startReplayStates[key] || {rel:-30, playing:true, timer:null, speed:1};
  if(st.timer) clearInterval(st.timer);
  st.playId = raceDomId(rd,'replayPlay');
  st.rel = Number.isFinite(st.rel) ? st.rel : -30;
  st.speed = Number.isFinite(st.speed) ? st.speed : 1;
  const refreshSpeedUI = ()=>{ Object.entries(speedBtns).forEach(([k,btn])=>{ if(btn) btn.classList.toggle('active', Number(k)===st.speed); }); };
  const render = ()=>{ drawStartReplayFrame(rd, st.rel); slider.value=String(st.rel); timeEl.textContent=formatReplayLabel(st.rel); refreshSpeedUI(); };
  const start = ()=>{
    if(st.timer) clearInterval(st.timer);
    st.playing=true; playBtn.textContent='Pause';
    st.timer=setInterval(()=>{
      st.rel = +(st.rel + (0.1*st.speed)).toFixed(1);
      if(st.rel > 30) st.rel = -30;
      render();
    }, 100);
  };
  const stop = ()=>{ if(st.timer) clearInterval(st.timer); st.timer=null; st.playing=false; playBtn.textContent='Play'; };
  const setSpeed = (s)=>{ st.speed=s; refreshSpeedUI(); if(st.playing) start(); else render(); };
  slider.oninput = ()=>{ stop(); st.rel=parseFloat(slider.value)||-30; render(); };
  playBtn.onclick = ()=>{ st.playing ? stop() : start(); };
  Object.entries(speedBtns).forEach(([k,btn])=>{ if(btn) btn.onclick = ()=>setSpeed(Number(k)); });
  window._startReplayStates[key]=st;
  render();
  start();
}

function drawT50R(rd){
  const {raceNum,T50,RC,PIN,rm,tracks,gunTs} = rd;
  const{ctx,W,H}=cvs(raceDomId(rd,'cT50'),600);cbg(ctx,W,H);

  // Zoom 1.5x: compute natural fit, then scale up 1.5× around canvas centre
  // Use same rotProj but then boost the scale
  const cLa=MID.lat,cLo=MID.lon;
  const toM=(la,lo)=>({x:(lo-cLo)*D2R*RE*Math.cos(cLa*D2R),y:(la-cLa)*D2R*RE});
  const rcM=toM(RC.lat,RC.lon),pnM=toM(PIN.lat,PIN.lon);
  const ang=Math.atan2(rcM.y-pnM.y,rcM.x-pnM.x),rot=-(ang-Math.PI/2);
  const r=(mx,my)=>({rx:mx*Math.cos(rot)-my*Math.sin(rot),ry:mx*Math.sin(rot)+my*Math.cos(rot)});
  const rcR=r(rcM.x,rcM.y),pnR=r(pnM.x,pnM.y);
  const p2=T50.map(p=>{const m=toM(p.lat,p.lon);return{...p,...r(m.x,m.y)}});
  // Include reach mark in bounding box so full reach leg is visible
  const rmM2=rm?toM(rm.lat,rm.lon):null,rmR2=rmM2?r(rmM2.x,rmM2.y):null;
  const allX=[rcR.rx,pnR.rx,...p2.map(p=>p.rx),...(rmR2?[rmR2.rx]:[])];
  const allY=[rcR.ry,pnR.ry,...p2.map(p=>p.ry),...(rmR2?[rmR2.ry]:[])];
  const padX=40,padY=60;
  const spanX=Math.max(...allX)-Math.min(...allX)+padX*2;
  const spanY=Math.max(...allY)-Math.min(...allY)+padY*2;
  const baseScale=Math.min((W-padX*2)/spanX,(H-padY*2)/spanY);
  const scale=baseScale; // no extra zoom — fit the full reach leg
  const cxOff=(Math.min(...allX)+Math.max(...allX))/2;
  const cyOff=(Math.min(...allY)+Math.max(...allY))/2;
  const plotCX=W/2, plotCY=H/2-18;
  const tX=rx=>plotCX+(rx-cxOff)*scale;
  const tY=ry=>plotCY-(ry-cyOff)*scale;
  const rx=tX(rcR.rx),ry=tY(rcR.ry),px=tX(pnR.rx),py=tY(pnR.ry);

  // Draw tracks from gun to T+50 (thin, faded)
  const GUN=rd.gunTs, T50ts=GUN+50000;
  if(tracks){
    for(const sail of Object.keys(tracks).filter(s=>!EXCLUDED_BOATS.includes(s))){
      const t=tracks[sail];if(!t)continue;
      const seg=t.filter(p=>p.ts>=GUN&&p.ts<=T50ts);
      if(seg.length<2)continue;
      ctx.save();ctx.strokeStyle=(COL[sail]||'#888')+'50';ctx.lineWidth=1.5;ctx.beginPath();
      let first=true;
      for(const p of seg){
        const[bx2,by2]=[tX(r(toM(p.lat,p.lon).x,toM(p.lat,p.lon).y).rx),tY(r(toM(p.lat,p.lon).x,toM(p.lat,p.lon).y).ry)];
        first?(ctx.moveTo(bx2,by2),first=false):ctx.lineTo(bx2,by2);
      }
      ctx.stroke();ctx.restore();
    }
  }

  drawSL(ctx,rx,ry,px,py,true);
  [[rx,ry,'RC','#00ccff'],[px,py,'PIN','#ffcc00']].forEach(([x,y,l,c])=>{
    ctx.save();ctx.fillStyle=c+'45';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c+'65';ctx.font='8px Orbitron';ctx.textAlign='center';ctx.fillText(l,x,y-7);ctx.restore();
  });
  ctx.save();ctx.fillStyle='rgba(0,204,255,.025)';ctx.font='bold 24px Orbitron';ctx.textAlign='center';ctx.fillText('T+50',W/2,H/2+10);ctx.restore();
  const slPx=Math.sqrt((rx-px)**2+(ry-py)**2);
  const mpp=hav(RC.lat,RC.lon,PIN.lat,PIN.lon)/slPx;

  // Boats at T+50: no arrow, just cat + speed + dist labels
  const rotDegT50 = rot * 180 / Math.PI;
  p2.forEach((d)=>{
    const bx=tX(d.rx),by=tY(d.ry);
    const screenHdgT50 = d.hdg - rotDegT50;
    drawCat(ctx,bx,by,screenHdgT50,COL[d.sail],d.sail,mpp,null);
    ctx.save();ctx.fillStyle=COL[d.sail]+'95';ctx.font='8px Share Tech Mono';ctx.textAlign='center';
    ctx.fillText(d.avg.toFixed(1)+' kts',bx,by+22);
    ctx.fillStyle=COL[d.sail]+'70';ctx.fillText(Math.round(d.dist)+'m',bx,by-24);ctx.restore();
  });
  if(rm){
    const rmM=toM(rm.lat,rm.lon),rmR=r(rmM.x,rmM.y);
    markRound(ctx,tX(rmR.rx),tY(rmR.ry),'#ff8c00','REACH',5);
  }
  scaleBar(ctx,mpp,W,H);
}

function drawCourseR(rd){
  const {raceNum,tracks,rm,WF,WF_OBJ,markPos,WWGATE,LWGATE,WW_A,WW_B,LW_A,LW_B,RC,PIN,MID} = rd;
  // Rotate so WW→LW axis is VERTICAL with WW at top (if gates known).
  // If gates missing, use start line orientation as fallback.
  let THETA, cLat, cLon;
  if(WWGATE && LWGATE){
    // THETA = bearing from LW→WW in radians.
    // The rot() function maps the LW→WW direction onto +ry (= top of canvas via tY flip).
    // This guarantees WW is always at the top of the course map regardless of compass heading.
    const _axisBrg = brg(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon);
    THETA = _axisBrg * Math.PI / 180;
    cLat=(WWGATE.lat+LWGATE.lat)/2; cLon=(WWGATE.lon+LWGATE.lon)/2;
  } else {
    // Fallback when gates unknown: orient so upwind is toward top.
    // Use wind direction if available, else start line perpendicular.
    const upwindBrg = WF != null ? WF : (RC && PIN ? brg(RC.lat,RC.lon,PIN.lat,PIN.lon) : 0);
    THETA = upwindBrg * Math.PI / 180;
    cLat = MID ? MID.lat : (RC ? RC.lat : 0);
    cLon = MID ? MID.lon : (RC ? RC.lon : 0);
  }
  function toM(la,lo){return[(lo-cLon)*D2R*RE*Math.cos(cLat*D2R),(la-cLat)*D2R*RE]}
  function rot(x,y){return[x*Math.cos(THETA)-y*Math.sin(THETA),x*Math.sin(THETA)+y*Math.cos(THETA)]}
  function toRot(la,lo){return rot(...toM(la,lo))}
  const keyPts=[WWGATE,LWGATE,RC,PIN,WW_A||WWGATE,WW_B||WWGATE,LW_A||LWGATE,LW_B||LWGATE];
  if(rm) keyPts.push(rm);
  // Include sampled track points for proper bounding box
  const trackSample=[];
  for(const s of Object.keys(tracks).filter(s=>!EXCLUDED_BOATS.includes(s))){
    const t=tracks[s];if(!t)continue;
    for(let i=0;i<t.length;i+=10) trackSample.push({lat:t[i].lat,lon:t[i].lon});
  }
  const allBoundPts=[...keyPts.filter(Boolean),...trackSample];
  const rk=allBoundPts.map(p=>toRot(p.lat,p.lon));
  const rawSpanX=Math.max(...rk.map(p=>p[0]))-Math.min(...rk.map(p=>p[0]));
  const rawSpanY=Math.max(...rk.map(p=>p[1]))-Math.min(...rk.map(p=>p[1]));
  // Canvas: portrait orientation; compute from actual track extent
  const CANVAS_W = 440;
  const CANVAS_H = Math.max(500, Math.min(1100, Math.round(CANVAS_W * (rawSpanY/Math.max(rawSpanX,1)) + 80)));
  const mnX=Math.min(...rk.map(p=>p[0]))-50,mxX=Math.max(...rk.map(p=>p[0]))+50;
  const mnY=Math.min(...rk.map(p=>p[1]))-50,mxY=Math.max(...rk.map(p=>p[1]))+50;
  const{ctx,W,H}=cvs(raceDomId(rd,'cCourse'),CANVAS_H);cbg(ctx,W,H);
  const pad=44;
  const scale=Math.min((W-pad*2)/(mxX-mnX),(H-pad*2)/(mxY-mnY));
  const offX=pad+(W-pad*2-(mxX-mnX)*scale)/2;
  const offY=pad+(H-pad*2-(mxY-mnY)*scale)/2;
  const tX=rx=>offX+(rx-mnX)*scale;
  const tY=ry=>H-offY-(ry-mnY)*scale;
  function tP(la,lo){const[rx,ry]=toRot(la,lo);return[tX(rx),tY(ry)]}
  const mpp=1/scale;

  // Tracks (non-excluded boats only)
  for(const s of Object.keys(tracks).filter(s=>!EXCLUDED_BOATS.includes(s))){
    const t=tracks[s];if(!t)continue;
    ctx.save();ctx.strokeStyle=(COL[s]||'#888')+'38';ctx.lineWidth=1.5;ctx.beginPath();let f=1;
    for(const p of t.filter((_,i)=>i%3===0)){const[px,py]=tP(p.lat,p.lon);f?(ctx.moveTo(px,py),f=0):ctx.lineTo(px,py)}
    ctx.stroke();ctx.restore();
  }

  // Course axis
  if(WWGATE&&LWGATE){
    const[ax,ay]=tP(LWGATE.lat,LWGATE.lon),[bx,by]=tP(WWGATE.lat,WWGATE.lon);
    dline(ctx,ax,ay,bx,by,'rgba(0,204,255,.3)',null,true);
    const caBrg2=brg(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon);
    const mx2=(ax+bx)/2,my2=(ay+by)/2;
    const la=Math.atan2(by-ay,bx-ax);
    const ox=Math.cos(la+Math.PI/2)*12,oy=Math.sin(la+Math.PI/2)*12;
    ctx.save();ctx.fillStyle='rgba(0,204,255,.75)';ctx.font='8px Share Tech Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(mx2+ox,my2+oy);ctx.rotate(la);
    ctx.fillText(`${caBrg2.toFixed(1)}° / ${((caBrg2+180)%360).toFixed(1)}°  ${Math.round(hav(LWGATE.lat,LWGATE.lon,WWGATE.lat,WWGATE.lon))}m`,0,0);
    ctx.restore();
  }

  // Reach leg: draw from start line midpoint to reach mark
  if(rm&&MID){
    const[sx,sy]=tP(MID.lat,MID.lon),[rx2,ry2]=tP(rm.lat,rm.lon);
    dline(ctx,sx,sy,rx2,ry2,'rgba(255,140,0,.5)',null,true);
    markRound(ctx,rx2,ry2,'#ff8c00','REACH',5);
    const legDist=Math.round(hav(MID.lat,MID.lon,rm.lat,rm.lon));
    const midRx=(sx+rx2)/2,midRy=(sy+ry2)/2;
    ctx.save();ctx.fillStyle='rgba(255,140,0,.85)';ctx.font='bold 9px Share Tech Mono';ctx.textAlign='center';
    ctx.fillText(legDist+'m',midRx,midRy-6);ctx.restore();
  }

  // Start line with RC/Pin distance from course axis
  if(RC&&PIN){
    const[rcx,rcy]=tP(RC.lat,RC.lon),[pinx,piny]=tP(PIN.lat,PIN.lon);
    drawSL(ctx,rcx,rcy,pinx,piny,false);
    const slBrg2=brg(RC.lat,RC.lon,PIN.lat,PIN.lon);
    const mx2=(rcx+pinx)/2,my2=(rcy+piny)/2;
    const la=Math.atan2(piny-rcy,pinx-rcx);
    const ox=Math.cos(la+Math.PI/2)*12,oy=Math.sin(la+Math.PI/2)*12;
    ctx.save();ctx.fillStyle='rgba(255,204,0,.75)';ctx.font='8px Share Tech Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(mx2+ox,my2+oy);ctx.rotate(la);
    ctx.fillText(`${slBrg2.toFixed(1)}°  ${Math.round(hav(RC.lat,RC.lon,PIN.lat,PIN.lon))}m`,0,0);
    ctx.restore();
    if(rm){
      const midLat=(RC.lat+PIN.lat)/2, midLon=(RC.lon+PIN.lon)/2;
      const dRC=Math.round(hav(RC.lat,RC.lon,rm.lat,rm.lon));
      const dMID=Math.round(hav(midLat,midLon,rm.lat,rm.lon));
      const dPIN=Math.round(hav(PIN.lat,PIN.lon,rm.lat,rm.lon));
      const brgRC=brg(RC.lat,RC.lon,rm.lat,rm.lon);
      const brgPIN=brg(PIN.lat,PIN.lon,rm.lat,rm.lon);
      const wfLocal=WF||WF_OBJ?.wf||null;
      const twaStr=(b,wf)=>wf!=null?(' '+Math.round(Math.abs(((b-wf+180+360)%360)-180))+'°TWA'):'';
      ctx.save();
      ctx.fillStyle='rgba(0,204,255,.65)';ctx.font='bold 8px Share Tech Mono';ctx.textAlign='right';
      ctx.fillText('RC→RM: '+dRC+'m'+twaStr(brgRC,wfLocal),rcx-6,rcy+14);
      ctx.fillStyle='rgba(180,180,255,.55)';ctx.textAlign='center';
      ctx.fillText('MID→RM: '+dMID+'m',(rcx+pinx)/2,Math.min(rcy,piny)+24);
      ctx.fillStyle='rgba(255,204,0,.65)';ctx.textAlign='left';
      ctx.fillText('PIN→RM: '+dPIN+'m'+twaStr(brgPIN,wfLocal),pinx+6,piny+14);
      ctx.restore();
    }
  }

  // Gates (only if both endpoints exist)
  [[GATE_SNS.WW,WW_A||WWGATE,WW_B||WWGATE,'#00ff99','WWGate',WWGATE],
   [GATE_SNS.LW,LW_A||LWGATE,LW_B||LWGATE,'#a78bfa','LWGate',LWGATE]].filter(([,ptA,,,,gc])=>ptA&&gc).forEach(([,ptA,ptB,col,label,gc])=>{
    const[ax2,ay2]=tP(ptA.lat,ptA.lon),[bx2,by2]=tP(ptB.lat,ptB.lon);
    ctx.save();ctx.strokeStyle=col+'60';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ax2,ay2);ctx.lineTo(bx2,by2);ctx.stroke();ctx.restore();
    [[ax2,ay2],[bx2,by2]].forEach(([bpx,bpy])=>{ctx.save();ctx.fillStyle=col+'99';ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.arc(bpx,bpy,4,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()});
    markRound(ctx,...tP(gc.lat,gc.lon),col,label,4);
  });

  // North arrow (rotated)
  {const nx=W-28,ny=28,nl=16,na=-THETA;
   ctx.save();ctx.strokeStyle='rgba(0,204,255,.55)';ctx.lineWidth=1.5;
   ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(nx+Math.sin(na)*nl,ny-Math.cos(na)*nl);ctx.stroke();
   ctx.fillStyle='rgba(0,204,255,.7)';ctx.font='7px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
   ctx.fillText('N',nx+Math.sin(na)*(nl+7),ny-Math.cos(na)*(nl+7));ctx.restore();}

  // Store transform params on canvas for click-to-place reach mark
  const canvasEl = document.getElementById(raceDomId(rd,'cCourse'));
  if(canvasEl){
    canvasEl._rmTransform = {
      cLat, cLon, THETA, mnX, mnY, scale, offX, offY, W, H,
      raceNum, rd
    };
    canvasEl._rmClickEnabled = true;
    canvasEl.style.cursor = 'crosshair';
    canvasEl.title = 'Click to manually place reach mark';
    // Remove old listener if re-rendered
    if(canvasEl._rmClickHandler) canvasEl.removeEventListener('click', canvasEl._rmClickHandler);
    canvasEl._rmClickHandler = (e) => handleReachMarkClick(e, canvasEl);
    canvasEl.addEventListener('click', canvasEl._rmClickHandler);
  }

  // Legend
  Object.keys(tracks).slice(0,8).forEach((s,i)=>{ctx.save();ctx.strokeStyle=(COL[s]||'#888')+'90';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(10,H-50+i*13);ctx.lineTo(26,H-50+i*13);ctx.stroke();
    ctx.fillStyle=COL[s]||'#888';ctx.font='bold 8px Orbitron';ctx.textAlign='left';ctx.fillText('#'+s,29,H-46+i*13);ctx.restore()});
  scaleBar(ctx,mpp,W,H);
}

function renderVMGR(rd){
  // Renders the VMG analysis table for all boats.
  // Shows upwind/downwind VMG versus fleet median, plus data quality badge.
  const {raceNum, BOATS, vmgData, dataQuality} = rd;
  const tb = document.getElementById(raceDomId(rd,'vmgBody'));
  if(!tb || !vmgData) return;
  tb.innerHTML = '';

  // Sort by upwind VMG descending (best upwind speed first)
  const sorted = [...BOATS].sort((a,b) => {
    const va = vmgData[a]?.uwVMG ?? -99;
    const vb = vmgData[b]?.uwVMG ?? -99;
    return vb - va;
  });

  sorted.forEach(sail => {
    const c = COL[sail] || '#888';
    const v = vmgData[sail] || {};
    const dq = dataQuality?.[sail] || {};
    const dqCol = dq.score==='HIGH' ? 'var(--green)' : dq.score==='MEDIUM' ? 'var(--yellow)' : 'var(--red)';

    const fmtVMG = (v, med) => {
      if(v == null) return '<span style="color:var(--muted2)">—</span>';
      return `<span style="font-family:Orbitron,monospace;font-size:11px;font-weight:700;color:${c}">${v.toFixed(2)} kts</span>`;
    };
    const fmtDelta = (d) => {
      if(d == null) return '<span style="color:var(--muted2)">—</span>';
      const col = d > 0.1 ? 'var(--green)' : d < -0.1 ? 'var(--red)' : 'var(--muted)';
      return `<span class="badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${d>=0?'+':''}${d.toFixed(2)}</span>`;
    };

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="td" style="flex-direction:column;align-items:flex-start;gap:2px">
        <span class="sn" style="color:${c}">${sail}</span>
        <span style="font-size:7px;color:var(--muted)">${TEAM_NAMES[sail]||''}</span>
      </div></td>
      <td><div class="td">${fmtVMG(v.uwVMG)}</div></td>
      <td><div class="td">${fmtDelta(v.uwVMGvsMed)}</div></td>
      <td><div class="td">${fmtVMG(v.dwVMG)}</div></td>
      <td><div class="td">${fmtDelta(v.dwVMGvsMed)}</div></td>
      <td><div class="td">
        <span class="badge" style="background:${dqCol}22;color:${dqCol};border:1px solid ${dqCol}44;font-size:7px">${dq.score||'—'}</span>
        <span style="font-size:8px;color:var(--muted2)">${dq.coverage!=null?dq.coverage+'%':''}</span>
        ${dq.maxGap>10?`<span style="font-size:7px;color:var(--yellow)">gap:${dq.maxGap}s</span>`:''}
      </div></td>
    `;
    tb.appendChild(tr);
  });
}

function renderStartR(rd){
  const {raceNum, startStats, l1Order} = rd;
  const tb = document.getElementById(raceDomId(rd,'startBody'));
  if(!tb || !startStats || !startStats.length) return;
  tb.innerHTML = '';
  // Sort by mark 1 order (reach mark arrival order), fall back to distGun
  const ranked = [];
  if(l1Order && l1Order.length){
    for(const sail of l1Order){
      const s = startStats.find(x=>x.sail===sail);
      if(s) ranked.push(s);
    }
    for(const s of startStats){
      if(!ranked.find(x=>x.sail===s.sail)) ranked.push(s);
    }
  } else {
    ranked.push(...startStats);
  }
  // Always push Vakaros-called OCS boats to the bottom
  const ocsSet = rd.ocsFromTelemetry || new Set();
  ranked.sort((a,b)=>{
    const aOCS = ocsSet.has(a.sail), bOCS = ocsSet.has(b.sail);
    if(aOCS && !bOCS) return 1;
    if(!aOCS && bOCS) return -1;
    return 0; // preserve existing order within each group
  });
  const maxSpd = Math.max(...ranked.map(s=>s.sogGun||0), 1);
  ranked.forEach((s, i) => {
    const isOCS = rd.ocsFromTelemetry ? rd.ocsFromTelemetry.has(s.sail) : false;
    const c = isOCS ? '#ff3355' : (COL[s.sail] || '#888');
    const rk = i===0?'g':i===1?'s':i===2?'b':'';
    const spdBar = ((s.sogGun||0)/maxSpd*100).toFixed(1);
    const linePctBar = Math.max(0, Math.min(100, s.linePct ?? 0)).toFixed(1);
    const dtlVal = s.distGun;
    const signedCol = dtlVal == null ? 'var(--muted)'
                    : dtlVal >= DTL_CLEAR_M ? 'var(--green)'
                    : dtlVal >= 0           ? 'var(--yellow)'
                    :                         'var(--red)';
    const dq = rd.dataQuality ? rd.dataQuality[s.sail] : null;
    const dqCol = dq?.score==='HIGH' ? 'var(--green)' : dq?.score==='MEDIUM' ? 'var(--yellow)' : 'var(--red)';
    const tr = document.createElement('tr');
    tr.dataset.rank = String(i);
    tr.dataset.dtl  = String(s.distGun ?? 9999);
    tr.dataset.linepct = String(s.linePct ?? -1);
    tr.dataset.spd  = String(s.sogGun ?? 0);
    tr.dataset.cross = String(s.crossingTime ?? 9999);
    tr.dataset.t95  = String(s.accel ?? 9999);
    tr.dataset.ocs  = isOCS ? '1' : '0';
    if(isOCS) tr.style.cssText = 'background:rgba(255,51,85,.12);border-left:3px solid #ff3355';
    // T→95%: accel now holds seconds; lower = better (quicker to reach speed)
    const t95Col = s.accel == null ? 'var(--muted)'
                 : s.accel <= 15   ? 'var(--green)'
                 : s.accel <= 30   ? 'var(--yellow)'
                 :                   'var(--red)';
    tr.innerHTML = `
      <td><div class="td"><span class="rk ${rk}">#${i+1}</span></div></td>
      <td><div class="td" style="flex-direction:column;align-items:flex-start;gap:2px">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="sn" style="color:${c}">${s.sail}</span>
          ${isOCS ? '<span style="font-size:8px;font-weight:700;color:#ff3355;font-family:Orbitron,monospace;background:rgba(255,51,85,.2);padding:1px 4px;border-radius:2px;border:1px solid #ff335555">OCS</span>' : ''}
        </div>
        <span style="font-size:7px;color:var(--muted)">${TEAM_NAMES[s.sail]||''}</span>
        ${dq?`<span style="font-size:6px;color:${dqCol};opacity:.7">${dq.score} · ${dq.coverage}%</span>`:''}
      </div></td>
      <td><div class="td"><span style="font-family:Orbitron,monospace;font-size:12px;font-weight:700;color:${signedCol}">${s.distGun!=null?(s.distGun>=0?'+':'')+s.distGun.toFixed(1)+'m':'—'}</span></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${linePctBar}%;background:${c}"></div></div>
        <div class="bv" style="color:${c}">${s.linePct!=null?s.linePct.toFixed(0)+'%':'—'}</div>
      </div></div></td>
      <td><div class="td"><div class="br">
        <div class="bb"><div class="bf" style="width:${spdBar}%;background:${c}"></div></div>
        <div class="bv" style="color:${c}">${s.sogGun!=null?s.sogGun.toFixed(1)+'kts':'—'}</div>
      </div></div></td>
      <td><div class="td"><span style="font-family:Orbitron,monospace;font-size:11px;color:${c}">${s.crossingTime!=null?'+'+s.crossingTime.toFixed(1)+'s':'—'}</span></div></td>
      <td><div class="td"><span style="font-family:Orbitron,monospace;font-size:11px;color:${t95Col}">${s.accel!=null?s.accel.toFixed(1)+'s':'—'}</span></div></td>
    `;
    tb.appendChild(tr);
  });
}

function renderL1R(rd){
  const {raceNum,l1stats,BOATS} = rd;
  const tb = document.getElementById(raceDomId(rd,'l1Body'));
  if(!tb) return;
  tb.innerHTML='';
  if(!l1stats.length) return;
  const rankedAll = l1stats.filter(s=>s.distFromPin!=null);
  const mD=Math.max(...rankedAll.map(s=>s.dist||0), 1);
  const mS=Math.max(...rankedAll.map(s=>s.sog||0), 1);
  const mHSd=Math.max(...rankedAll.filter(s=>s.heelSd!=null).map(s=>s.heelSd)||[1]);
  // Leader distFromPin = largest (furthest from pin = furthest ahead)
  const leadDist = rankedAll[0]?.distFromPin || 0;
  // Ranked boats
  rankedAll.forEach((s,i)=>{
    const c=COL[s.sail]||'#888';
    const rk=i===0?'g':i===1?'s':i===2?'b':'';
    // Gap = distance behind leader at T+50
    const gap=i===0?'—':`+${Math.round(leadDist-s.distFromPin)}m`;
    const gapVal = i===0 ? 0 : Math.round(leadDist-s.distFromPin);
    const dp=(s.dist/mD*100).toFixed(1),sp=(s.sog/mS*100).toFixed(1);
    const tr=document.createElement('tr');
    tr.dataset.rank   = String(i);
    tr.dataset.dist   = String(s.distFromPin ?? 0);
    tr.dataset.gap    = String(gapVal);
    tr.dataset.sailed = String(s.dist ?? 0);
    tr.dataset.sog    = String(s.sog ?? 0);
    tr.dataset.heel   = String(Math.abs(s.heel ?? 0));
    tr.dataset.heelsd = String(s.heelSd ?? 9999);
    tr.innerHTML=`
      <td><div class="td"><span class="rk ${rk}">#${i+1}</span></div></td>
      <td><div class="td"><span class="sn" style="color:${c}">${s.sail}</span><br><span style="font-size:7px;color:var(--muted);letter-spacing:.5px">${TEAM_NAMES[s.sail]||''}</span></div></td>
      <td><div class="td"><span class="mn" style="font-size:9px">${Math.round(s.distFromPin)}m</span></div></td>
      <td><div class="td"><span class="ms">${gap}</span></div></td>
      <td><div class="td"><div class="br"><div class="bb"><div class="bf" style="width:${dp}%;background:${c}"></div></div><div class="bv" style="color:${c}">${Math.round(s.dist)}m</div></div></div></td>
      <td><div class="td"><div class="br"><div class="bb"><div class="bf" style="width:${sp}%;background:${c}"></div></div><div class="bv" style="color:${c}">${s.sog.toFixed(2)} kts</div></div></div></td>
      <td><div class="td">${s.heel!=null?`<div class="br"><div class="bb"><div class="bf" style="width:${(s.heel/20*100).toFixed(1)}%;background:${c}"></div></div><div class="bv" style="color:${c}">${s.heel.toFixed(1)}°</div></div>`:"<span style='color:var(--muted2)'>—</span>"}</div></td>
      <td><div class="td">${s.heelSd!=null?`<div class="br"><div class="bb"><div class="bf" style="width:${(s.heelSd/mHSd*100).toFixed(1)}%;background:${c}77"></div></div><div class="bv" style="color:${c}88">${(s.heelSd/mHSd*100).toFixed(0)}%</div></div>`:"<span style='color:var(--muted2)'>—</span>"}</div></td>
    `;
    tb.appendChild(tr);
  });
  // Boats with no mark detection — show at bottom as DNS/no mark
  const rankedSails = new Set(l1stats.map(s=>s.sail));
  (BOATS||[]).filter(s=>!rankedSails.has(s)).forEach(s=>{
    const c=COL[s]||'#888';
    const tr=document.createElement('tr');
    tr.style.opacity='0.45';
    tr.innerHTML=`
      <td><div class="td"><span class="rk">—</span></div></td>
      <td><div class="td"><span class="sn" style="color:${c}">${s}</span></div></td>
      <td><div class="td"><span style="color:var(--muted2);font-size:8px">NO MARK</span></div></td>
      <td colspan="5"><div class="td"><span style="color:var(--muted2);font-size:8px">mark not detected</span></div></td>
    `;
    tb.appendChild(tr);
  });
}

function drawWindR(rd){
  const {raceNum,tracks,WF,WF_OBJ,WF_BLEND_OBJ,WF_DAY_OBJ,WF_RACE_OBJ,gunTs} = rd;
  const el = document.getElementById(raceDomId(rd,'cWind'));
  if(!el) return;
  const windObj = WF_BLEND_OBJ || WF_OBJ || (WF!=null ? {wf:WF} : null);
  if(windObj){
    windObj.day = WF_DAY_OBJ || null;
    windObj.race = WF_RACE_OBJ || WF_OBJ || null;
  }
  window.GUN = gunTs;
  try{ drawWind(tracks, windObj, raceDomId(rd,'cWind')); } catch(e){ console.error('drawWind',e); }
}

function drawDeltaR(rd){
  const {raceNum,l1Order,finTimes,BOATS} = rd;
  if(!l1Order.length) return;
  const el = document.getElementById(raceDomId(rd,'cDelta'));
  if(!el) return;
  // Use official results if available, otherwise fall back to GPS finish times
  const officialRace = (OFFICIAL_RESULTS_BY_DAY[rd.event?._dayIdx||rd._dayIdx||0]||OFFICIAL_RESULTS_BY_DAY[0])[raceNum];
  let finOrder;
  if(officialRace && Object.keys(officialRace).length){
    finOrder = Object.entries(officialRace)
      .sort((a,b)=>a[1]-b[1]).map(e=>e[0])
      .filter(s=>l1Order.includes(s));
    l1Order.forEach(s=>{ if(!finOrder.includes(s)) finOrder.push(s); });
  } else {
    finOrder = Object.entries(finTimes||{})
      .sort((a,b)=>a[1]-b[1]).map(e=>e[0])
      .filter(s=>l1Order.includes(s));
    l1Order.forEach(s=>{ if(!finOrder.includes(s)) finOrder.push(s); });
  }
  try{ drawDelta(l1Order, finOrder, raceDomId(rd,'cDelta')); } catch(e){ console.error('drawDelta',e); }
}
